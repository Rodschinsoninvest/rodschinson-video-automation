# Netlify config (repo root) — Git-based builds read this.
# `base` is RELATIVE to the repo root; never an absolute/local path.
[build]
  base    = "frontend"
  publish = "dist"          # relative to base → frontend/dist
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # Install devDependencies (vite, plugins) during the build. Without this a
  # production NODE_ENV makes npm skip devDeps → "vite: not found".
  NPM_FLAGS = "--include=dev"
  NPM_CONFIG_PRODUCTION = "false"

# Proxy /api/* → Railway backend (keeps the browser same-origin)
[[redirects]]
  from   = "/api/*"
  to     = "https://content-studio-production-84de.up.railway.app/api/:splat"
  status = 200
  force  = true

# SPA fallback — all non-file routes → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Always revalidate index.html so users get the latest build (hashed assets are
# immutable). Prevents stale cached app shells (blank page / old code).
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# NOTE: do NOT set NODE_ENV=production here — it makes npm skip devDependencies
# (vite, @vitejs/plugin-react) at install time, breaking the build. Vite always
# builds in production mode regardless.
