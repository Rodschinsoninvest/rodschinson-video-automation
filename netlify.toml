# Netlify config (repo root) — Git-based builds read this.
# `base` is RELATIVE to the repo root; never an absolute/local path.
[build]
  base    = "frontend"
  publish = "dist"          # relative to base → frontend/dist
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* → Railway backend (keeps the browser same-origin)
[[redirects]]
  from   = "/api/*"
  to     = "https://content-studio-production-84de.up.railway.app/api/:splat"
  status = 200
  force  = true

# SPA fallback — all non-file routes → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[context.production.environment]
  NODE_ENV = "production"
