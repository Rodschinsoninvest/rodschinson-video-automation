<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:   #0C0C0E;
  --bg2:  #141417;
  --acc:  #ffffff;
  --gold: #C8A96E;
  --sky:  #00B6FF;
  --dim:  rgba(255,255,255,0.4);
  --serif:'DM Serif Display', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
}

html, body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--sans);
}

.frame {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
}

.corner-tl {
  position: absolute;
  top: 0; left: 0;
  width: 100px; height: 100px;
  border-top: 2px solid var(--gold);
  border-left: 2px solid var(--gold);
  opacity: 0.6;
}

.corner-br {
  position: absolute;
  bottom: 0; right: 0;
  width: 100px; height: 100px;
  border-bottom: 2px solid var(--gold);
  border-right: 2px solid var(--gold);
  opacity: 0.6;
}

.brand-tag {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.52em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.22);
}

.slide-counter {
  position: absolute;
  top: 40px;
  right: 44px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.22);
}

/* ── NOISE TEXTURE ── */
.noise {
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px;
  pointer-events: none;
  opacity: 0.35;
}

.scene {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  padding: 80px 60px 90px;
}
.scene.active { display: flex; }

/* ── TITLE ── */
.slide-title .label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.55em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 36px;
  opacity: 0;
  transition: opacity 0.5s ease;
}

.slide-title .headline {
  font-family: var(--serif);
  font-size: 88px;
  font-weight: 400;
  color: var(--acc);
  line-height: 1.0;
  margin-bottom: 32px;
  opacity: 0;
  transform: translateY(16px);
  transition: all 0.65s cubic-bezier(0.16,1,0.3,1) 0.08s;
}

.slide-title .headline em {
  font-style: italic;
  color: var(--gold);
}

.slide-title .rule {
  width: 0;
  height: 1px;
  background: var(--gold);
  margin-bottom: 28px;
  transition: width 0.7s ease 0.25s;
}

.slide-title .subheadline {
  font-size: 18px;
  font-weight: 300;
  color: var(--dim);
  line-height: 1.7;
  max-width: 700px;
  opacity: 0;
  transition: opacity 0.5s ease 0.4s;
}

.slide-title .cta-hint {
  margin-top: auto;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.2);
  opacity: 0;
  transition: opacity 0.4s ease 0.65s;
}

/* ── CONTENT ── */
.slide-content .index {
  font-family: var(--serif);
  font-size: 130px;
  font-weight: 400;
  color: rgba(255,255,255,0.04);
  line-height: 1;
  position: absolute;
  top: 60px;
  right: 52px;
}

.slide-content .tag {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: var(--sky);
  margin-bottom: 20px;
  opacity: 0;
  transition: opacity 0.4s ease;
}

.slide-content .headline {
  font-family: var(--serif);
  font-size: 56px;
  font-weight: 400;
  color: var(--acc);
  line-height: 1.1;
  margin-bottom: 24px;
  opacity: 0;
  transform: translateY(14px);
  transition: all 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s;
}

.slide-content .rule {
  width: 32px;
  height: 1px;
  background: var(--gold);
  margin-bottom: 22px;
  opacity: 0;
  transition: opacity 0.4s ease 0.2s;
}

.slide-content .body {
  font-size: 18px;
  font-weight: 300;
  color: var(--dim);
  line-height: 1.75;
  max-width: 820px;
  opacity: 0;
  transition: opacity 0.5s ease 0.25s;
}

.slide-content .stat-block {
  margin-top: 36px;
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: 24px;
  opacity: 0;
  transition: opacity 0.5s ease 0.4s;
}

.slide-content .stat-number {
  font-family: var(--serif);
  font-size: 56px;
  font-weight: 400;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 6px;
}

.slide-content .stat-desc {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.08em;
}

/* ── CTA ── */
.slide-cta {
  justify-content: center;
  align-items: center;
  text-align: center;
  background: radial-gradient(ellipse at center, #141f2e 0%, #0C0C0E 70%);
}

.slide-cta .cta-overline {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.55em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 28px;
  opacity: 0;
  transition: opacity 0.4s ease;
}

.slide-cta .cta-headline {
  font-family: var(--serif);
  font-size: 70px;
  font-weight: 400;
  color: var(--acc);
  line-height: 1.0;
  margin-bottom: 12px;
  opacity: 0;
  transform: translateY(14px);
  transition: all 0.6s ease 0.1s;
}

.slide-cta .cta-rule {
  width: 0;
  height: 1px;
  background: var(--gold);
  margin: 22px auto;
  transition: width 0.65s ease 0.2s;
}

.slide-cta .cta-body {
  font-size: 16px;
  font-weight: 300;
  color: var(--dim);
  line-height: 1.65;
  max-width: 600px;
  margin: 0 auto 30px;
  opacity: 0;
  transition: opacity 0.5s ease 0.3s;
}

.slide-cta .hashtags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.5s ease 0.45s;
}

.slide-cta .hashtag {
  padding: 5px 14px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.06em;
}

/* ── ANIMATED ── */
.scene.anim .slide-title .label,
.scene.anim .slide-title .subheadline,
.scene.anim .slide-title .cta-hint { opacity: 1; }
.scene.anim .slide-title .headline { opacity: 1; transform: none; }
.scene.anim .slide-title .rule { width: 64px; }

.scene.anim .slide-content .tag,
.scene.anim .slide-content .rule,
.scene.anim .slide-content .body,
.scene.anim .slide-content .stat-block { opacity: 1; }
.scene.anim .slide-content .headline { opacity: 1; transform: none; }

.scene.anim .slide-cta .cta-overline,
.scene.anim .slide-cta .cta-body,
.scene.anim .slide-cta .hashtags { opacity: 1; }
.scene.anim .slide-cta .cta-headline { opacity: 1; transform: none; }
.scene.anim .slide-cta .cta-rule { width: 60px; }
</style>
</head>
<body>

<div class="noise"></div>
<div class="frame">
  <div class="corner-tl"></div>
  <div class="corner-br"></div>
  <div class="brand-tag" id="frame-brand">RODSCHINSON INVESTMENT</div>
  <div class="slide-counter" id="frame-counter"></div>
</div>

<div id="scene-container"></div>

<script>
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(s) { return esc(s).replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/\n/g,'<br>'); }

window.loadScene = function(slideData) {
  const c = document.getElementById('scene-container');
  const idx   = slideData.index || 1;
  const type  = slideData.type  || 'content';
  const total = slideData.total || '';

  document.getElementById('frame-counter').textContent =
    total ? `${String(idx).padStart(2,'0')} / ${String(total).padStart(2,'0')}` : '';

  let html = '';
  if (type === 'title') {
    html = `<div class="scene slide-title" id="scene">
      <div class="label">${esc(slideData.brand || 'Rodschinson')}</div>
      <div class="headline">${fmt(slideData.headline || '')}</div>
      <div class="rule"></div>
      <div class="subheadline">${esc(slideData.subheadline || '')}</div>
      <div class="cta-hint">${esc(slideData.cta || '— Swipe to read')}</div>
    </div>`;
  } else if (type === 'cta') {
    const tags = (slideData.hashtags || []).map(h => `<span class="hashtag">${esc(h)}</span>`).join('');
    html = `<div class="scene slide-cta" id="scene">
      <div class="cta-overline">Contact us</div>
      <div class="cta-headline">${fmt(slideData.headline || '')}</div>
      <div class="cta-rule"></div>
      <div class="cta-body">${esc(slideData.body || '')}</div>
      ${tags ? `<div class="hashtags">${tags}</div>` : ''}
    </div>`;
  } else {
    const stat = slideData.stat ? (() => {
      const m = String(slideData.stat).match(/^([0-9.,]+\s*[%€KMB+]*)\s*[-–:·]?\s*(.*)$/);
      return m
        ? `<div class="stat-block"><div class="stat-number">${esc(m[1])}</div><div class="stat-desc">${esc(m[2]||slideData.stat)}</div></div>`
        : `<div class="stat-block"><div class="stat-desc">${esc(slideData.stat)}</div></div>`;
    })() : '';
    html = `<div class="scene slide-content" id="scene">
      <div class="index">${String(idx).padStart(2,'0')}</div>
      <div class="tag">— Point ${String(idx).padStart(2,'0')}</div>
      <div class="headline">${fmt(slideData.headline || '')}</div>
      <div class="rule"></div>
      <div class="body">${esc(slideData.body || '')}</div>
      ${stat}
    </div>`;
  }

  c.innerHTML = html;
  return true;
};

window.animateScene = function() {
  const s = document.getElementById('scene');
  if (!s) return;
  requestAnimationFrame(() => {
    s.classList.add('active');
    setTimeout(() => s.classList.add('anim'), 40);
  });
};

window.isAnimationComplete = function(d) {
  return new Promise(r => setTimeout(r, d || 700));
};
</script>
</body>
</html>
