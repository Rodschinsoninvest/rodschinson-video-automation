<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>Carousel — Minimal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --dark-blue:#08316F; --sky-blue:#00B6FF; }

html, body {
  width:1080px; height:1080px; overflow:hidden;
  font-family:'Inter', sans-serif;
  background:#F7F6F2; color:#111;
}
#scene-container { width:1080px; height:1080px; position:relative; }

/* ── SCENE — always light ── */
.scene {
  position:absolute; inset:0; display:none;
  flex-direction:column; overflow:hidden;
  background:#F7F6F2 !important;
}
.scene.active { display:flex; }

/* ── HEADER ── */
.frame-header {
  position:absolute; top:0; left:0; right:0; height:64px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 52px; z-index:10;
  border-bottom:1px solid rgba(0,0,0,0.1);
  background:#F7F6F2;
}
.frame-header::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:var(--dark-blue);
}
#logo-text {
  font-size:12px; font-weight:700; letter-spacing:0.22em;
  text-transform:uppercase; color:var(--dark-blue);
}
#frame-counter {
  font-size:12px; font-weight:500; color:rgba(0,0,0,0.3);
}

/* ── TITLE SLIDE ── */
.slide-title {
  padding:64px 52px 52px;
  flex-direction:column; justify-content:space-between;
}
.t-tag {
  font-size:12px; font-weight:600; letter-spacing:0.32em;
  text-transform:uppercase; color:var(--sky-blue); margin-bottom:0;
  display:flex; align-items:center; gap:14px;
}
.t-tag::before { content:''; width:28px; height:2px; background:var(--sky-blue); }
.t-headline {
  font-size:82px; font-weight:900; line-height:0.92;
  color:var(--dark-blue); letter-spacing:-0.03em;
  flex:1; display:flex; align-items:center;
}
.t-divider-row { display:flex; align-items:center; gap:16px; margin-bottom:20px; }
.t-div-line { flex:1; height:1px; background:rgba(0,0,0,0.12); }
.t-div-dot { width:6px; height:6px; border-radius:50%; background:var(--sky-blue); flex-shrink:0; }
.t-sub {
  font-size:19px; font-weight:300; line-height:1.65;
  color:rgba(0,0,0,0.5);
}
.t-swipe {
  font-size:12px; font-weight:600; letter-spacing:0.22em;
  text-transform:uppercase; color:rgba(0,0,0,0.25);
  display:flex; align-items:center; gap:10px;
}
.t-swipe::after { content:'→'; color:var(--sky-blue); }

/* ── CONTENT SLIDE ── */
.slide-content {
  padding:64px 52px 52px;
  flex-direction:column; justify-content:space-between;
}
.c-num {
  font-size:13px; font-weight:700; color:var(--sky-blue);
  letter-spacing:0.22em; margin-bottom:24px;
}
.c-headline {
  font-size:52px; font-weight:800; line-height:1.0;
  color:var(--dark-blue); letter-spacing:-0.025em;
  flex:1; display:flex; align-items:flex-start;
}
.c-sep { width:100%; height:1px; background:rgba(0,0,0,0.1); margin:24px 0; }
.c-body {
  font-size:19px; font-weight:400; line-height:1.7;
  color:rgba(0,0,0,0.55);
}
.c-stat {
  display:flex; align-items:center; gap:0;
  border-left:4px solid var(--dark-blue); padding-left:20px;
  margin-top:24px;
}
.c-stat-val {
  font-size:52px; font-weight:900; color:var(--dark-blue);
  letter-spacing:-0.03em; margin-right:16px;
}
.c-stat-desc {
  font-size:17px; font-weight:400; color:rgba(0,0,0,0.45);
  line-height:1.45;
}

/* ── CTA SLIDE ── */
.slide-cta {
  padding:64px 52px 52px;
  flex-direction:column; justify-content:space-between;
  background:#F7F6F2 !important;
}
.cta-top-rule { width:100%; height:1px; background:rgba(0,0,0,0.12); }
.cta-eyebrow {
  font-size:12px; font-weight:600; letter-spacing:0.32em;
  text-transform:uppercase; color:var(--sky-blue); margin-top:40px;
}
.cta-headline {
  font-size:72px; font-weight:900; line-height:0.93;
  color:var(--dark-blue); letter-spacing:-0.03em;
  flex:1; display:flex; align-items:center;
}
.cta-rule { width:40px; height:2px; background:var(--dark-blue); margin-bottom:24px; }
.cta-body {
  font-size:19px; font-weight:300; line-height:1.65;
  color:rgba(0,0,0,0.52);
}
.cta-link {
  display:inline-flex; align-items:center; gap:10px; margin-top:32px;
  font-size:14px; font-weight:700; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--dark-blue);
  border-bottom:2px solid var(--dark-blue); padding-bottom:4px;
}
.cta-link::after { content:'→'; }
.hashtags { display:flex; flex-wrap:wrap; gap:10px; margin-top:20px; }
.hashtag {
  font-size:13px; font-weight:500; color:var(--dark-blue);
  border:1px solid rgba(0,0,0,0.15); padding:5px 14px; border-radius:20px;
}
</style>
</head>
<body>
<div id="scene-container">
  <div class="frame-header">
    <div id="logo-text">Brand</div>
    <div id="frame-counter"></div>
  </div>
</div>
<script>
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(s){ return esc(s).replace(/\*([^*]+)\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); }

function parseStatBlock(stat) {
  if (!stat) return '';
  const [v, d] = String(stat).split(/\s*—\s*/, 2);
  return `<div class="c-stat">
    <div class="c-stat-val">${esc(v.trim())}</div>
    <div class="c-stat-desc">${esc(d||'')}</div>
  </div>`;
}

window.loadScene = function(slideData) {
  const c     = document.getElementById('scene-container');
  const idx   = slideData.index || 1;
  const type  = slideData.type  || 'content';
  const total = slideData.total || '';

  const _bname = (window.__brand && window.__brand.name) || slideData.brand || '';
  const cntTxt = total ? `${String(idx).padStart(2,'0')} / ${String(total).padStart(2,'0')}` : '';

  let sceneHtml = '';

  if (type === 'title') {
    sceneHtml = `<div class="scene slide-title active" id="scene">
      <div class="t-tag">${esc(_bname)}</div>
      <div class="t-headline">${fmt(slideData.headline || '')}</div>
      <div>
        <div class="t-divider-row"><div class="t-div-line"></div><div class="t-div-dot"></div><div class="t-div-line"></div></div>
        <div class="t-sub">${esc(slideData.subheadline || '')}</div>
      </div>
      <div class="t-swipe">${esc(slideData.cta || 'Swipe')}</div>
    </div>`;

  } else if (type === 'cta') {
    const tags = (slideData.hashtags || []).map(h => `<span class="hashtag">${esc(h)}</span>`).join('');
    sceneHtml = `<div class="scene slide-cta active" id="scene">
      <div class="cta-top-rule"></div>
      <div class="cta-eyebrow">${esc(_bname)}</div>
      <div class="cta-headline">${fmt(slideData.headline || '')}</div>
      <div>
        <div class="cta-rule"></div>
        <div class="cta-body">${esc(slideData.body || '')}</div>
        <div class="cta-link">${esc(slideData.cta || 'Get in touch')}</div>
      </div>
      ${tags ? `<div class="hashtags">${tags}</div>` : ''}
    </div>`;

  } else {
    sceneHtml = `<div class="scene slide-content active" id="scene">
      <div class="c-num">${String(idx).padStart(2,'0')}</div>
      <div class="c-headline">${fmt(slideData.headline || '')}</div>
      <div>
        <div class="c-sep"></div>
        <div class="c-body">${esc(slideData.body || '')}</div>
        ${parseStatBlock(slideData.stat)}
      </div>
    </div>`;
  }

  c.innerHTML = `<div class="frame-header">
    <div id="logo-text">${esc(_bname)}</div>
    <div id="frame-counter">${cntTxt}</div>
  </div>` + sceneHtml;
  return true;
};

window.animateScene = function() {};
window.isAnimationComplete = function(d){ return new Promise(r=>setTimeout(r, d||400)); };
</script>
</body>
</html>
