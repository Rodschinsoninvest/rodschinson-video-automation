<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=794, height=1123">
<title>Property Long Teaser</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #08316F; --sky: #00B6FF; --gold: #C8A96E; --white: #FFFFFF;
  --bg: #F5F2ED; --muted: rgba(8,49,111,0.5);
  --heading: 'Montserrat', sans-serif; --body: 'DM Sans', sans-serif;
}
html, body { width: 794px; overflow-x: hidden; background: var(--white); font-family: var(--body); color: var(--navy); -webkit-font-smoothing: antialiased; }
.page { width: 794px; min-height: 1123px; position: relative; page-break-after: always; }
.page:last-child { page-break-after: auto; }

/* ── HEADER BAR ── */
.header-bar {
  background: var(--navy); padding: 18px 32px; display: flex; align-items: center; gap: 20px;
}
.header-logo { text-align: left; flex-shrink: 0; }
.header-logo-main { font-family: var(--heading); font-weight: 700; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: var(--white); line-height: 1; }
.header-logo-line { width: 80px; height: 1.5px; background: var(--sky); margin: 4px 0; }
.header-logo-sub { font-family: var(--heading); font-weight: 400; font-size: 7px; letter-spacing: 4px; text-transform: uppercase; color: var(--sky); }
.header-info { flex: 1; }
.header-title { font-family: var(--heading); font-weight: 700; font-size: 13px; color: var(--white); line-height: 1.3; }
.header-ref { font-family: var(--heading); font-weight: 500; font-size: 9px; color: var(--sky); letter-spacing: 1px; margin-top: 3px; }

/* ── PHOTO GALLERY ── */
.photo-gallery { display: flex; gap: 0; width: 100%; max-height: 260px; overflow: hidden; }
.photo-gallery img { flex: 1; object-fit: cover; min-width: 0; height: 260px; }
.photo-gallery-single img { width: 100%; }

/* ── DOWNLOAD BUTTON ── */
.download-btn-wrap { position: relative; }
.download-btn {
  position: absolute; right: 32px; top: -30px; z-index: 10;
  display: flex; align-items: center; gap: 10px;
  background: var(--sky); color: var(--white); padding: 10px 18px; border-radius: 6px;
  font-family: var(--heading); font-weight: 600; font-size: 11px; text-decoration: none;
  box-shadow: 0 4px 12px rgba(0,182,255,0.3);
}
.download-btn svg { width: 20px; height: 20px; fill: var(--white); }
.download-btn-label { display: flex; flex-direction: column; }
.download-btn-label span:first-child { font-weight: 700; font-size: 12px; }
.download-btn-label span:last-child { font-size: 8px; opacity: 0.7; letter-spacing: 1px; }

/* ── MAIN CONTENT ── */
.content { padding: 24px 32px 20px; }
.prop-headline {
  font-family: var(--heading); font-weight: 800; font-size: 22px; color: var(--navy); line-height: 1.25; margin-bottom: 20px;
}
.prop-headline .location { color: var(--sky); }

/* Address + Map row */
.addr-map-row { display: flex; gap: 20px; margin-bottom: 20px; }
.addr-col { flex: 1; }
.addr-label { font-family: var(--heading); font-weight: 700; font-size: 11px; color: var(--sky); margin-bottom: 6px; letter-spacing: 0.5px; }
.addr-text { font-family: var(--body); font-size: 11px; line-height: 1.5; color: var(--navy); }
.map-col { width: 260px; flex-shrink: 0; }
.map-placeholder {
  width: 100%; height: 160px; border-radius: 6px; overflow: hidden;
  border: 1px solid rgba(8,49,111,0.08); background: rgba(8,49,111,0.03);
  display: flex; align-items: center; justify-content: center;
}
.map-placeholder img { width: 100%; height: 100%; object-fit: cover; }
.map-crosshair { position: relative; }
.map-crosshair svg { opacity: 0.3; }

/* Description */
.desc-label { font-family: var(--heading); font-weight: 700; font-size: 11px; color: var(--sky); margin-bottom: 8px; letter-spacing: 0.5px; }
.desc-list { list-style: none; padding: 0; margin-bottom: 16px; }
.desc-list li {
  font-family: var(--body); font-size: 10.5px; line-height: 1.6; color: var(--navy);
  padding: 3px 0 3px 16px; position: relative;
}
.desc-list li::before { content: '\2022'; position: absolute; left: 0; color: var(--sky); font-weight: 700; }
.desc-text { font-family: var(--body); font-size: 10.5px; line-height: 1.6; color: var(--navy); margin-bottom: 16px; }

/* Surface table */
.surface-section { margin-bottom: 16px; }
.surface-header {
  font-family: var(--heading); font-weight: 700; font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--navy); padding: 8px 14px;
  background: rgba(8,49,111,0.04); border-bottom: 2px solid var(--sky);
}
.surface-table { width: 100%; border-collapse: collapse; }
.surface-table th {
  font-family: var(--heading); font-weight: 600; font-size: 9px; text-align: left;
  padding: 6px 14px; color: var(--muted); border-bottom: 1px solid rgba(8,49,111,0.08);
}
.surface-table td {
  font-family: var(--body); font-size: 10px; padding: 6px 14px;
  border-bottom: 1px solid rgba(8,49,111,0.04); color: var(--navy);
}
.surface-table td:last-child { font-weight: 600; }

/* Plans gallery */
.plans-section { margin-bottom: 16px; }
.plans-label { font-family: var(--heading); font-weight: 700; font-size: 11px; color: var(--sky); margin-bottom: 8px; letter-spacing: 0.5px; }
.plans-grid { display: flex; gap: 10px; flex-wrap: wrap; }
.plans-grid img { height: 180px; border-radius: 6px; border: 1px solid rgba(8,49,111,0.08); object-fit: contain; background: rgba(8,49,111,0.02); }

/* Interior photos */
.interior-section { margin-bottom: 16px; }
.interior-grid { display: flex; gap: 8px; flex-wrap: wrap; }
.interior-grid img { flex: 1; min-width: 200px; max-height: 200px; object-fit: cover; border-radius: 6px; }

/* SharePoint link */
.sharepoint-link {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--heading); font-weight: 600; font-size: 10px;
  color: var(--sky); text-decoration: none; padding: 8px 16px;
  border: 1px solid rgba(0,182,255,0.2); border-radius: 6px;
  background: rgba(0,182,255,0.04); margin-bottom: 16px;
}
.sharepoint-link:hover { background: rgba(0,182,255,0.1); }

/* Price section */
.price-section {
  border-top: 2px solid var(--sky); padding-top: 14px; margin-top: 10px; margin-bottom: 14px;
}
.price-label { font-family: var(--heading); font-weight: 700; font-size: 11px; color: var(--sky); margin-bottom: 4px; }
.price-row { display: flex; align-items: baseline; gap: 16px; }
.price-value { font-family: var(--heading); font-weight: 900; font-size: 36px; color: var(--navy); }
.price-terms { font-family: var(--body); font-size: 10px; color: var(--muted); line-height: 1.5; max-width: 300px; }

/* Footer disclaimer */
.footer-disclaimer {
  background: rgba(8,49,111,0.03); padding: 12px 32px;
  font-family: var(--body); font-size: 7px; line-height: 1.5; color: var(--muted);
}
</style>
</head>
<body>

<div id="pages-container"></div>

<script>
function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }

window.loadLongTeaser = function(data, brandName) {
  var logoName = (brandName || 'RODSCHINSON').toUpperCase().replace(/\s*INVESTMENT\s*/i, '').trim() || 'RODSCHINSON';
  var container = document.getElementById('pages-container');
  container.innerHTML = '';

  // Split photos into exterior (first batch) and interior (rest)
  var photos = data.photos || [];
  var plans = data.plans || [];
  var exteriorPhotos = photos.slice(0, Math.min(3, photos.length));
  var interiorPhotos = photos.slice(3);

  // Parse description into bullets
  var desc = data.description || '';
  var bullets = [];
  var introText = '';
  if (desc.indexOf('\u2022') !== -1) {
    var parts = desc.split(/\s*\u2022\s*/);
    parts.forEach(function(p, i) {
      var trimmed = p.trim();
      if (!trimmed) return;
      if (i === 0 && !desc.trim().startsWith('\u2022')) introText = trimmed;
      else bullets.push(trimmed);
    });
  } else {
    introText = desc;
  }

  // ── PAGE 1 ──
  var html = '<div class="page">';

  // Header bar
  html += '<div class="header-bar">' +
    '<div class="header-logo">' +
      '<div class="header-logo-main">' + esc(logoName) + '</div>' +
      '<div class="header-logo-line"></div>' +
      '<div class="header-logo-sub">I N V E S T M E N T</div>' +
    '</div>' +
    '<div class="header-info">' +
      '<div class="header-title">' + esc(data.title || '') + '</div>' +
      '<div class="header-ref">' + esc(data.reference || '') + '</div>' +
    '</div>' +
  '</div>';

  // Photo gallery
  if (exteriorPhotos.length > 0) {
    html += '<div class="photo-gallery' + (exteriorPhotos.length === 1 ? ' photo-gallery-single' : '') + '">';
    exteriorPhotos.forEach(function(src) {
      html += '<img src="' + esc(src) + '" alt="" />';
    });
    html += '</div>';
  }

  // Download expertise button
  if (data.expertise_url) {
    html += '<div class="download-btn-wrap">' +
      '<a class="download-btn" href="' + esc(data.expertise_url) + '" target="_blank">' +
        '<svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/></svg>' +
        '<div class="download-btn-label"><span>T\u00e9l\u00e9charger</span><span>PDF</span></div>' +
      '</a>' +
    '</div>';
  }

  // Content area
  html += '<div class="content">';

  // Headline
  var title = data.title || '';
  html += '<div class="prop-headline">' + esc(title) + '</div>';

  // Address + Map row
  if (data.address || data.map_url) {
    html += '<div class="addr-map-row">';
    html += '<div class="addr-col">';
    html += '<div class="addr-label">' + esc(data.address_label || 'Adresse :') + '</div>';
    html += '<div class="addr-text">' + esc(data.address || '') + '</div>';
    html += '</div>';
    if (data.map_url) {
      html += '<div class="map-col"><div class="map-placeholder"><img src="' + esc(data.map_url) + '" alt="Map" /></div></div>';
    } else {
      html += '<div class="map-col"><div class="map-placeholder"><div class="map-crosshair">' +
        '<svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="12" stroke="#00B6FF" stroke-width="1"/><line x1="20" y1="2" x2="20" y2="38" stroke="#00B6FF" stroke-width="0.6"/><line x1="2" y1="20" x2="38" y2="20" stroke="#00B6FF" stroke-width="0.6"/></svg>' +
      '</div></div></div>';
    }
    html += '</div>';
  }

  // Description
  if (introText || bullets.length) {
    html += '<div class="desc-label">' + esc(data.description_label || 'Description :') + '</div>';
    if (introText) html += '<div class="desc-text">' + esc(introText) + '</div>';
    if (bullets.length) {
      html += '<ul class="desc-list">';
      bullets.forEach(function(b) { html += '<li>' + esc(b) + '</li>'; });
      html += '</ul>';
    }
  }

  // Surface table
  if (data.surfaces && data.surfaces.length) {
    html += '<div class="surface-section">' +
      '<div class="surface-header">' + esc(data.surfaces_label || 'D\u00c9TAIL DES SUPERFICIES') + '</div>' +
      '<table class="surface-table"><thead><tr><th>' + esc(data.surface_col1 || '\u00c9tage') + '</th><th>' + esc(data.surface_col2 || 'Superficie en m\u00b2') + '</th></tr></thead><tbody>';
    data.surfaces.forEach(function(s) {
      html += '<tr><td>' + esc(s.floor || s.label) + '</td><td>' + esc(s.area || s.value) + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  // Interior photos
  if (interiorPhotos.length > 0) {
    html += '<div class="interior-section"><div class="interior-grid">';
    interiorPhotos.forEach(function(src) {
      html += '<img src="' + esc(src) + '" alt="" />';
    });
    html += '</div></div>';
  }

  // Plans
  if (plans.length > 0) {
    html += '<div class="plans-section">' +
      '<div class="plans-label">' + esc(data.plans_label || 'Plans :') + '</div>' +
      '<div class="plans-grid">';
    plans.forEach(function(src) {
      html += '<img src="' + esc(src) + '" alt="" />';
    });
    html += '</div></div>';
  }

  // SharePoint link
  if (data.sharepoint_url) {
    html += '<a class="sharepoint-link" href="' + esc(data.sharepoint_url) + '" target="_blank">' +
      '\ud83d\udcc1 ' + esc(data.sharepoint_label || 'Acc\u00e9der au dossier complet') +
    '</a>';
  }

  // Price
  html += '<div class="price-section">' +
    '<div class="price-label">' + esc(data.price_label || 'Prix :') + '</div>' +
    '<div class="price-row">' +
      '<div class="price-value">' + esc(data.price || '') + '</div>' +
      (data.payment_terms ? '<div class="price-terms">' + esc(data.payment_terms) + '</div>' : '') +
    '</div>' +
  '</div>';

  html += '</div>'; // close .content

  // Footer disclaimer
  var disclaimer = data.disclaimer || 'Cette information est donn\u00e9e \u00e0 titre indicatif et moyen. Certains \u00e9l\u00e9ments peuvent n\u00e9cessiter confirmation, clarification ou correction. Aucune d\u00e9cision ne peut \u00eatre prise sur la base de ce document, et Rodschinson Investment d\u00e9cline toute responsabilit\u00e9 \u00e0 cet \u00e9gard. Pour plus d\'informations, vous pouvez contacter l\'un de nos Investment Portfolio Managers via notre bureau \u00e0 Bruxelles : T\u00e9l : +32 (0) 2 550 36 87. E-mail : assets.brussels@rodschinson.com. Rodschinson Investment. Bastion Tower - Place du Champ de Mars n\u00b0 5 - 1050 Bruxelles (Belgique)';
  html += '<div class="footer-disclaimer">' + esc(disclaimer) + '</div>';

  html += '</div>'; // close .page

  // ── Additional pages if lots of plans/photos overflow ──
  // (handled by CSS page breaks naturally)

  container.innerHTML = html;
  return true;
};
</script>
</body>
</html>
