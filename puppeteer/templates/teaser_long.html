<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=794, height=1123">
<title>Property Long Teaser</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #08316F; --sky: #00B6FF; --gold: #C8A96E; --white: #FFFFFF;
  --bg: #F5F2ED; --muted: rgba(8,49,111,0.5); --border: rgba(8,49,111,0.08);
  --heading: 'Montserrat', sans-serif; --body: 'DM Sans', sans-serif;
}
html, body { width: 794px; overflow-x: hidden; background: var(--white); font-family: var(--body); color: var(--navy); -webkit-font-smoothing: antialiased; }
.page { width: 794px; min-height: 1123px; position: relative; page-break-after: always; }
.page:last-child { page-break-after: auto; }

/* ── HEADER BAR (gradient navy → sky) ── */
.header-bar {
  background: linear-gradient(135deg, var(--navy) 0%, #0a4a9a 100%);
  padding: 14px 28px; display: flex; align-items: center; gap: 18px;
}
.header-logo { flex-shrink: 0; }
.header-logo-main { font-family: var(--heading); font-weight: 700; font-size: 14px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--white); line-height: 1; }
.header-logo-line { width: 110px; height: 1.5px; background: var(--sky); margin: 4px 0; }
.header-logo-sub { font-family: var(--heading); font-weight: 400; font-size: 7px; letter-spacing: 4.5px; text-transform: uppercase; color: var(--sky); }
.header-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.2); }
.header-info { flex: 1; }
.header-title { font-family: var(--heading); font-weight: 700; font-size: 12.5px; color: var(--white); line-height: 1.35; }
.header-ref { font-family: var(--heading); font-weight: 500; font-size: 9px; color: var(--sky); letter-spacing: 1px; margin-top: 3px; }

/* ── TOP PHOTO GALLERY (2 photos side-by-side) ── */
.top-gallery {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0; height: 240px; overflow: hidden; position: relative;
}
.top-gallery img { width: 100%; height: 100%; object-fit: cover; display: block; }
.top-gallery.single { grid-template-columns: 1fr; }
.top-gallery-empty {
  background: linear-gradient(135deg, rgba(8,49,111,0.05) 0%, rgba(0,182,255,0.05) 100%);
  display: flex; align-items: center; justify-content: center; color: var(--muted);
  font-size: 12px; letter-spacing: 1px;
}

/* Download button overlay */
.download-btn {
  position: absolute; right: 22px; bottom: 18px; z-index: 10;
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--sky); color: var(--white); padding: 10px 16px; border-radius: 6px;
  font-family: var(--heading); font-weight: 600; font-size: 11px; text-decoration: none;
  box-shadow: 0 4px 14px rgba(0,182,255,0.4);
}
.download-btn svg { width: 18px; height: 18px; fill: var(--white); }
.download-btn-label { display: flex; flex-direction: column; line-height: 1.1; }
.download-btn-label span:first-child { font-weight: 700; font-size: 12px; }
.download-btn-label span:last-child { font-size: 8px; opacity: 0.85; letter-spacing: 1.5px; }

/* ── MAIN CONTENT ── */
.content { padding: 22px 32px 16px; }

.prop-headline {
  font-family: var(--heading); font-weight: 800; font-size: 22px; color: var(--navy);
  line-height: 1.25; margin-bottom: 18px;
}

/* ── 2-COLUMN ADDRESS + MAP ── */
.row-addr-map {
  display: grid; grid-template-columns: 1fr 240px; gap: 22px; margin-bottom: 16px;
}
.addr-block { padding-top: 4px; }
.section-label {
  font-family: var(--heading); font-weight: 700; font-size: 11px;
  color: var(--sky); letter-spacing: 0.5px; margin-bottom: 6px;
}
.addr-text {
  font-family: var(--body); font-size: 11px; line-height: 1.5; color: var(--navy);
}
.map-frame {
  width: 100%; height: 165px; border-radius: 6px; overflow: hidden;
  border: 1px solid var(--border); background: rgba(8,49,111,0.03);
  display: flex; align-items: center; justify-content: center;
}
.map-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* ── DESCRIPTION ── */
.desc-block { margin-bottom: 16px; }
.desc-text {
  font-family: var(--body); font-size: 10.5px; line-height: 1.55; color: var(--navy); margin-bottom: 8px;
}
.desc-list { list-style: none; padding: 0; }
.desc-list li {
  font-family: var(--body); font-size: 10.5px; line-height: 1.5; color: var(--navy);
  padding: 3px 0 3px 14px; position: relative;
}
.desc-list li::before { content: '\2022'; position: absolute; left: 0; color: var(--sky); font-weight: 700; }

/* ── 2-COLUMN SURFACE TABLE + INTERIOR PHOTO ── */
.row-surface-photo {
  display: grid; grid-template-columns: 1fr 240px; gap: 22px; margin-bottom: 16px;
}
.surface-section { break-inside: avoid; }
.surface-header {
  font-family: var(--heading); font-weight: 700; font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--navy); padding: 8px 14px;
  background: rgba(8,49,111,0.04); border-bottom: 2px solid var(--sky);
}
.surface-table { width: 100%; border-collapse: collapse; }
.surface-table th {
  font-family: var(--heading); font-weight: 600; font-size: 9px; text-align: left;
  padding: 7px 14px; color: var(--muted); border-bottom: 1px solid var(--border);
}
.surface-table td {
  font-family: var(--body); font-size: 10.5px; padding: 7px 14px;
  border-bottom: 1px solid rgba(8,49,111,0.04); color: var(--navy);
}
.surface-table td:last-child { font-weight: 700; }

.interior-photo {
  width: 100%; height: 100%; min-height: 165px; border-radius: 6px; overflow: hidden;
  border: 1px solid var(--border); background: rgba(8,49,111,0.03);
}
.interior-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* ── PLANS section ── */
.plans-section { margin-bottom: 16px; }
.plans-grid { display: flex; gap: 10px; flex-wrap: wrap; }
.plans-grid img {
  height: 170px; max-width: 240px; border-radius: 6px;
  border: 1px solid var(--border); object-fit: contain; background: rgba(8,49,111,0.02);
}

/* ── EXTRA PHOTOS section (anything beyond 2 exterior + 1 interior) ── */
.extra-photos { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.extra-photos img { flex: 1; min-width: 230px; height: 170px; object-fit: cover; border-radius: 6px; }

/* ── SHAREPOINT LINK ── */
.sharepoint-link {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--heading); font-weight: 600; font-size: 10.5px;
  color: var(--sky); text-decoration: none; padding: 8px 16px;
  border: 1px solid rgba(0,182,255,0.25); border-radius: 6px;
  background: rgba(0,182,255,0.04); margin-bottom: 14px;
}

/* ── PRICE ── */
.price-section {
  border-top: 2px solid var(--sky); padding-top: 12px; margin-top: 6px; margin-bottom: 12px;
}
.price-label { font-family: var(--heading); font-weight: 700; font-size: 11px; color: var(--sky); margin-bottom: 4px; }
.price-row { display: flex; align-items: baseline; gap: 16px; }
.price-value { font-family: var(--heading); font-weight: 900; font-size: 38px; color: var(--navy); letter-spacing: -0.5px; }
.price-terms { font-family: var(--body); font-size: 10px; color: var(--muted); line-height: 1.45; max-width: 280px; }

/* ── FOOTER ── */
.footer-disclaimer {
  background: rgba(8,49,111,0.03); padding: 11px 32px;
  font-family: var(--body); font-size: 7px; line-height: 1.55; color: var(--muted);
}
</style>
</head>
<body>

<div id="pages-container"></div>

<script>
function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }

window.loadLongTeaser = function(data, brandName) {
  var logoName = (brandName || 'RODSCHINSON').toUpperCase().replace(/\s*INVESTMENT\s*/i, '').trim() || 'RODSCHINSON';
  var container = document.getElementById('pages-container');
  container.innerHTML = '';

  var photos = data.photos || [];
  var plans = data.plans || [];
  // First 2 photos go to top gallery, photo[2] (if exists) goes next to surface table, rest go in extras
  var topPhotos = photos.slice(0, 2);
  var interiorPhoto = photos[2] || '';
  var extraPhotos = photos.slice(3);

  // Parse description into intro + bullets
  var rawDesc = (data.description || '').trim();
  var bullets = [];
  var introText = '';
  if (rawDesc.indexOf('\u2022') !== -1) {
    var parts = rawDesc.split(/\s*\u2022\s*/);
    parts.forEach(function(p, i) {
      var trimmed = p.trim();
      if (!trimmed) return;
      if (i === 0 && !rawDesc.startsWith('\u2022')) introText = trimmed;
      else bullets.push(trimmed);
    });
  } else {
    introText = rawDesc;
  }

  var html = '<div class="page">';

  // ── HEADER BAR ──
  html += '<div class="header-bar">' +
    '<div class="header-logo">' +
      '<div class="header-logo-main">' + esc(logoName) + '</div>' +
      '<div class="header-logo-line"></div>' +
      '<div class="header-logo-sub">I N V E S T M E N T</div>' +
    '</div>' +
    '<div class="header-divider"></div>' +
    '<div class="header-info">' +
      '<div class="header-title">' + esc(data.title || '') + '</div>' +
      '<div class="header-ref">' + esc(data.reference || '') + '</div>' +
    '</div>' +
  '</div>';

  // ── TOP GALLERY (2 photos) + Download button overlay ──
  var galleryClass = 'top-gallery' + (topPhotos.length === 1 ? ' single' : '');
  html += '<div class="' + galleryClass + '">';
  if (topPhotos.length === 0) {
    html += '<div class="top-gallery-empty">No photos uploaded</div>';
  } else {
    topPhotos.forEach(function(src) {
      html += '<img src="' + esc(src) + '" alt="" />';
    });
  }
  if (data.expertise_url) {
    html += '<a class="download-btn" href="' + esc(data.expertise_url) + '" target="_blank">' +
      '<svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/></svg>' +
      '<div class="download-btn-label"><span>T\u00e9l\u00e9charger</span><span>PDF</span></div>' +
    '</a>';
  }
  html += '</div>';

  // ── CONTENT AREA ──
  html += '<div class="content">';

  // Property headline
  html += '<div class="prop-headline">' + esc(data.title || '') + '</div>';

  // 2-column: Address (left) + Map (right)
  html += '<div class="row-addr-map">';
  html += '<div class="addr-block">' +
    '<div class="section-label">' + esc(data.address_label || 'Adresse :') + '</div>' +
    '<div class="addr-text">' + esc(data.address || '—') + '</div>' +
  '</div>';
  html += '<div class="map-frame">';
  if (data.map_url) {
    html += '<img src="' + esc(data.map_url) + '" alt="Map" />';
  } else {
    html += '<svg width="40" height="40" viewBox="0 0 40 40" fill="none">' +
      '<circle cx="20" cy="20" r="12" stroke="#08316F" stroke-width="1" opacity="0.3"/>' +
      '<line x1="20" y1="2" x2="20" y2="38" stroke="#08316F" stroke-width="0.6" opacity="0.3"/>' +
      '<line x1="2" y1="20" x2="38" y2="20" stroke="#08316F" stroke-width="0.6" opacity="0.3"/>' +
    '</svg>';
  }
  html += '</div></div>';

  // Description (full width)
  if (introText || bullets.length) {
    html += '<div class="desc-block">';
    html += '<div class="section-label">' + esc(data.description_label || 'Description :') + '</div>';
    if (introText) html += '<div class="desc-text">' + esc(introText) + '</div>';
    if (bullets.length) {
      html += '<ul class="desc-list">';
      bullets.forEach(function(b) { html += '<li>' + esc(b) + '</li>'; });
      html += '</ul>';
    }
    html += '</div>';
  }

  // 2-column: Surface table (left) + Interior photo (right)
  if ((data.surfaces && data.surfaces.length) || interiorPhoto) {
    html += '<div class="row-surface-photo">';
    if (data.surfaces && data.surfaces.length) {
      html += '<div class="surface-section">' +
        '<div class="surface-header">' + esc(data.surfaces_label || 'D\u00c9TAIL DES SUPERFICIES') + '</div>' +
        '<table class="surface-table"><thead><tr><th>' + esc(data.surface_col1 || '\u00c9tage') + '</th><th>' + esc(data.surface_col2 || 'Superficie en m\u00b2') + '</th></tr></thead><tbody>';
      data.surfaces.forEach(function(s) {
        html += '<tr><td>' + esc(s.floor || s.label || '') + '</td><td>' + esc(s.area || s.value || '') + '</td></tr>';
      });
      html += '</tbody></table></div>';
    } else {
      html += '<div></div>';
    }
    if (interiorPhoto) {
      html += '<div class="interior-photo"><img src="' + esc(interiorPhoto) + '" alt="" /></div>';
    } else {
      html += '<div></div>';
    }
    html += '</div>';
  }

  // Extra photos (beyond top 2 + interior)
  if (extraPhotos.length) {
    html += '<div class="extra-photos">';
    extraPhotos.forEach(function(src) {
      html += '<img src="' + esc(src) + '" alt="" />';
    });
    html += '</div>';
  }

  // Plans
  if (plans.length) {
    html += '<div class="plans-section">' +
      '<div class="section-label">' + esc(data.plans_label || 'Plans :') + '</div>' +
      '<div class="plans-grid">';
    plans.forEach(function(src) { html += '<img src="' + esc(src) + '" alt="" />'; });
    html += '</div></div>';
  }

  // SharePoint link
  if (data.sharepoint_url) {
    html += '<a class="sharepoint-link" href="' + esc(data.sharepoint_url) + '" target="_blank">' +
      '\ud83d\udcc1 ' + esc(data.sharepoint_label || 'Acc\u00e9der au dossier complet') +
    '</a>';
  }

  // Price
  if (data.price) {
    html += '<div class="price-section">' +
      '<div class="price-label">' + esc(data.price_label || 'Prix :') + '</div>' +
      '<div class="price-row">' +
        '<div class="price-value">' + esc(data.price) + '</div>' +
        (data.payment_terms ? '<div class="price-terms">' + esc(data.payment_terms) + '</div>' : '') +
      '</div>' +
    '</div>';
  }

  html += '</div>'; // close .content

  // Footer disclaimer
  var disclaimer = data.disclaimer || 'Cette information est donn\u00e9e \u00e0 titre indicatif et moyen. Certains \u00e9l\u00e9ments peuvent n\u00e9cessiter confirmation, clarification ou correction. Aucune d\u00e9cision ne peut \u00eatre prise sur la base de ce document, et Rodschinson Investment d\u00e9cline toute responsabilit\u00e9 \u00e0 cet \u00e9gard. Pour plus d\'informations, vous pouvez contacter l\'un de nos Investment Portfolio Managers via notre bureau \u00e0 Bruxelles : T\u00e9l : +32 (0) 2 550 36 87. E-mail : assets.brussels@rodschinson.com. Rodschinson Investment. Bastion Tower - Place du Champ de Mars n\u00b0 5 - 1050 Bruxelles (Belgique)';
  html += '<div class="footer-disclaimer">' + esc(disclaimer) + '</div>';

  html += '</div>'; // close .page

  container.innerHTML = html;
  return true;
};
</script>
</body>
</html>
