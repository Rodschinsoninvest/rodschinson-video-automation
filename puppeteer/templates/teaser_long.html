<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Long Teaser</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#08316F;
  --cyan:#00B6FF;
  --grey-text:#6b7280;
  --border:#e5e7eb;
  --page-w:1123px;
  --page-h:794px;
  --body-pad:48px;
}
@page{ size:A4 landscape; margin:0; }
html,body{width:1123px;background:#fff;color:#111;font-family:'Montserrat',sans-serif;-webkit-print-color-adjust:exact;print-color-adjust:exact}

.page{
  width:1123px;height:794px;position:relative;overflow:hidden;background:#fff;
  page-break-after:always;page-break-inside:avoid;break-inside:avoid;
}
.page:last-child{page-break-after:auto}

/* ── HEADER ── */
.pg-header{
  position:absolute;top:0;left:0;right:0;height:90px;
  background:linear-gradient(90deg,#1FB6FF 0%,#0A66C2 45%,#08316F 100%);
  display:flex;align-items:center;padding:0 0 0 48px;color:#fff;z-index:5;
}
.pg-header .logo{flex-shrink:0;min-width:210px;padding-right:16px}
.pg-header .logo .l1{font-family:'Montserrat';font-weight:400;font-size:18px;color:#fff;letter-spacing:0.32em;line-height:1;white-space:nowrap}
.pg-header .logo .l2{font-family:'Montserrat';font-weight:300;font-size:8px;color:#fff;letter-spacing:0.6em;margin-top:3px;line-height:1;white-space:nowrap}
.pg-header .sep{width:1px;height:60px;background:rgba(255,255,255,0.3);margin:0 30px;flex-shrink:0}
.pg-header .title-block{flex:1;min-width:0;padding-right:20px;display:flex;flex-direction:column;justify-content:center}
.pg-header .title-block .sec{font-family:'Montserrat';font-weight:700;font-size:15px;line-height:1.2;color:#fff;margin-bottom:5px;letter-spacing:0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pg-header .title-block .meta{font-family:'Montserrat';font-weight:500;font-size:10.5px;color:rgba(255,255,255,0.78);letter-spacing:0.04em;text-transform:uppercase;display:flex;align-items:center;gap:10px}
.pg-header .title-block .meta .dot{width:3px;height:3px;border-radius:50%;background:rgba(200,233,255,0.55)}
.pg-header .title-block .meta .ref{color:rgba(255,255,255,0.88);letter-spacing:0.06em}
.pg-header .disc{
  width:460px;padding:0 32px 0 24px;border-left:1px solid rgba(255,255,255,0.3);height:60px;
  font-size:8px;line-height:1.35;color:rgba(255,255,255,0.88);display:flex;align-items:center;overflow:hidden;
}

/* ── NAV TABS ── */
.pg-nav{
  position:absolute;top:110px;left:48px;right:48px;height:40px;
  display:flex;align-items:center;gap:14px;font-family:'Montserrat';font-size:16px;z-index:4;
}
.pg-nav .mark{width:54px;height:1px;background:var(--cyan);position:relative;margin-right:4px}
.pg-nav .mark::before{
  content:'';position:absolute;left:30px;top:-10px;width:20px;height:20px;border-radius:50%;
  border:1.5px solid var(--cyan);background:#fff;
}
.pg-nav .mark::after{
  content:'+';position:absolute;left:34px;top:-12px;font-size:17px;color:var(--cyan);line-height:1;font-weight:300;z-index:1;
}
.pg-nav a{text-decoration:none;color:inherit}
.pg-nav .tab{color:#9aa3af;font-weight:500;letter-spacing:0;white-space:nowrap}
.pg-nav .tab.active{color:var(--navy);font-weight:700;letter-spacing:-0.01em}
.loc-over .lo-tile span.map-cta{pointer-events:none}
.pg-nav .div{color:#cbd5e1;font-weight:300}
/* Documents (SharePoint) button — pinned to the right of the nav on every page
   except the contact page (which keeps its own CTA). */
.pg-nav .nav-docs{
  margin-left:auto;display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:16px;background:var(--navy);color:#fff !important;
  font-size:11px;font-weight:700;letter-spacing:0.02em;white-space:nowrap;
}
.pg-nav .nav-docs::after{content:'↗';font-weight:400;font-size:12px}

/* ── BODY AREA (hard-clamped) ── */
.pg-body{position:absolute;top:170px;left:48px;right:48px;height:584px;overflow:hidden}

/* ─────── COVER (navy gradient, optional hero photo) ─────── */
.cover{
  position:relative;width:100%;height:100%;color:#fff;
  background:linear-gradient(160deg,#061d42 0%,#08316F 40%,#0a4a8a 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;text-align:center;
}
/* chosen cover photo sits behind, under a strong navy wash so text stays legible */
.cover .cover-bg{position:absolute;inset:0;background:#08316F;z-index:0;overflow:hidden}
.cover .cover-bg::after{content:'';position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(6,29,66,0.88) 0%,rgba(8,49,111,0.82) 45%,rgba(10,74,138,0.76) 100%)}
.cover > *:not(.cover-bg){position:relative;z-index:1}
.cover .ref-tag{position:absolute;top:50px;right:60px;font-family:'Montserrat';font-weight:600;font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.35)}
.cover .wordmark{margin-bottom:40px}
.cover .wordmark .wm-main{font-family:'Montserrat';font-weight:700;font-size:30px;letter-spacing:0.5em;color:#fff;line-height:1}
.cover .wordmark .wm-line{width:200px;height:2px;background:var(--cyan);margin:10px auto}
.cover .wordmark .wm-sub{font-family:'Montserrat';font-weight:400;font-size:11px;letter-spacing:0.7em;color:var(--cyan)}
.cover .badge{
  display:inline-block;font-family:'Montserrat';font-weight:700;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:#fff;
  background:var(--cyan);padding:7px 22px;border-radius:4px;margin-bottom:28px;
}
.cover .c-loc{font-family:'Montserrat';font-weight:600;font-size:14px;letter-spacing:0.18em;color:var(--cyan);text-transform:uppercase;margin-bottom:18px}
.cover .c-title{font-family:'Montserrat';font-weight:700;font-size:32px;line-height:1.25;color:#fff;max-width:780px;margin-bottom:24px}
.cover .price-box{
  text-align:center;border:1px solid rgba(0,182,255,0.3);border-radius:10px;padding:18px 44px;background:rgba(0,182,255,0.08);margin-top:8px;
}
.cover .price-label{font-family:'Montserrat';font-weight:600;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--cyan);margin-bottom:6px}
.cover .price-val{font-family:'Montserrat';font-weight:800;font-size:38px;color:#fff;letter-spacing:0.01em}
.cover .footer{position:absolute;bottom:30px;left:60px;right:60px;text-align:center;font-family:'Montserrat';font-size:9px;letter-spacing:0.18em;color:rgba(255,255,255,0.4);text-transform:uppercase}

/* ─────── DIVIDER ─────── */
.divider{
  width:100%;height:100%;
  background:linear-gradient(90deg,#1FB6FF 0%,#0A66C2 50%,#08316F 100%);
  display:flex;align-items:center;justify-content:center;
}
.divider .wm{font-family:'Montserrat';font-weight:400;font-size:34px;color:#fff;letter-spacing:0.55em;text-align:center}
.divider .wm small{display:block;font-size:14px;letter-spacing:0.8em;font-weight:300;margin-top:8px;opacity:0.95}

/* ─────── ACTIVA ─────── */
.activa{display:flex;gap:0;height:100%;align-items:stretch}
.activa .left{
  width:55%;border:1px solid var(--border);border-radius:4px;padding:22px 26px 22px;background:#fff;
  display:flex;flex-direction:column;z-index:2;min-height:0;
}
.activa .a-title{font-family:'Montserrat';font-weight:800;font-size:18px;color:var(--navy);line-height:1.25;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px;flex-shrink:0}
.activa .a-label{font-size:13px;color:var(--grey-text);margin-bottom:6px;flex-shrink:0}
.activa .a-val{font-size:14px;color:#111;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px;flex-shrink:0}
/* No list markers anywhere — bullet glyphs flatten onto the background when the
   PDF is imported into Canva, so lists render as clean, editable text lines. */
.activa .a-bullets{list-style:none;padding-left:0;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px;overflow:hidden;flex:1;min-height:0}
.activa .a-bullets li{font-size:12.5px;color:#111;line-height:1.45;margin-bottom:6px;break-inside:avoid}
.activa .a-bullets.cols-2{column-count:2;column-gap:24px;padding-left:0;list-style:none}
.activa .a-bullets.cols-2 li{padding-left:0;font-size:11.5px;line-height:1.4}
.activa .a-price{flex-shrink:0;font-family:'Montserrat';font-weight:600;font-size:18px;color:var(--navy);display:flex;align-items:baseline;gap:12px;padding-top:4px}
.activa .a-price .val{color:var(--cyan);font-weight:900;font-size:28px;letter-spacing:0.01em}
.activa .right{
  flex:1;margin-left:-30px;margin-top:20px;margin-bottom:20px;
  background:#eef2f6;border-radius:4px;box-shadow:0 4px 18px rgba(0,0,0,0.08);
  position:relative;overflow:hidden;
}
.activa .right img.a-photo{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center;
}

/* ─────── DETAILS (asset data tables) ─────── */
.details{height:100%;display:flex;flex-direction:column;gap:14px;overflow:hidden}
.details .d-title{font-family:'Montserrat';font-weight:800;font-size:16px;color:var(--navy);line-height:1.25;padding-bottom:9px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:baseline;justify-content:space-between;gap:12px;letter-spacing:0.01em}
.details .d-title .d-suffix{font-family:'Montserrat';font-weight:500;font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--grey-text)}

/* KPI strip — headline numbers above the tables on the first details page */
.details .kpi-strip{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:10px;flex-shrink:0}
.details .kpi-cell{
  padding:12px 14px;border-radius:5px;background:#f6f8fb;border:1px solid var(--border);
  border-left:3px solid var(--cyan);display:flex;flex-direction:column;justify-content:center;min-height:78px;
}
.details .kpi-cell .kpi-label{font-family:'Montserrat';font-weight:500;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--grey-text);margin-bottom:4px}
.details .kpi-cell .kpi-value{font-family:'Montserrat';font-weight:800;font-size:20px;color:var(--navy);line-height:1.05;letter-spacing:-0.01em}
.details .kpi-cell .kpi-sub  {font-size:9.5px;color:var(--grey-text);line-height:1.3;margin-top:4px;font-weight:400}

.details .d-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;flex:1;min-height:0}
.details .d-grid.one{grid-template-columns:1fr}
/* Content-sized card deck — cards take their natural height and are distributed
   top-to-bottom so a page is never clipped nor stranded half-empty in the middle. */
.details .d-deck{flex:1;min-height:0;display:flex;flex-direction:column;gap:14px;justify-content:space-between}
.details .d-deck.few{justify-content:center}
.details .d-pair{display:flex;gap:20px;align-items:stretch;min-height:0}
.details .d-pair > .d-card{flex:1;min-width:0}
.details .d-card{
  border:1px solid var(--border);border-radius:5px;padding:13px 16px 12px;background:#fff;
  display:flex;flex-direction:column;min-height:0;overflow:hidden;
  box-shadow:0 1px 2px rgba(15,30,60,0.03);
}
.details .d-card.wide{grid-column:1 / -1}
.details .d-head{
  font-family:'Montserrat';font-weight:700;font-size:10.5px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--navy);padding-bottom:8px;margin-bottom:9px;flex-shrink:0;
  display:flex;align-items:baseline;justify-content:space-between;gap:8px;
  position:relative;
}
.details .d-head::after{
  content:'';position:absolute;left:0;bottom:0;width:32px;height:2px;background:var(--cyan);
}
.details .d-head .d-head-tag{font-family:'Montserrat';font-weight:500;font-size:9.5px;letter-spacing:0.06em;text-transform:none;color:var(--grey-text)}
.details table{width:100%;border-collapse:collapse;font-size:11.5px;color:#111;table-layout:fixed}
.details td{padding:4.5px 10px;vertical-align:top;word-wrap:break-word;overflow-wrap:anywhere;line-height:1.3;border:none}
.details td:first-child{color:var(--grey-text);width:58%;padding-left:10px;font-weight:500}
.details td:last-child{text-align:right;font-weight:700;color:var(--navy);padding-right:10px}
/* Zebra banding reads cleaner than hairline row borders */
.details tbody tr:nth-child(odd){background:#f5f8fc}
.details tbody tr{break-inside:avoid}
.details .d-bullets{list-style:none;margin:0;padding-left:0;columns:2;column-gap:22px}
.details .d-bullets li{font-size:11.5px;color:#111;line-height:1.45;margin-bottom:6px;break-inside:avoid}
.details .d-card.narrow .d-bullets{columns:1}

/* Consolidated unit-level table — per-row: Unit / Surface / step rents */
.details .u-card{padding:11px 14px 12px}
.details .u-summary{
  display:flex;flex-wrap:wrap;gap:0 22px;padding:4px 0 7px;margin-bottom:6px;
  border-bottom:1px solid var(--border);
}
.details .u-summary .u-sum-item{display:flex;flex-direction:column;gap:1px}
.details .u-summary .u-sum-k{font-size:8.5px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--grey-text)}
.details .u-summary .u-sum-v{font-family:'Montserrat';font-weight:700;font-size:12.5px;color:var(--navy)}
.details .u-table{width:100%;border-collapse:collapse;font-size:10px;color:#111;table-layout:fixed}
.details .u-table thead th{
  font-family:'Montserrat';font-weight:700;font-size:8.5px;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--grey-text);padding:5px 5px 5px 0;border-bottom:1.5px solid var(--navy);
  text-align:right;vertical-align:bottom;line-height:1.15;
}
.details .u-table thead th.l{text-align:left}
.details .u-table thead th .sub{display:block;font-size:7.5px;font-weight:500;letter-spacing:0.06em;color:#9aa3af;margin-top:1px}
.details .u-table tbody tr{break-inside:avoid}
.details .u-table tbody tr:nth-child(odd){background:#fafbfc}
.details .u-table tbody td{padding:3.5px 5px 3.5px 0;border-bottom:1px solid #eef1f5;vertical-align:top;line-height:1.22;word-wrap:break-word;overflow-wrap:anywhere}
.details .u-table tbody td.l{text-align:left;font-weight:600;color:#111;font-size:10.5px}
.details .u-table tbody td.l .u-sub{display:block;font-size:8.5px;color:var(--grey-text);font-weight:400;margin-top:0;letter-spacing:0.01em;line-height:1.25}
.details .u-table tbody td.r{text-align:right;font-weight:600;color:var(--navy);font-size:10.5px}
.details .u-table tbody td.r.area{color:#111;font-weight:500}
.details .u-table tbody tr:last-child td{border-bottom:none}

/* ─────── AERIAL VIEW ─────── */
.aerial{position:relative;width:100%;height:100%;display:flex;gap:24px;align-items:stretch}
.aerial .a-frame{flex:1;position:relative;border-radius:6px;overflow:hidden;background:#101820;box-shadow:0 4px 18px rgba(0,0,0,0.12)}
.aerial .a-img{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:100%;height:100%;object-fit:cover;object-position:center;
  image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges;
}
.aerial .a-overlay{position:absolute;inset:0;pointer-events:none}
/* SVG polygon — the actual (editable) red property outline. Points are in a
   0..100 viewBox so they're resolution-independent and stored compactly. */
.aerial .a-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.aerial .a-svg .a-poly{
  fill:rgba(226,35,26,0.12);
  stroke:#E2231A;stroke-width:2.4;stroke-linejoin:round;
  vector-effect:non-scaling-stroke;
}
.aerial .a-svg .a-poly.dashed{stroke-dasharray:7 5}
/* Fallback rectangle outline (used when no polygon points are supplied) */
.aerial .a-boundary{
  position:absolute;left:18%;right:18%;top:24%;bottom:24%;
  border:2.4px dashed #E2231A;border-radius:4px;
  box-shadow:0 0 0 9999px rgba(8,31,68,0.18);
}
.aerial .a-pin{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:16px;height:16px;border-radius:50%;background:#E2231A;
  border:3px solid #fff;box-shadow:0 0 0 6px rgba(226,35,26,0.22);
}
.aerial .a-caption{
  position:absolute;left:18px;bottom:18px;padding:8px 14px;border-radius:24px;
  background:rgba(8,31,68,0.85);color:#fff;font-family:'Montserrat';font-weight:600;
  font-size:11px;letter-spacing:0.16em;text-transform:uppercase;
}
.aerial .a-side{
  width:280px;display:flex;flex-direction:column;gap:14px;padding:8px 0;justify-content:center;
}
.aerial .a-side .a-eyebrow{font-family:'Montserrat';font-weight:700;font-size:10px;letter-spacing:0.32em;color:var(--cyan);text-transform:uppercase}
.aerial .a-side .a-title{font-family:'Montserrat';font-weight:800;font-size:22px;color:var(--navy);line-height:1.2}
.aerial .a-side .a-rule{width:36px;height:2px;background:var(--cyan)}
.aerial .a-side .a-row{display:flex;flex-direction:column;gap:2px;padding:8px 0;border-top:1px solid var(--border)}
.aerial .a-side .a-row .k{font-size:10px;color:var(--grey-text);letter-spacing:0.12em;text-transform:uppercase;font-weight:600}
.aerial .a-side .a-row .v{font-size:14px;color:#111;font-weight:600}
.aerial .a-side .a-maplink{display:inline-flex;align-items:center;gap:7px;align-self:flex-start;
  font-family:'Montserrat';font-weight:700;font-size:12px;color:#fff;background:var(--cyan);
  padding:9px 14px;border-radius:6px;text-decoration:none;line-height:1.2;letter-spacing:0.01em}
.aerial .a-side .a-maplink::before{content:'📍'}
/* full-image clickable overlay → the whole aerial opens Google Maps */
.aerial .a-frame-link{position:absolute;inset:0;z-index:5;display:block}
.aerial .a-frame .map-cta,.loc-over .lo-tile .map-cta{position:absolute;right:10px;top:10px;z-index:6;
  font-family:'Montserrat';font-weight:700;font-size:10px;color:#fff;background:rgba(8,31,68,0.86);
  padding:6px 10px;border-radius:5px;letter-spacing:0.03em;display:inline-flex;align-items:center;gap:5px;text-decoration:none}
.aerial .a-frame .map-cta::before,.loc-over .lo-tile .map-cta::before{content:'📍'}
.aerial .a-side .a-legend{margin-top:10px;font-size:10.5px;color:var(--grey-text);line-height:1.45;display:flex;align-items:flex-start;gap:8px}
.aerial .a-side .a-legend::before{content:'';width:14px;height:14px;border:1.5px dashed #E2231A;border-radius:3px;flex-shrink:0;margin-top:1px}

/* ─────── PER-BUILDING SECTION DIVIDER ─────── */
.asset-divider{
  width:100%;height:100%;position:relative;overflow:hidden;
  background:linear-gradient(160deg,#061d42 0%,#08316F 45%,#0a4a8a 100%);
  display:flex;flex-direction:column;justify-content:center;padding:0 70px;color:#fff;
}
.asset-divider .ad-index{font-family:'Montserrat';font-weight:800;font-size:90px;line-height:0.9;color:rgba(0,182,255,0.25);letter-spacing:-0.02em}
.asset-divider .ad-eyebrow{font-family:'Montserrat';font-weight:700;font-size:12px;letter-spacing:0.3em;text-transform:uppercase;color:var(--cyan);margin:18px 0 10px}
.asset-divider .ad-title{font-family:'Montserrat';font-weight:800;font-size:34px;line-height:1.18;max-width:760px}
.asset-divider .ad-addr{font-size:15px;color:rgba(255,255,255,0.78);margin-top:14px;max-width:620px}
.asset-divider .ad-chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}
.asset-divider .ad-chip{border:1px solid rgba(0,182,255,0.35);background:rgba(0,182,255,0.08);border-radius:6px;padding:10px 16px}
.asset-divider .ad-chip .k{font-size:9px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--cyan)}
.asset-divider .ad-chip .v{font-family:'Montserrat';font-weight:800;font-size:18px;color:#fff;margin-top:3px}

/* ─────── PORTFOLIO OVERVIEW (multi-building summary on Activa) ─────── */
.pf{height:100%;display:flex;flex-direction:column;gap:14px}
.pf .pf-head{font-family:'Montserrat';font-weight:800;font-size:18px;color:var(--navy);line-height:1.25;padding-bottom:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.pf .pf-sub{font-size:12.5px;color:var(--grey-text);margin-top:-6px;flex-shrink:0}
.pf .pf-list{display:flex;flex-direction:column;gap:9px;flex:1;min-height:0}
.pf .pf-item{
  display:grid;grid-template-columns:30px 1fr 130px 120px;align-items:center;gap:14px;
  border:1px solid var(--border);border-left:3px solid var(--cyan);border-radius:6px;
  padding:11px 16px;background:#fff;box-shadow:0 1px 2px rgba(15,30,60,0.03);
}

<script>
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fileUrl(p){
  if(!p) return '';
  const s = String(p);
  if(/^(https?:|data:|file:)/.test(s)) return s;
  if(s.startsWith('/')) return 'file://' + s;
  return s;
}
function normalize(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,''); }
// Build a real Google Maps URL from an address (so the Locatie link opens the
// map, not the local map image). Returns '' when there's nothing to search.
function mapsUrlFor(addr){
  const a = String(addr||'').trim();
  if(!a) return '';
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(a);
}
// A maps LINK must be a real web URL — never a local image path (file://…). The
// map-image field and the maps-link field used to share one key, so replacing
// the image could make the link open the picture. This guards against that.
function httpUrlOnly(u){ return (typeof u==='string' && /^https?:\/\//i.test(u.trim())) ? u.trim() : ''; }
// Render the red property outline as an SVG polygon when points are supplied,
// else a dashed red fallback rectangle. `points` is an array of [x,y] in 0..100.
function boundarySvg(points, dashed){
  if(!Array.isArray(points) || points.length < 3) return '<div class="a-boundary"></div>';
  const pts = points.map(p=>`${Number(p[0]).toFixed(2)},${Number(p[1]).toFixed(2)}`).join(' ');
  return `<svg class="a-svg" viewBox="0 0 100 100" preserveAspectRatio="none">`
       + `<polygon class="a-poly${dashed?' dashed':''}" points="${esc(pts)}"></polygon></svg>`;
}
// Per-photo focal point → CSS object-position (editor "crop focus"). focusMap is
// keyed by the photo's url; value is [x,y] in 0..100. Default center when unset.
function objPos(focusMap, key){
  const f = focusMap && focusMap[key];
  if (!Array.isArray(f) || f.length < 2) return '';
  const x = Number(f[0]), y = Number(f[1]);
  if (isNaN(x) || isNaN(y)) return '';
  return ` style="object-position:${x}% ${y}%"`;
}

// Measure the REAL rendered height of each detail card off-screen, at its true
// column width (wide = full body 1027px, half = 503px). Pagination uses these
// instead of row-count estimates so a card is never cropped and pages aren't
// left half-empty. Returns an array of pixel heights aligned to `items`.
function measureCardHeights(items){
  const host = document.createElement('div');
  host.style.cssText = 'position:absolute;left:-99999px;top:0;visibility:hidden;pointer-events:none';
  const details = document.createElement('div');
  details.className = 'details';
  host.appendChild(details);
  document.body.appendChild(host);
  const out = items.map(it => {
    const wrap = document.createElement('div');
    wrap.style.width = (it.wide ? 1027 : 503) + 'px';
    wrap.innerHTML = it.html;
    details.appendChild(wrap);
    const el = wrap.firstElementChild;
    const h = el ? el.offsetHeight : 0;
    details.removeChild(wrap);
    return h;
  });
  document.body.removeChild(host);
  return out;
}

window.loadLongTeaser = function(data, brandName){
  data = data || {};

  // ── Selectable font ("police") — overrides the default Montserrat everywhere.
  // Curated list with weights known to exist on Google Fonts (css2 400s if not).
  const FONTS_MAP = {
    'Montserrat':'300;400;500;600;700;800;900',
    'Inter':'300;400;500;600;700;800;900',
    'Poppins':'300;400;500;600;700;800;900',
    'Raleway':'300;400;500;600;700;800;900',
    'Work Sans':'300;400;500;600;700;800;900',
    'Roboto':'300;400;500;700;900',
    'Open Sans':'300;400;500;600;700;800',
    'Lato':'300;400;700;900',
    'Nunito':'300;400;500;600;700;800',
    'Playfair Display':'400;500;600;700;800;900',
    'Merriweather':'300;400;700',
  };
  const FONT = (data.font_family && FONTS_MAP[data.font_family]) ? data.font_family : 'Montserrat';
  if (FONT !== 'Montserrat') {
    const l = document.createElement('link'); l.rel = 'stylesheet';
    l.href = `https://fonts.googleapis.com/css2?family=${FONT.replace(/ /g,'+')}:wght@${FONTS_MAP[FONT]}&display=swap`;
    document.head.appendChild(l);
  }
  const fo = document.createElement('style');
  // Keep 'Noto Color Emoji' in the stack so 📍/↗ icons still render under the override.
  fo.textContent = `#doc, #doc *{font-family:'${FONT}','Noto Color Emoji',sans-serif !important}`;
  document.head.appendChild(fo);

  const T = {
    activa:  data.tab_activa   || 'Activa',
    loc:     data.tab_locatie  || 'Locatie',
    photos:  data.tab_photos   || "Foto's",
    plans:   data.tab_plans    || 'Plannen',
    sales:   data.tab_sales    || 'Verkoopvoorwaarden',
  };

  // Language-aware UI defaults so a Flemish/English teaser never falls back to
  // French copy. Per-job overrides (section_labels / details_labels) still win.
  const LANG = String(data.language || 'FR').toUpperCase();
  const I18N = {
    FR:{aerial:'Vue aérienne',activa:"Présentation de l’actif",details:'Détails financiers & techniques',locatie:'Localisation',photos:'Reportage photo',plans:'Plans',sales:'Conditions de vente',asset:'Actif',maplink:'Cliquez pour visualiser sur Google Maps',
        dl:{details:'Détails de l’actif',financials:'Synthèse financière',valuation:'Valorisation',specs:'Spécifications techniques',income:'Revenus locatifs',leases:'Conditions de bail',amenities:'Caractéristiques',surfaces:'Surfaces',other:'Autres',continued:'(suite)'}},
    NL:{aerial:'Luchtbeeld & perceel',activa:'Voorstelling van het pand',details:'Financiële & technische details',locatie:'Ligging',photos:'Fotoreportage',plans:'Plannen',sales:'Verkoopvoorwaarden',asset:'Pand',maplink:'Klik om te bekijken op Google Maps',
        dl:{details:'Activadetails',financials:'Financieel overzicht',valuation:'Prijsopbouw',specs:'Technische specificaties',income:'Huurinkomsten',leases:'Huurvoorwaarden',amenities:'Kenmerken',surfaces:'Oppervlaktedetails',other:'Overige',continued:'(vervolg)'}},
    EN:{aerial:'Aerial view',activa:'Asset presentation',details:'Financial & technical details',locatie:'Location',photos:'Photo report',plans:'Plans',sales:'Sales conditions',asset:'Asset',maplink:'Click to view on Google Maps',
        dl:{details:'Asset details',financials:'Financial summary',valuation:'Valuation breakdown',specs:'Technical specs',income:'Rental income',leases:'Lease terms',amenities:'Features & amenities',surfaces:'Surface details',other:'Other',continued:'(continued)'}},
  };
  const L = I18N[LANG] || I18N.FR;

  const title     = data.title || '';
  const subtitle  = data.subtitle || '';
  const ref       = data.reference || '';
  const address   = data.address || '';
  const price     = data.price || '';
  const priceLbl  = data.price_label_total || 'Totale prijs:';
  const addrLbl   = data.address_label || 'Adres:';
  const descLbl   = data.description_label || 'Beschrijving :';
  const mapLinkTxt= data.map_link_text || L.maplink;
  // Prefer an explicit maps URL, else a real Google-Maps search built from the
  // address. Legacy map_url is honoured ONLY when it's a real web URL, so a
  // map image stored there can never become the link.
  const mapsUrl   = httpUrlOnly(data.google_maps_url) || httpUrlOnly(data.map_url) || mapsUrlFor(data.address || '') || '#';

  const photos = (data.photos||[]).filter(Boolean);
  const plans  = (data.plans||[]).filter(Boolean);
  const maps   = (data.maps||[]).filter(Boolean);
  // Map belongs ONLY on the Locatie page (never on the Activa page). The
  // dedicated street_map image field wins; legacy map_url is used as the image
  // only when it isn't a web URL (i.e. it's actually a stored picture).
  const streetMap  = data.street_map || maps[0] || (httpUrlOnly(data.map_url) ? '' : (data.map_url || '')) || '';
  // Activa right panel shows a property PHOTO (exterior preferred), never a map
  const activaPhoto = data.activa_photo || photos[0] || '';
  // Cover photo: prefer explicit cover_photo, then first photo (user uploads exterior first)
  const coverPhoto = data.cover_photo || photos[0] || '';
  // Sales photo: prefer explicit, then a different photo from cover, else first
  const salesPhoto = data.sales_photo || photos[1] || photos[0] || '';
  // Back photo: optional; if absent we use gradient only
  const backPhoto  = data.back_photo || '';

  // Description bullets — filter out duplicates of title and ref
  let bullets = [];
  if(Array.isArray(data.description_bullets)) bullets = data.description_bullets.filter(Boolean);
  else if(data.description){
    bullets = String(data.description).split(/\s*•\s*|\s*\u2022\s*|\n+/).map(s=>s.trim()).filter(Boolean);
  }
  const titleNorm = normalize(title).slice(0,40);
  const refNorm   = normalize(ref);
  bullets = bullets.filter(b=>{
    const bn = normalize(b);
    if(!bn) return false;
    if(titleNorm && bn.includes(titleNorm)) return false;
    if(refNorm && bn.includes(refNorm))     return false;
    return true;
  });

  const agentName  = data.agent_name  || 'Adam Meri';
  const agentRole  = data.agent_role  || 'Head of Accounts';
  const agentPhone = data.agent_phone || '+32 2 550 36 87';
  const agentEmail = data.agent_email || 'adam.meri@rodschinson.com';
  const docsUrl    = data.sharepoint_url || data.expertise_url || '#';
  const docsLabel  = data.docs_label   || 'Aanvullende documenten';
  const docsHelper = data.docs_helper  || 'Klik hier om de bestandsdocumenten te downloaden';
  // Short label for the docs button shown in the nav on every page (kept concise).
  const docsNavLabel = data.docs_nav_label || ({FR:'Documents',NL:'Documenten',EN:'Documents'}[LANG] || 'Documents');
  const hasDocs    = !!docsUrl && docsUrl !== '#';

  // Location / name split from title "LOCATION: Name"
  let loc = '', name = title;
  const mm = title.match(/^(.*?):\s*(.+)$/);
  if(mm){ loc = mm[1].trim(); name = mm[2].trim(); }

  const disclaimer = data.disclaimer || '*These informations are approximate and given for indicative purposes. As these elements must be confirmed, specified or corrected, no decision may be made on the basis of this document nor engage the responsibility of Rodschinson Investment. For more information, please contact one of our Investment Portfolio Managers at the Brussels office: Tel: +32 (0) 2 550 36 87, Email: assets.brussels@rodschinson.com. Rodschinson Investment - Bastion Tower - Place du Champ de Mars n°5 - 1050 Brussels (BE)';

  // Anchors for clickable nav
  const A = { activa:'sec-activa', details:'sec-details', loc:'sec-loc', aerial:'sec-aerial', photos:'sec-photos', plans:'sec-plans', sales:'sec-sales' };

  // Aerial view — derived from explicit aerial_view, else fallback to the satellite map.
  const aerialImg = data.aerial_view || maps[0] || data.map_url || '';

  // Visible tabs — drop any section that has no content so the nav only
  // advertises pages that actually exist in this teaser.
  const navTabs = [
    { key:'a',  label:T.activa, show:true },
    { key:'l',  label:T.loc,    show:true },
    { key:'ae', label:(data.tab_aerial || (data.section_labels && data.section_labels.aerial) || L.aerial), show: !!aerialImg },
    { key:'p',  label:T.photos, show:photos.length > 0 },
    { key:'pl', label:T.plans,  show:plans.length  > 0 },
    { key:'s',  label:T.sales,  show:true },
  ].filter(t => t.show);

  // Per-section header copy — short, contextual, no more title repetition.
  const SL = Object.assign({
    activa:   L.activa,
    details:  L.details,
    locatie:  L.locatie,
    aerial:   L.aerial,
    photos:   L.photos,
    plans:    L.plans,
    sales:    L.sales,
  }, data.section_labels || {});

  // Short location label (text before the first colon in title) — used in the
  // header meta line so the asset is still identifiable without repeating the
  // full title on every page.
  const shortLoc = (loc || (title.split(/[\:–—]/)[0] || '').trim()).slice(0, 50);

  function header(activeTab, sectionLabel, showTitle){
    const tab = (key, label) => {
      const active = activeTab === key;
      const href = key==='a'?A.activa : key==='l'?A.loc : key==='ae'?A.aerial : key==='p'?A.photos : key==='pl'?A.plans : A.sales;
      return `<a href="#${href}"><span class="tab${active?' active':''}">${esc(label)}</span></a>`;
    };
    const navInner = navTabs
      .map((t,i)=> (i>0 ? '<span class="div">|</span>' : '') + tab(t.key, t.label))
      .join('');
    // Title (shortLoc) only on the first content page; ref stays on every page.
    const metaBits = [];
    if (showTitle && shortLoc) metaBits.push(`<span>${esc(shortLoc)}</span>`);
    if (ref)      metaBits.push(`<span class="ref">${esc(ref)}</span>`);
    const meta = metaBits.join('<span class="dot"></span>');
    // Docs button on every page except the contact page (which keeps its own CTA).
    const docsBtn = (hasDocs && activeTab !== 's')
      ? `<a class="nav-docs" href="${esc(docsUrl)}" target="_blank">${esc(docsNavLabel)}</a>` : '';
    return `
      <div class="pg-header">
        <div class="logo">
          <div class="l1">RODSCHINSON</div>
          <div class="l2">INVESTMENT</div>
        </div>
        <div class="sep"></div>
        <div class="title-block">
          <div class="sec">${esc(sectionLabel || '')}</div>
          <div class="meta">${meta}</div>
        </div>

      </div>
      <div class="pg-nav">
        <div class="mark"></div>
        ${navInner}
        ${docsBtn}
      </div>`;
  }

  const pages = [];
  let sectionAnchor = ''; // injected into next pushed page as id="..."
  let currentSection = 'cover'; // updated whenever a new section starts; gates section_visibility
  const SECTION_VIS = (data.section_visibility && typeof data.section_visibility === 'object') ? data.section_visibility : {};
  const pushPage = (inner, extraClass) => {
    if (SECTION_VIS[currentSection] === false) { sectionAnchor = ''; return; }
    const id = sectionAnchor ? ` id="${sectionAnchor}"` : '';
    sectionAnchor = '';
    pages.push(`<div class="page${extraClass?' '+extraClass:''}"${id}>${inner}</div>`);
  };

  // Plan image with optional MANUAL rotation from the editor (data.plan_rotation
  // keyed by url, degrees 0/90/180/270). When set it overrides the auto portrait
  // rotation (the .plan-manual marker tells rotatePortraitPlans to skip it).
  const _planRot = (data.plan_rotation && typeof data.plan_rotation === 'object') ? data.plan_rotation : {};
  const planImgHtml = (pl) => {
    const raw = _planRot[pl];
    const manual = (raw !== undefined && raw !== null && raw !== '');
    const deg = manual ? ((((parseInt(raw, 10) || 0) % 360) + 360) % 360) : 0;
    const cls = ['plan-img'];
    if (manual) cls.push('plan-manual');
    if (deg === 90) cls.push('rot-90'); else if (deg === 180) cls.push('rot-180'); else if (deg === 270) cls.push('rot-270');
    return `<img class="${cls.join(' ')}" src="${esc(fileUrl(pl))}" alt="plan">`;
  };

  // ══════════════════════════════════════════════════════════════════════
  // PORTFOLIO MODE — when data.assets[] is present the teaser is a multi-
  // building dossier. We render a shared cover + portfolio overview + company
  // financials + a location overview (cadastral plans live HERE, with the map),
  // then one organised block PER building (intro → presentation → details →
  // photos → aerial with red outline), then a shared sales page. Single-asset
  // teasers skip all of this and fall through to the legacy flow below.
  // ══════════════════════════════════════════════════════════════════════
  const assets = Array.isArray(data.assets) ? data.assets.filter(a => a && typeof a === 'object') : [];
  if (assets.length){
    const DL = Object.assign({}, L.dl, data.details_labels || {});
    const locImages = Array.isArray(data.location_images) ? data.location_images.filter(Boolean) : [];

    const anyPhotos = assets.some(a => (a.photos||[]).length) || photos.length;
    const anyAerial = assets.some(a => a.aerial_view || (Array.isArray(a.boundary)&&a.boundary.length)) || locImages.length || aerialImg;
    const anyPlans  = plans.length || assets.some(a => (a.plans||[]).length);
    const navTabsP = [
      {key:'a',  label:T.activa, show:true},
      {key:'l',  label:T.loc,    show:true},
      {key:'ae', label:(SL.aerial || data.tab_aerial || L.aerial), show:!!anyAerial},
      {key:'p',  label:T.photos, show:!!anyPhotos},
      {key:'pl', label:T.plans,  show:!!anyPlans},
      {key:'s',  label:T.sales,  show:true},
    ].filter(t => t.show);

    function headerP(activeKey, sectionLabel, metaText, showTitle){
      const hrefFor = k => k==='a'?A.activa : k==='l'?A.loc : k==='ae'?A.aerial : k==='p'?A.photos : k==='pl'?A.plans : A.sales;
      const navInner = navTabsP.map((t,i)=>{

      // portfolio title (shortLoc) shows only on the first content page. ref stays.
      const metaBits = [];
      if (metaText) metaBits.push(`<span>${esc(metaText)}</span>`);
      else if (showTitle && shortLoc) metaBits.push(`<span>${esc(shortLoc)}</span>`);
      if (ref) metaBits.push(`<span class="ref">${esc(ref)}</span>`);
      const docsBtn = (hasDocs && activeKey !== 's')
        ? `<a class="nav-docs" href="${esc(docsUrl)}" target="_blank">${esc(docsNavLabel)}</a>` : '';
      return `
        <div class="pg-header">
          <div class="logo"><div class="l1">RODSCHINSON</div><div class="l2">INVESTMENT</div></div>
          <div class="sep"></div>
          <div class="title-block"><div class="sec">${esc(sectionLabel||'')}</div><div class="meta">${metaBits.join('<span class="dot"></span>')}</div></div>
          <div class="disc">${esc(disclaimer)}</div>
        </div>
        <div class="pg-nav"><div class="mark"></div>${navInner}${docsBtn}</div>`;
    }

    // ── generic table/bullets pagination (1 wide OR 2 half cards per page) ──
    const chunkArr = (a,n)=>{const o=[];for(let i=0;i<a.length;i+=n)o.push(a.slice(i,i+n));return o;};
    const rowTblP = rows => `<table><tbody>${rows.map(r=>`<tr><td>${esc(r.label||'')}</td><td>${esc(r.value||'')}</td></tr>`).join('')}</tbody></table>`;
    const bulletListP = items => `<ul class="d-bullets">${items.map(b=>`<li>${esc(b)}</li>`).join('')}</ul>`;
    // multi-column table (e.g. Post | 2025 | 2024) — denser than two stacked
    // single-value tables and reads cleanly across the page.
    function colTblP(columns, rows){
      const w0 = Math.max(34, 100 - (columns.length-1)*Math.min(28, Math.round(54/(columns.length-1))));
      const head = `<thead><tr>${columns.map((c,i)=>`<th class="${i===0?'l':''}"${i===0?` style="width:${w0}%"`:''}>${esc(c)}</th>`).join('')}</tr></thead>`;
      const body = `<tbody>${rows.map(r=>`<tr>${r.map((cell,i)=>`<td class="${i===0?'l':'r'}">${esc(cell==null?'':cell)}</td>`).join('')}</tr>`).join('')}</tbody>`;
      return `<table class="u-table">${head}${body}</table>`;
    }
    // Estimated rendered height (px) of a card — drives height-packing so a page
    // is never overfilled (which would clip text) nor near-empty.
    const CH_BASE=62, CH_ROW=24, CH_CROW=20, CH_CHEAD=18, CH_BULL=22, DECK_GAP=12;
    function cardHeight(c){
      if (c.kind==='coltable') return CH_BASE + CH_CHEAD + c.rows.length*CH_CROW;
      if (c.kind==='bullets')  return CH_BASE + Math.ceil(c.rows.length/2)*CH_BULL;
      return CH_BASE + c.rows.length*CH_ROW;
    }
    function makeCards(specs){
      const cards = [];
      for (const s of specs){
        if (s.columns && Array.isArray(s.rows2d) && s.rows2d.length){
          chunkArr(s.rows2d,14).forEach((c,i,arr)=>cards.push({head:s.head,kind:'coltable',columns:s.columns,rows:c,wide:true,tag:arr.length>1?`${i+1}/${arr.length}`:''}));
        } else if (s.bullets && s.bullets.length){
          if (s.bullets.length <= 14) cards.push({head:s.head,kind:'bullets',rows:s.bullets,wide:false});
          else chunkArr(s.bullets,22).forEach((c,i,arr)=>cards.push({head:s.head,kind:'bullets',rows:c,wide:true,tag:arr.length>1?`${i+1}/${arr.length}`:''}));
        } else if (s.rows && s.rows.length){
          if (s.rows.length <= 13) cards.push({head:s.head,kind:'table',rows:s.rows,wide:false});
          else chunkArr(s.rows,18).forEach((c,i,arr)=>cards.push({head:s.head,kind:'table',rows:c,wide:true,tag:arr.length>1?`${i+1}/${arr.length}`:''}));
        }
      }
      cards.forEach(c=>{ c.h = cardHeight(c); });
      return cards;
    }
    // Pack cards into pages by REAL height. Half cards pair up two-across (the
    // page row is as tall as the taller of the pair); wide cards span the row.
    // Each block is {type, cards[]}. First page is shorter when a KPI strip shows.
    function packByHeight(cards, firstBudget, restBudget){
      const pages=[]; let blocks=[], used=0, budget=firstBudget;
      const flush=()=>{ if(blocks.length){ pages.push(blocks); blocks=[]; used=0; budget=restBudget; } };
      for (let i=0;i<cards.length;i++){
        const c=cards[i];
        if (c.wide){
          if (used>0 && used+c.h>budget) flush();
          blocks.push({type:'wide',cards:[c]}); used+=c.h+DECK_GAP;
        } else {
          const n=cards[i+1];
          const pair = (n && !n.wide) ? [c,n] : [c];
          const ph = Math.max.apply(null, pair.map(x=>x.h));
          if (used>0 && used+ph>budget) flush();
          blocks.push({type:'pair',cards:pair}); used+=ph+DECK_GAP;
          if (pair.length===2) i++;
        }
      }
      flush();
      return pages;
    }
    function cardHtmlP(c){
      const cls=['d-card']; if(c.wide)cls.push('wide'); if(c.kind==='bullets'&&!c.wide)cls.push('narrow'); if(c.kind==='coltable')cls.push('u-card');
      const tag=c.tag?`<span class="d-head-tag">${esc(c.tag)}</span>`:'';
      const body=c.kind==='coltable'?colTblP(c.columns,c.rows):(c.kind==='table'?rowTblP(c.rows):bulletListP(c.rows));
      return `<div class="${cls.join(' ')}"><div class="d-head"><span>${esc(c.head)}</span>${tag}</div>${body}</div>`;
    }
    function pushDetail(sectionKey, anchor, navKey, headerLabel, dTitle, metaText, cardSpecs, kpiHtml){
      const cards = makeCards(cardSpecs);
      if (!cards.length) return;
      // Use REAL measured heights (fall back to the estimate) so nothing crops.
      const _mh = measureCardHeights(cards.map(c => ({ html: cardHtmlP(c), wide: !!c.wide })));
      cards.forEach((c, i) => { if (_mh[i]) c.h = _mh[i]; });
      const budget0 = kpiHtml ? 470 : 540;
      const pages = packByHeight(cards, budget0, 540);
      pages.forEach((blocks, idx)=>{
        currentSection = sectionKey;
        if (idx===0 && anchor) sectionAnchor = anchor;
        const suffix = idx===0 ? '' : `<span class="d-suffix">${esc(DL.continued||'(continued)')}</span>`;
        const deck = blocks.map(b=>{
          if (b.type==='pair' && b.cards.length===2) return `<div class="d-pair">${b.cards.map(cardHtmlP).join('')}</div>`;
          return cardHtmlP(b.cards[0]); // wide or lone half → full width
        }).join('');
        // Estimate how full the page is; a sparse page top-aligns (`.few`) so
        // its cards cluster cleanly instead of drifting apart with huge gaps,
        // while a well-filled page distributes its small slack (space-between).
        const fill = blocks.reduce((s,b)=> s + Math.max.apply(null, b.cards.map(c=>c.h)) + DECK_GAP, 0);
        const few = (blocks.length <= 1 || fill < (idx===0?budget0:540) * 0.7) ? ' few' : '';
        pushPage(`
          ${headerP(navKey, headerLabel, metaText)}
          <div class="pg-body"><div class="details">
            <div class="d-title"><span>${esc(dTitle)}</span>${suffix}</div>
            ${idx===0 ? (kpiHtml||'') : ''}
            <div class="d-deck${few}">${deck}</div>
          </div></div>`);
      });
    }
    function pushGallery(sectionKey, anchor, photoList, metaText, layout, focusMap){
      const ph = (photoList||[]).filter(Boolean);
      if (!ph.length) return;
      let first = true, i = 0;
      const page = (slice, cls)=>{
        currentSection = sectionKey;
        if (first && anchor){ sectionAnchor = anchor; first = false; }
        pushPage(`
          ${headerP('p', SL.photos, metaText)}
          <div class="pg-body"><div class="${cls}">
            ${slice.map(p=>`<div class="photo-tile"><img class="fill-img"${objPos(focusMap, p)} src="${esc(fileUrl(p))}" alt=""></div>`).join('')}
          </div></div>`);
      };
      // Fixed layout override ("Photos per page" in the editor): N tiles per page
      // in a clean uniform grid, so wide photos aren't cropped by a denser auto grid.
      const N = parseInt(layout, 10);
      if (N >= 1 && N <= 4){
        while (i < ph.length){ const take = Math.min(N, ph.length - i); page(ph.slice(i, i+take), 'photos-'+take); i += take; }
        return;
      }
      if (ph.length >= 3){ page(ph.slice(0,3),'photos-3'); i = 3; }
      while (i < ph.length){
        const rem = ph.length - i; let take, cls;
        if (rem >= 8){ take=4; cls='photos-4'; }
        else if (rem===7){ take=4; cls='photos-4'; }
        else if (rem===6){ take=6; cls='photos-6'; }
        else if (rem===5){ take=5; cls='photos-6'; }
        else if (rem===4){ take=4; cls='photos-4'; }
        else if (rem===3){ take=3; cls='photos-3'; }
        else if (rem===2){ take=2; cls='photos-2'; }
        else { take=1; cls='photos-1'; }
        page(ph.slice(i,i+take), cls); i += take;
      }
    }

    const boundaryCaptionP = data.boundary_caption ||
      ({EN:'Indicative property boundary',FR:'Limite indicative de la propriété',NL:'Indicatieve perceelsgrens'}[data.language] || 'Limite indicative de la propriété');

    function pushAerial(sectionKey, anchor, a, metaText){
      const img = a.aerial_view || a.map_url || '';
      if (!img) return;
      const aMaps = a.google_maps_url || mapsUrlFor(a.address || '') || '';
      const hasPoly = Array.isArray(a.boundary) && a.boundary.length >= 3;
      currentSection = sectionKey;
      if (anchor) sectionAnchor = anchor;
      pushPage(`
        ${headerP('ae', SL.aerial || L.aerial, metaText)}
        <div class="pg-body"><div class="aerial">
          <div class="a-frame">
            <img class="a-img" src="${esc(fileUrl(img))}" alt="aerial">
            <div class="a-overlay">${boundarySvg(a.boundary, true)}${hasPoly?'':'<div class="a-pin"></div>'}</div>
            ${aMaps ? `<a class="map-cta" href="${esc(aMaps)}" target="_blank">Google Maps</a><a class="a-frame-link" href="${esc(aMaps)}" target="_blank" aria-label="Open in Google Maps"></a>` : ''}
            <div class="a-caption">${esc(boundaryCaptionP)}</div>
          </div>
          <div class="a-side">
            <div class="a-eyebrow">${esc(SL.aerial || L.aerial)}</div>
            <div class="a-title">${esc(a.short || a.name || '')}</div>
            <div class="a-rule"></div>
            ${a.address ? `<div class="a-row"><div class="k">${esc(addrLbl)}</div><div class="v">${esc(a.address)}</div></div>` : ''}
            ${a.terrain ? `<div class="a-row"><div class="k">${esc(data.terrain_label||'Terrein')}</div><div class="v">${esc(a.terrain)}</div></div>` : ''}
            ${aMaps ? `<a class="a-maplink" href="${esc(aMaps)}" target="_blank">${esc(mapLinkTxt)}</a>` : ''}
            <div class="a-legend">${esc(boundaryCaptionP)}</div>
          </div>
        </div></div>`);
    }

    // ── 1) COVER (shared) ──
    currentSection = 'cover';
    pushPage(`
      <div class="cover">
        ${coverPhoto?`<div class="cover-bg"><img class="fill-img" src="${esc(fileUrl(coverPhoto))}" alt=""></div>`:''}
        ${ref?`<div class="ref-tag">${esc(ref)}</div>`:''}
        <div class="wordmark"><div class="wm-main">RODSCHINSON</div><div class="wm-line"></div><div class="wm-sub">INVESTMENT</div></div>
        ${data.cover_badge === '' ? '' : `<div class="badge">${esc((data.cover_badge || 'Property Teaser')).toUpperCase()}</div>`}
        ${loc?`<div class="c-loc">${esc(loc)}</div>`:''}
        <div class="c-title">${esc(name || title)}</div>
        ${price?`<div class="price-box"><div class="price-label">${esc(priceLbl)}</div><div class="price-val">${esc(price)}</div></div>`:''}
        <div class="footer">rodschinson.com  |  +32 2 550 36 87  |  assets@rodschinson.com</div>
      </div>`);

    // ── 2) PORTFOLIO OVERVIEW (Activa) ──
    // Distinct 'overview' key so this shared page can be hidden independently of
    // the per-building presentation pages (which stay on 'activa').
    currentSection = 'overview';
    sectionAnchor = A.activa;
    const ov = data.portfolio_overview || {};
    const pfItems = assets.map((a,i)=>`
      <div class="pf-item">
        <div class="n">${i+1}</div>
        <div class="nm"><div class="t">${esc(a.name || a.short || '')}</div>${a.subtitle?`<div class="s">${esc(a.subtitle)}</div>`:''}</div>
        <div class="kv"><div class="k">${esc(data.terrain_label||'Terrein')}</div><div class="v">${esc(a.terrain || '—')}</div></div>
        <div class="kv"><div class="k">${esc(data.income_label||'Opbrengst/jaar')}</div><div class="v">${esc(a.annual_income || '—')}</div></div>
      </div>`).join('');
    const pfTotals = (ov.totals && ov.totals.length) ? `
      <div class="pf-totals">${ov.totals.map(t=>`
        <div class="tt"><div class="k">${esc(t.k||'')}</div><div class="v${t.cyan?' cyan':''}">${esc(t.v||'')}</div></div>`).join('')}
      </div>` : '';
    const cFacts = Array.isArray(data.company_facts) ? data.company_facts.filter(f=>f&&(f.k||f.v)) : [];
    const pfFacts = cFacts.length ? `
      <div class="pf-facts">
        <div class="pf-facts-head">${esc(data.company_facts_head || 'Over de vennootschap')}</div>
        <div class="pf-facts-grid">${cFacts.map(f=>`
          <div class="ff"><div class="k">${esc(f.k||'')}</div><div class="v">${esc(f.v||'')}</div></div>`).join('')}
        </div>
      </div>` : '';
    pushPage(`
      ${headerP('a', SL.activa, '', true)}
      <div class="pg-body"><div class="pf">
        <div class="pf-head">${esc(title)}</div>
        ${ov.sub?`<div class="pf-sub">${esc(ov.sub)}</div>`:''}
        <div class="pf-list"${pfFacts?' style="flex:0 0 auto"':''}>${pfItems}</div>
        ${pfFacts}
        ${pfTotals}
      </div></div>`);

    // ── 3) COMPANY FINANCIALS (Details, shared) ──
    const kpis = Array.isArray(data.key_metrics) ? data.key_metrics.slice(0,5) : [];
    const kpiHtml = kpis.length ? `<div class="kpi-strip">${kpis.map(k=>`<div class="kpi-cell"><div class="kpi-label">${esc(k.label||'')}</div><div class="kpi-value">${esc(k.value||'')}</div>${k.sub?`<div class="kpi-sub">${esc(k.sub)}</div>`:''}</div>`).join('')}</div>` : '';
    const companyTables = (Array.isArray(data.company_tables)?data.company_tables:[]).map(t=>({head:t.head,columns:t.columns,rows2d:t.rows}));

  // COVER (gradient, no photo)
  pushPage(`

  // ACTIVA
  currentSection = 'activa';
  sectionAnchor = A.activa;
  pushPage(`
    ${header('a', SL.activa, true)}
    <div class="pg-body">
      <div class="activa">
        <div class="left">
          <div class="a-title">${esc(title)}</div>
          <div class="a-label">${esc(addrLbl)}</div>
          <div class="a-val">${esc(address)}</div>
          <div class="a-label">${esc(descLbl)}</div>
          <ul class="a-bullets${bullets.length>8?' cols-2':''}">
            ${bullets.map(b=>`<li>${esc(b)}</li>`).join('')}
          </ul>
          <div class="a-price"><span>${esc(priceLbl)}</span><span class="val">${esc(price)}</span></div>
        </div>
        <div class="right">${activaPhoto?`<img class="a-photo" src="${esc(fileUrl(activaPhoto))}" alt="">`:''}</div>
      </div>
    </div>`);

  // DETAILS — rendered only when document extraction produced structured data.
  // Pagination: each table category is split into chunks that fit on a landscape A4
  // body (≈ 528px usable). A page holds either 1 wide card (≤ FULL_ROWS rows)
  // or 2 half-width cards (each ≤ HALF_ROWS rows). Long categories flow across
  // pages with a "(part N/M)" tag; pages after the first carry "(continued)".
  const income    = Array.isArray(data.rental_income_rows)     ? data.rental_income_rows     : [];
  const fin       = Array.isArray(data.financial_summary_rows) ? data.financial_summary_rows : [];
  const specs     = Array.isArray(data.technical_specs_rows)   ? data.technical_specs_rows   : [];
  const leases    = Array.isArray(data.lease_terms_rows)       ? data.lease_terms_rows       : [];
  const valuation = Array.isArray(data.valuation_rows)         ? data.valuation_rows         : [];
  const amenities = Array.isArray(data.amenities_bullets)      ? data.amenities_bullets      : [];
  const extras    = Array.isArray(data.extra_bullets)          ? data.extra_bullets          : [];
  const surfaceRowsRaw = Array.isArray(data.surfaces) ? data.surfaces : [];
  const surfaceRows = surfaceRowsRaw
    .map(s=>({label:String(s.floor||s.label||''), value:String(s.area||s.value||'')}))
    .filter(r=>r.label||r.value);
  const DL = data.details_labels || {details:'Asset details', income:'Rental income', financials:'Financial summary', specs:'Technical specs', leases:'Lease terms', valuation:'Valuation breakdown', amenities:'Features & amenities', surfaces:'Surface details', other:'Other', continued:'(continued)'};
  const contLabel = (DL.continued || data.details_continued || '(continued)');

  const rowTbl   = rows => `<table><tbody>${rows.map(r=>`<tr><td>${esc(r.label||'')}</td><td>${esc(r.value||'')}</td></tr>`).join('')}</tbody></table>`;
  const bulletList = items => `<ul class="d-bullets">${items.map(b=>`<li>${esc(b)}</li>`).join('')}</ul>`;
  const chunk = (arr, n) => { const o=[]; for (let i=0;i<arr.length;i+=n) o.push(arr.slice(i,i+n)); return o; };

  // Per-page capacities, tuned for 528px usable body after title row.
  // Kept conservative so rows that wrap to 2 lines don't overflow and get cropped.
  const HALF_ROWS = 13;   // rows per card when 2 cards share a page
  const FULL_ROWS = 19;   // rows per card when it spans the whole page width
  const HALF_BULL = 18;   // bullet items in a 2-column half card
  const FULL_BULL = 26;   // bullet items in a full-width 2-col card

  // Build "pieces" — each piece is a single card that fits on one column.
  // weight = rows it occupies; wide = true → forces the piece to be full-width.
  const pieces = [];
  function pushTableCategory(head, rows){
    if (!rows.length) return;
    if (rows.length <= HALF_ROWS){
      pieces.push({head, kind:'table', rows, weight: rows.length+1, wide:false});
      return;
    }
    const chunks = chunk(rows, FULL_ROWS);
    chunks.forEach((c, i)=>{
      const tag = chunks.length>1 ? `${i+1}/${chunks.length}` : '';
      pieces.push({head, kind:'table', rows:c, weight: c.length+1, wide:true, tag});
    });
  }
  function pushBulletCategory(head, items){
    if (!items.length) return;
    if (items.length <= HALF_BULL){
      pieces.push({head, kind:'bullets', rows:items, weight: Math.ceil(items.length/2)+1, wide:false});
      return;
    }
    const chunks = chunk(items, FULL_BULL);
    chunks.forEach((c, i)=>{
      const tag = chunks.length>1 ? `${i+1}/${chunks.length}` : '';
      pieces.push({head, kind:'bullets', rows:c, weight: Math.ceil(c.length/2)+1, wide:true, tag});
    });
  }

  pushTableCategory(DL.financials, fin);
  pushTableCategory(DL.valuation, valuation);
  pushTableCategory(DL.specs, specs);

  // ─── Consolidate Rental income + Surfaces into a single per-unit table ───
  // The AI extractor produces income labels shaped like
  //   "Unité 1 – Rez / sous-sol (bureau, 94 m²) — mois 1–12"
  // and surface rows like
  //   { floor:"Unité 1 – Rez-de-chaussée / sous-sol", area:"94 m²" }
  // We pivot: one row per unit × N step columns (mois 1-12, 13-36, 37+ …),
  // with surface joined in, so the reader sees rent + size for each unit in
  // one premium table instead of two scattered ones.
  function unitKey(s){
    return String(s||'')
      .replace(/\(.*?\)/g, '')           // strip parens content
      .split(/\s+[—–]\s+/)[0]            // drop period part
      .replace(/[\s,]+$/, '')
      .toLowerCase()
      .replace(/[^a-z0-9àâçéèêëîïôûùüÿñæœ\d]+/g, ' ')
      .trim();
  }
  function shortUnitName(s){
    // Trim trailing period if it slipped through, and collapse spaces
    return String(s||'').replace(/\s+[—–]\s+(mois|month|après|after).*$/i,'').trim();
  }
  function buildUnitTable(){
    if (!income.length) return null;
    const map = new Map();           // unitKey → { unit, sub, surface, steps:{period:rent}, order }
    const periods = [];              // ordered list of step labels
    let parsed = 0, order = 0;

    // Period keywords that mark the start of a step/phase fragment.
    const periodKw = /^(mois|months?|après|after|année|year|jaar|na|phase|step|period)\b/i;
    for (const row of income){
      const label = String(row.label||'').trim();
      const value = String(row.value||'').trim();
      if (!label || !value) continue;
      // Split on the LAST ` — ` (em-dash with spaces). Labels frequently
      // contain an en-dash inside the unit name itself ("Unité 1 – Rez …"),
      // so a generic dash regex would split too early. Em-dash is the period
      // boundary; en-dash with a period keyword is a fallback.
      let sepIdx = label.lastIndexOf(' — ');
      let sepLen = 3;
      if (sepIdx === -1){
        const m2 = label.match(/\s+[–-]\s+((?:mois|months?|après|after|année|year|jaar|na|phase|step|period)\b.+)$/i);
        if (m2){ sepIdx = m2.index; sepLen = m2[0].length - m2[1].length; }
      }
      if (sepIdx === -1) continue;
      const unitRaw = label.slice(0, sepIdx).trim();
      const period  = label.slice(sepIdx + sepLen).trim();
      const hasStep = periodKw.test(period);
      // We still register units whose tail isn't a rent step (e.g. "travaux
      // en cours") so they appear in the table with "—" rents — otherwise
      // "Unité 10" would silently disappear.

      // Pull surface from "(... 94 m² ...)" if present
      let surface = '';
      let unitName = unitRaw;
      const sm = unitRaw.match(/\(([^)]*?\d[\d.,]*\s*m²[^)]*)\)/i);
      if (sm){ surface = sm[1].trim(); unitName = unitRaw.replace(sm[0],'').replace(/[,\s]+$/,'').trim(); }
      // Also remove any leading descriptor wrapped in parens that's not a surface
      unitName = unitName.replace(/\s+\(\s*\)/,'').trim();

      // Split the unit name into a primary chip + a sublabel
      // e.g. "Unité 2a – Rez C-01" → primary "Unité 2a", sub "Rez C-01"
      let primary = unitName, sub = '';
      const dash = unitName.match(/^(.+?)\s+[–-]\s+(.+)$/);
      if (dash){ primary = dash[1].trim(); sub = dash[2].trim(); }

      const k = unitKey(unitName);
      if (!map.has(k)){
        map.set(k, { unit: primary, sub, surface, steps: {}, note: '', order: order++ });
      } else {
        const u = map.get(k);
        if (!u.surface && surface) u.surface = surface;
        if (!u.sub     && sub)     u.sub = sub;
      }
      if (hasStep){
        map.get(k).steps[period] = value;
        if (!periods.includes(period)) periods.push(period);
        parsed++;
      } else {
        // Stash the descriptive tail (e.g. "travaux en cours") so we can show
        // it as a spanned cell in place of step rents for this unit.
        const u = map.get(k);
        u.note = u.note ? u.note : (period + (value ? ` — ${value}` : ''));
      }
    }

    // Reject the consolidation if the pattern didn't match enough rows
    // or if we ended up with a near-degenerate shape — fall back to plain.
    if (map.size < 2) return null;
    if (parsed < income.length * 0.7) return null;
    if (periods.length < 1 || periods.length > 6) return null;

    // Pull per-unit surfaces from the surfaces array when the income label
    // didn't include them, and split out the global summary rows.
    const summary = [];
    for (const r of surfaceRows){
      const lbl = String(r.label||'').trim();
      const val = String(r.value||'').trim();
      if (!lbl) continue;
      // "Surface totale", "Surface habitable totale", etc → summary.
      // NOTE: trailing (\s|\d|$) instead of \b because JS \b doesn't treat
      // accented letters like é as word chars without the /u flag, so a plain
      // \b after "Unité" never matches and every per-unit row would leak
      // into the summary block.
      if (!/^\s*(unit[eé]|studio|appart|apt|lot)(\s|\d|$)/i.test(lbl)){
        summary.push({ label: lbl, value: val });
        continue;
      }
      const k = unitKey(lbl);
      if (map.has(k) && !map.get(k).surface) map.get(k).surface = val;
    }

    const units = Array.from(map.values()).sort((a,b)=>a.order-b.order);
    return { units, periods, summary };
  }

  function unitTableHtml(t, headLabel){
    const cols = ['Unité', 'Surface', ...t.periods];
    const colWidth = `${(100 - 28 - 14) / Math.max(t.periods.length,1)}%`;
    // Pretty up the step headers (mois 1–12 → "Mois 1–12")
    const prettyPeriod = p => p.replace(/^mois\b/i,'Mois').replace(/^après mois\b/i,'Après mois').replace(/^month\b/i,'Month').replace(/^after month\b/i,'After month').trim();
    const head = `
      <thead><tr>
        <th class="l" style="width:28%">${esc(headLabel || 'Unité')}</th>
        <th style="width:14%">${esc('Surface')}<span class="sub">m²</span></th>
        ${t.periods.map(p=>`<th style="width:${colWidth}">${esc(prettyPeriod(p))}<span class="sub">€ / mois</span></th>`).join('')}
      </tr></thead>`;
    const body = `
      <tbody>${t.units.map(u=>{
        const hasAnyStep = t.periods.some(p => u.steps[p]);
        const rentCells = (hasAnyStep || !u.note)
          ? t.periods.map(p=>`<td class="r">${esc(u.steps[p] || '—')}</td>`).join('')
          : `<td class="r u-note" colspan="${t.periods.length}" style="font-weight:500;color:var(--grey-text);font-style:italic">${esc(u.note)}</td>`;
        return `
        <tr>
          <td class="l">${esc(u.unit)}${u.sub?`<span class="u-sub">${esc(u.sub)}</span>`:''}</td>
          <td class="r area">${esc(u.surface || '—')}</td>
          ${rentCells}
        </tr>`;
      }).join('')}
      </tbody>`;
    const summaryHtml = t.summary && t.summary.length ? `
      <div class="u-summary">${t.summary.map(s=>`
        <div class="u-sum-item">
          <div class="u-sum-k">${esc(s.label)}</div>
          <div class="u-sum-v">${esc(s.value)}</div>
        </div>`).join('')}
      </div>` : '';
    return summaryHtml + `<table class="u-table">${head}${body}</table>`;
  }

  const unitTable = buildUnitTable();
  if (unitTable){
    // Combined head label, e.g. "Revenus locatifs & superficies par unité"
    const combinedHead =
      (data.unit_table_label) ||
      ((DL.income && DL.surfaces) ? `${DL.income} · ${DL.surfaces}` :
       (DL.income || 'Rental income & surfaces'));
    // Wide piece; split into chunks of ROWS_PER_PAGE if the unit list is huge.
    const ROWS_PER_PAGE = 16;
    if (unitTable.units.length <= ROWS_PER_PAGE){
      pieces.push({
        head: combinedHead, kind:'unit-table', payload: unitTable,
        weight: unitTable.units.length + 2, wide:true
      });
    } else {
      const cs = chunk(unitTable.units, ROWS_PER_PAGE);
      cs.forEach((slice, i) => {
        pieces.push({
          head: combinedHead, kind:'unit-table',
          payload: { units: slice, periods: unitTable.periods, summary: i === 0 ? unitTable.summary : [] },
          weight: slice.length + 2, wide:true,
          tag: cs.length>1 ? `${i+1}/${cs.length}` : ''
        });
      });
    }
  } else {
    // Fallback to the legacy split tables when the unit pattern didn't match.
    pushTableCategory(data.surfaces_label || DL.surfaces || 'Surfaces', surfaceRows);
    pushTableCategory(DL.income, income);
  }
  pushTableCategory(DL.leases, leases);
  pushBulletCategory(DL.amenities, amenities);
  pushBulletCategory(DL.other, extras);

  // Pack pieces into pages by estimated height so several small categories
  // share a page instead of each taking its own near-empty one. Half-width
  // cards pair two-across (the grid row is as tall as the taller card); wide
  // cards span the full width. The first page is shorter when a KPI strip shows.
  const _hasKpi = Array.isArray(data.key_metrics) && data.key_metrics.length > 0;
  const PG_FIRST = _hasKpi ? 470 : 540, PG_REST = 540;
  const PC_BASE = 60, PC_ROW = 22, PC_BULL = 21, PC_CHEAD = 18, PC_CROW = 19, PC_GAP = 12;
  function pieceHeight(p){
    if (p.kind === 'unit-table') return PC_BASE + PC_CHEAD + ((p.payload.units.length||0) + 1) * PC_CROW;
    if (p.kind === 'bullets')    return PC_BASE + (p.wide ? Math.ceil(p.rows.length/2) : p.rows.length) * PC_BULL;
    return PC_BASE + (p.rows ? p.rows.length : 0) * PC_ROW;
  }
  function cardHtml(p){
    const cls = ['d-card'];
    if (p.wide) cls.push('wide');
    if (p.kind === 'bullets' && !p.wide) cls.push('narrow');
    if (p.kind === 'unit-table') cls.push('u-card');
    const tag = p.tag ? `<span class="d-head-tag">${esc(p.tag)}</span>` : '';
    let body;
    if (p.kind === 'table')           body = rowTbl(p.rows);
    else if (p.kind === 'bullets')    body = bulletList(p.rows);
    else if (p.kind === 'unit-table') body = unitTableHtml(p.payload, '');
    else                              body = '';
    return `<div class="${cls.join(' ')}"><div class="d-head"><span>${esc(p.head)}</span>${tag}</div>${body}</div>`;
  }
  // Real measured heights (fall back to the estimate) → no cropped tables.
  const _pmh = measureCardHeights(pieces.map(p => ({ html: cardHtml(p), wide: !!p.wide })));
  pieces.forEach((p, i) => { p._h = _pmh[i] || pieceHeight(p); });

  const detailPages = [];
  let bucket = [], used = 0, budget = PG_FIRST;
  const flushBucket = () => { if (bucket.length){ detailPages.push(bucket); bucket = []; used = 0; budget = PG_REST; } };
  for (let i = 0; i < pieces.length; i++){
    const p = pieces[i];
    if (p.wide){
      if (used > 0 && used + p._h > budget) flushBucket();
      bucket.push(p); used += p._h + PC_GAP;
    } else {
      const n = pieces[i+1];
      const pair = (n && !n.wide) ? [p, n] : [p];   // pair consecutive half cards
      const ph = Math.max.apply(null, pair.map(x => x._h));
      if (used > 0 && used + ph > budget) flushBucket();
      pair.forEach(x => bucket.push(x)); used += ph + PC_GAP;
      if (pair.length === 2) i++;
    }
  }
  flushBucket();

  // Optional KPI strip — shown ONCE on the first details page.
  // Pulls from data.key_metrics (list of {label, value, sub}) when provided.
  const keyMetrics = Array.isArray(data.key_metrics) ? data.key_metrics.slice(0,5) : [];
  const kpiStripHtml = keyMetrics.length ? `
    <div class="kpi-strip">
      ${keyMetrics.map(k=>`
        <div class="kpi-cell">
          <div class="kpi-label">${esc(k.label||'')}</div>
          <div class="kpi-value">${esc(k.value||'')}</div>
          ${k.sub ? `<div class="kpi-sub">${esc(k.sub)}</div>` : ''}
        </div>`).join('')}
    </div>` : '';

  detailPages.forEach((pageCards, idx)=>{
    currentSection = 'details';
    if (idx === 0) sectionAnchor = A.details;
    const wide = pageCards.length === 1 && pageCards[0].wide;
    const gridCls = wide ? 'd-grid one' : 'd-grid';
    const suffix = idx === 0 ? '' : `<span class="d-suffix">${esc(contLabel)}</span>`;
    const kpi = idx === 0 ? kpiStripHtml : '';
    pushPage(`
      ${header('a', SL.details)}
      <div class="pg-body">
        <div class="details">
          <div class="d-title"><span>${esc(DL.details)}</span>${suffix}</div>
          ${kpi}
          <div class="${gridCls}">${pageCards.map(cardHtml).join('')}</div>
        </div>
      </div>`);
  });

  // LOCATIE
  currentSection = 'localisation';
  sectionAnchor = A.loc;
  pushPage(`
    ${header('l', SL.locatie)}
    <div class="pg-body">
      <div class="locatie">
        <div class="map">${streetMap?`<img class="fill-img" src="${esc(fileUrl(streetMap))}" alt="">`:''}</div>
        <div class="info">
          <div class="l-title">${esc(shortLoc || name || title)}</div>
          <div class="l-rule"></div>
          <a class="l-link" href="${esc(mapsUrl)}" target="_blank">${esc(mapLinkTxt)}</a>
          <div class="l-rule"></div>
        </div>
        <div class="loc-crosshair">!</div>
      </div>
    </div>`);

  // AERIAL VIEW — dedicated page with boundary outline + caption.
  if (aerialImg){
    currentSection = 'aerial';
    sectionAnchor = A.aerial;
    const boundaryCaption = data.boundary_caption ||
      ({EN:'Indicative property boundary', FR:'Limite indicative de la propriété', NL:'Indicatieve perceelsgrens'}[data.language] || 'Limite indicative de la propriété');
    const aerialLabel = SL.aerial || (data.tab_aerial || L.aerial);
    pushPage(`
      ${header('ae', aerialLabel)}
      <div class="pg-body">
        <div class="aerial">
          <div class="a-frame">
            <img class="a-img" src="${esc(fileUrl(aerialImg))}" alt="aerial">
            <div class="a-overlay">
              ${boundarySvg(data.boundary, true)}
              ${(!Array.isArray(data.boundary) || data.boundary.length < 3) ? '<div class="a-pin"></div>' : ''}
            </div>
            <div class="a-caption">${esc(boundaryCaption)}</div>
          </div>
          <div class="a-side">
            <div class="a-eyebrow">${esc(aerialLabel)}</div>
            <div class="a-title">${esc(shortLoc || name || title)}</div>
            <div class="a-rule"></div>
            ${address ? `<div class="a-row"><div class="k">${esc(addrLbl)}</div><div class="v">${esc(address)}</div></div>` : ''}
            ${ref     ? `<div class="a-row"><div class="k">Référence</div><div class="v">${esc(ref)}</div></div>` : ''}
            ${price   ? `<div class="a-row"><div class="k">${esc(priceLbl)}</div><div class="v">${esc(price)}</div></div>` : ''}
            ${(mapsUrl && mapsUrl !== '#') ? `<a class="a-maplink" href="${esc(mapsUrl)}" target="_blank">${esc(mapLinkTxt)}</a>` : ''}
            <div class="a-legend">${esc(boundaryCaption)}</div>
          </div>
        </div>
      </div>`);
  }

  // PHOTOS — pack densely: first page hero-3 trio if >=3, then 6 tiles (3x2)
  // per page, with a tail-page fallback to 4 (2x2) / 3 / 2 if fewer remain so
  // we never publish a half-empty gallery page.
  if(photos.length){
    currentSection = 'gallery';
    sectionAnchor = A.photos;
    const galTile = p=>`<div class="photo-tile"><img class="fill-img"${objPos(data.photo_focus, p)} src="${esc(fileUrl(p))}" alt=""></div>`;
    const galPage = (slice, gridClass, heading)=>{
      const grid = `<div class="${gridClass}">${slice.map(galTile).join('')}</div>`;
      const body = heading
        ? `<div class="gal-col"><div class="gal-head"><span>${esc(heading)}</span></div>${grid}</div>`
        : grid;
      pushPage(`${header('p', SL.photos)}<div class="pg-body">${body}</div>`);
    };
    // Paginate one photo list; the section heading shows on its first page only.
    const paginate = (list, label)=>{
      let i = 0, first = true;
      const head = ()=>{ const h = !label ? '' : (first ? label : `${label} ${L.dl.continued||''}`); first = false; return h; };
      // Fixed layout override ("Photos per page" in the editor) — uniform grid.
      const N = parseInt(data.photo_layout, 10);
      if (N >= 1 && N <= 4){
        while(i < list.length){ const take = Math.min(N, list.length - i); galPage(list.slice(i, i+take), 'photos-'+take, head()); i += take; }
        return;
      }
      if(list.length >= 3){ galPage(list.slice(0,3), 'photos-3', head()); i = 3; }
      while(i < list.length){
        const rem = list.length - i; let take, cls;
        if(rem >= 8){ take = 4; cls = 'photos-4'; }
        else if(rem === 7){ take = 4; cls = 'photos-4'; }
        else if(rem === 6){ take = 6; cls = 'photos-6'; }
        else if(rem === 5){ take = 5; cls = 'photos-6'; }
        else if(rem === 4){ take = 4; cls = 'photos-4'; }
        else if(rem === 3){ take = 3; cls = 'photos-3'; }
        else { take = rem; cls = 'photos-2'; }
        galPage(list.slice(i, i + take), cls, head());
        i += take;
      }
    };
    // When the user tagged photos into ≥2 categories, render labelled sections
    // (EXTERIEUR / INTERIEUR …); otherwise one continuous gallery.
    // Photos render as one continuous gallery (no category labels on the tiles);
    // backend ordering keeps exterior shots first.
    paginate(photos, '');
  }

  // PLANS — 1 per page, auto-rotate portrait images
  if(plans.length){
    currentSection = 'plans';
    sectionAnchor = A.plans;
    plans.forEach(pl=>{
      pushPage(`
        ${header('pl', SL.plans)}
        <div class="pg-body">
          <div class="plan-wrap">${planImgHtml(pl)}</div>
        </div>`);
    });
  }

  // SALES
  currentSection = 'sales';
  sectionAnchor = A.sales;
  pushPage(`
    ${header('s', SL.sales)}
    <div class="pg-body">
      <div class="sales">
        <div class="s-left">
          <div class="s-name">${esc(agentName)}</div>
          <div class="s-role">${esc(agentRole)}</div>
          <div class="s-infos">
            <div class="s-label">${esc(data.infos_label || 'Infos :')}</div>
            <a href="tel:${esc(agentPhone.replace(/\s+/g,''))}">${esc(agentPhone)}</a>
            <a href="mailto:${esc(agentEmail)}">${esc(agentEmail)}</a>
          </div>
          <div class="s-price"><span>${esc(priceLbl)}</span><span class="val">${esc(price)}</span></div>
        </div>
        <div class="s-right">
          <div class="s-photo">${salesPhoto?`<img src="${esc(fileUrl(salesPhoto))}" alt="">`:''}</div>
          <div class="s-cta">
            <div class="s-cta-label">${esc(docsHelper)}</div>
            <a href="${esc(docsUrl)}" target="_blank">${esc(docsLabel)}</a>
          </div>
        </div>
      </div>
    </div>`);

  document.getElementById('doc').innerHTML = pages.join('');

  // Auto-rotate portrait plan images (called again after images finish loading by the renderer)
  window.rotatePortraitPlans = function(){
    document.querySelectorAll('.plan-img').forEach(img=>{
      if(img.classList.contains('plan-manual')) return;  // respect manual rotation
      if(!img.complete || !img.naturalWidth) return;
      if(img.naturalHeight > img.naturalWidth * 1.05){
        img.classList.add('rotated');
      }
    });
  };

  return true;
};
</script>
</body>
</html>
