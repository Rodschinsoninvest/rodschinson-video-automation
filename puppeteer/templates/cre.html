<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRE – Premium Corporate Real Estate</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #08316F;
  --accent: #C8A96E;
  --text: #F5F0E8;
  --text-muted: rgba(245,240,232,0.6);
  --text-dim: rgba(245,240,232,0.35);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Space Grotesk', system-ui, sans-serif;
  --accent-dim: rgba(200,169,110,0.15);
  --accent-mid: rgba(200,169,110,0.4);
  --white: #FFFFFF;
  --navy-light: #0D4A9E;
  --navy-dark: #051F47;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--sans);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

#scene-container {
  position: relative;
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: var(--bg);
}

/* ─── SCENE BASE ─────────────────────────────────── */
.scene {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 1080px;
  height: 1080px;
  overflow: hidden;
}

.scene.active {
  display: flex;
}

/* ─── WATERMARK ─────────────────────────────────── */
.watermark {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 4px;
  color: var(--accent);
  opacity: 0.3;
  text-transform: uppercase;
  z-index: 100;
}

/* ─── BACKGROUND LAYER ──────────────────────────── */
.bg-layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ─── GRID TEXTURE ──────────────────────────────── */
.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(200,169,110,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,169,110,0.04) 1px, transparent 1px);
  background-size: 54px 54px;
  z-index: 0;
}

/* ─── NOISE OVERLAY ─────────────────────────────── */
.bg-noise {
  position: absolute;
  inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  background-size: 256px 256px;
  z-index: 1;
}

/* ─── CONTENT LAYER ─────────────────────────────── */
.content-layer {
  position: relative;
  z-index: 10;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════════════════════════════
   TITLE SLIDE
═══════════════════════════════════════════════════ */
.slide-title .content-layer {
  justify-content: space-between;
  padding: 80px 90px;
}

.slide-title .top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  opacity: 0;
  transform: translateY(-30px);
  transition: opacity 0.7s ease 0.1s, transform 0.7s ease 0.1s;
}

.slide-title.anim .top-bar {
  opacity: 1;
  transform: translateY(0);
}

.brand-logo {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
}

.slide-num {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 2px;
  color: var(--text-muted);
}

.slide-title .center-block {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 40px 0;
}

.title-eyebrow {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 5px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 32px;
  opacity: 0;
  transform: translateX(-40px);
  transition: opacity 0.7s ease 0.25s, transform 0.7s ease 0.25s;
}

.slide-title.anim .title-eyebrow {
  opacity: 1;
  transform: translateX(0);
}

.title-headline {
  font-family: var(--serif);
  font-size: 86px;
  font-weight: 300;
  line-height: 1.0;
  letter-spacing: -1px;
  color: var(--text);
  margin-bottom: 12px;
  opacity: 0;
  transform: translateY(50px);
  transition: opacity 0.8s ease 0.35s, transform 0.8s cubic-bezier(0.16,1,0.3,1) 0.35s;
}

.slide-title.anim .title-headline {
  opacity: 1;
  transform: translateY(0);
}

.title-headline em {
  font-style: italic;
  color: var(--accent);
}

.title-divider {
  width: 80px;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), transparent);
  margin: 36px 0;
  opacity: 0;
  transform: scaleX(0);
  transform-origin: left;
  transition: opacity 0.6s ease 0.5s, transform 0.6s ease 0.5s;
}

.slide-title.anim .title-divider {
  opacity: 1;
  transform: scaleX(1);
}

.title-subheadline {
  font-family: var(--sans);
  font-size: 20px;
  font-weight: 300;
  line-height: 1.6;
  color: var(--text-muted);
  max-width: 540px;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.7s ease 0.55s, transform 0.7s ease 0.55s;
}

.slide-title.anim .title-subheadline {
  opacity: 1;
  transform: translateY(0);
}

.slide-title .bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.7s ease 0.7s, transform 0.7s ease 0.7s;
}

.slide-title.anim .bottom-bar {
  opacity: 1;
  transform: translateY(0);
}

.swipe-cta {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
}

.swipe-cta::after {
  content: '';
  display: block;
  width: 48px;
  height: 1px;
  background: var(--accent);
}

.accent-badge {
  display: flex;
  align-items: center;
  gap: 10px;
}

.badge-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
}

.badge-text {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
}

/* ═══════════════════════════════════════════════════
   CONTENT SLIDE
═══════════════════════════════════════════════════ */
.slide-content .content-layer {
  justify-content: space-between;
  padding: 72px 90px;
}

.slide-content .top-strip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  opacity: 0;
  transform: translateY(-20px);
  transition: opacity 0.6s ease 0.1s, transform 0.6s ease 0.1s;
}

.slide-content.anim .top-strip {
  opacity: 1;
  transform: translateY(0);
}

.point-number {
  font-family: var(--serif);
  font-size: 120px;
  font-weight: 300;
  line-height: 1;
  color: var(--accent-dim);
  letter-spacing: -4px;
  position: absolute;
  right: 80px;
  top: 60px;
  opacity: 0;
  transform: translateX(40px);
  transition: opacity 0.8s ease 0.2s, transform 0.8s ease 0.2s;
}

.slide-content.anim .point-number {
  opacity: 1;
  transform: translateX(0);
}

.content-tag {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 4px;
  color: var(--accent);
  text-transform: uppercase;
  border: 1px solid var(--accent-mid);
  padding: 7px 18px;
  border-radius: 2px;
}

.progress-dots {
  display: flex;
  gap: 8px;
  align-items: center;
}

.pdot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  transition: background 0.3s;
}

.pdot.active {
  background: var(--accent);
  width: 20px;
  border-radius: 3px;
}

.slide-content .main-block {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px 0;
}

.content-headline {
  font-family: var(--serif);
  font-size: 64px;
  font-weight: 400;
  line-height: 1.1;
  letter-spacing: -0.5px;
  color: var(--text);
  margin-bottom: 32px;
  max-width: 700px;
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.75s ease 0.3s, transform 0.75s cubic-bezier(0.16,1,0.3,1) 0.3s;
}

.slide-content.anim .content-headline {
  opacity: 1;
  transform: translateY(0);
}

.content-headline em {
  font-style: italic;
  color: var(--accent);
}

.content-rule {
  width: 60px;
  height: 1px;
  background: var(--accent);
  margin-bottom: 32px;
  opacity: 0;
  transform: scaleX(0);
  transform-origin: left;
  transition: opacity 0.5s ease 0.45s, transform 0.5s ease 0.45s;
}

.slide-content.anim .content-rule {
  opacity: 1;
  transform: scaleX(1);
}

.content-body {
  font-family: var(--sans);
  font-size: 19px;
  font-weight: 300;
  line-height: 1.75;
  color: var(--text-muted);
  max-width: 620px;
  opacity: 0;
  transform: translateY(25px);
  transition: opacity 0.7s ease 0.5s, transform 0.7s ease 0.5s;
}

.slide-content.anim .content-body {
  opacity: 1;
  transform: translateY(0);
}

.stat-callout {
  margin-top: 48px;
  display: flex;
  align-items: stretch;
  gap: 0;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.7s ease 0.65s, transform 0.7s ease 0.65s;
  max-width: 480px;
}

.slide-content.anim .stat-callout {
  opacity: 1;
  transform: translateY(0);
}

.stat-accent-bar {
  width: 4px;
  background: linear-gradient(180deg, var(--accent), transparent);
  border-radius: 2px;
  flex-shrink: 0;
}

.stat-inner {
  padding: 20px 28px;
  background: rgba(200,169,110,0.06);
  border: 1px solid var(--accent-mid);
  border-left: none;
  flex: 1;
}

.stat-value {
  font-family: var(--serif);
  font-size: 52px;
  font-weight: 600;
  line-height: 1;
  color: var(--accent);
  letter-spacing: -1px;
}

.stat-label {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 6px;
}

.slide-content .bottom-strip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease 0.75s, transform 0.6s ease 0.75s;
}

.slide-content.anim .bottom-strip {
  opacity: 1;
  transform: translateY(0);
}

.brand-mark {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  opacity: 0.6;
}

.slide-count {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2px;
  color: var(--text-dim);
}

/* ═══════════════════════════════════════════════════
   CTA SLIDE
═══════════════════════════════════════════════════ */
.slide-cta .content-layer {
  justify-content: space-between;
  padding: 80px 90px;
  align-items: flex-start;
}

.slide-cta .top-accent {
  display: flex;
  align-items: center;
  gap: 16px;
  opacity: 0;
  transform: translateY(-20px);
  transition: opacity 0.6s ease 0.1s, transform 0.6s ease 0.1s;
}

.slide-cta.anim .top-accent {
  opacity: 1;
  transform: translateY(0);
}

.cta-line {
  width: 40px;
  height: 1px;
  background: var(--accent);
}

.cta-label {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 5px;
  color: var(--accent);
  text-transform: uppercase;
}

.slide-cta .cta-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  width: 100%;
}

.cta-headline {
  font-family: var(--serif);
  font-size: 78px;
  font-weight: 300;
  line-height: 1.05;
  letter-spacing: -1px;
  color: var(--text);
  margin-bottom: 36px;
  opacity: 0;
  transform: translateY(50px);
  transition: opacity 0.8s ease 0.25s, transform 0.8s cubic-bezier(0.16,1,0.3,1) 0.25s;
}

.slide-cta.anim .cta-headline {
  opacity: 1;
  transform: translateY(0);
}

.cta-headline em {
  font-style: italic;
  color: var(--accent);
}

.cta-body {
  font-family: var(--sans);
  font-size: 19px;
  font-weight: 300;
  line-height: 1.7;
  color: var(--text-muted);
  max-width: 560px;
  margin-bottom: 48px;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.7s ease 0.42s, transform 0.7s ease 0.42s;
}

.slide-cta.anim .cta-body {
  opacity: 1;
  transform: translateY(0);
}

.cta-button {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  background: var(--accent);
  color: var(--navy-dark);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 20px 40px;
  border: none;
  cursor: default;
  max-width: max-content;
  margin-bottom: 60px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease 0.55s, transform 0.6s ease 0.55s;
}

.slide-cta.anim .cta-button {
  opacity: 1;
  transform: translateY(0);
}

.cta-arrow {
  width: 20px;
  height: 1px;
  background: var(--navy-dark);
  position: relative;
}

.cta-arrow::after {
  content: '';
  position: absolute;
  right: 0;
  top: -3px;
  width: 7px;
  height: 7px;
  border-right: 1.5px solid var(--navy-dark);
  border-top: 1.5px solid var(--navy-dark);
  transform: rotate(45deg);
}

.hashtag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.7s ease 0.65s, transform 0.7s ease 0.65s;
}

.slide-cta.anim .hashtag-row {
  opacity: 1;
  transform: translateY(0);
}

.htag {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 1px;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(200,169,110,0.2);
  padding: 7px 16px;
  border-radius: 2px;
}

.slide-cta .cta-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease 0.75s, transform 0.6s ease 0.75s;
}

.slide-cta.anim .cta-bottom {
  opacity: 1;
  transform: translateY(0);
}

.cta-brand {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
}

.cta-tagline {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* ═══════════════════════════════════════════════════
   SVG DECORATIVE BACKGROUNDS
═══════════════════════════════════════════════════ */

/* Title BG */
.title-bg-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* Diagonal accent band */
.diag-band {
  position: absolute;
  top: 0;
  right: 0;
  width: 420px;
  height: 1080px;
  background: linear-gradient(135deg, transparent 0%, rgba(200,169,110,0.04) 50%, transparent 100%);
  transform: skewX(-8deg) translateX(60px);
  pointer-events: none;
}

.corner-ornament {
  position: absolute;
  bottom: 80px;
  right: 80px;
  opacity: 0.12;
}

.top-corner-ornament {
  position: absolute;
  top: 60px;
  right: 60px;
  opacity: 0.08;
}

/* Large circle accent */
.circle-accent-large {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}

</style>
</head>
<body>
<div id="scene-container"></div>

<script>
(function() {

  // ─── SVG BACKGROUND GENERATORS ──────────────────

  function makeTitleBg() {
    return `
    <div class="bg-grid"></div>
    <div class="bg-noise"></div>
    <div class="diag-band"></div>

    <!-- large radial glow top-right -->
    <div style="position:absolute;top:-180px;right:-180px;width:680px;height:680px;
      border-radius:50%;
      background:radial-gradient(circle,rgba(200,169,110,0.12) 0%,transparent 70%);
      pointer-events:none;z-index:1;"></div>

    <!-- bottom-left subtle glow -->
    <div style="position:absolute;bottom:-200px;left:-100px;width:500px;height:500px;
      border-radius:50%;
      background:radial-gradient(circle,rgba(13,74,158,0.6) 0%,transparent 70%);
      pointer-events:none;z-index:1;"></div>

    <!-- SVG lines + geometry -->
    <svg class="title-bg-svg" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;z-index:2;">
      <!-- diagonal accent lines -->
      <line x1="0" y1="1080" x2="540" y2="0" stroke="rgba(200,169,110,0.07)" stroke-width="1"/>
      <line x1="60" y1="1080" x2="600" y2="0" stroke="rgba(200,169,110,0.05)" stroke-width="1"/>
      <line x1="120" y1="1080" x2="660" y2="0" stroke="rgba(200,169,110,0.03)" stroke-width="1"/>

      <!-- large open circle outline top right -->
      <circle cx="980" cy="120" r="280" fill="none" stroke="rgba(200,169,110,0.08)" stroke-width="1"/>
      <circle cx="980" cy="120" r="220" fill="none" stroke="rgba(200,169,110,0.05)" stroke-width="0.5"/>

      <!-- small geometric accents -->
      <circle cx="90" cy="940" r="60" fill="none" stroke="rgba(200,169,110,0.1)" stroke-width="1"/>
      <circle cx="90" cy="940" r="40" fill="none" stroke="rgba(200,169,110,0.06)" stroke-width="0.5"/>

      <!-- diamond -->
      <polygon points="960,820 990,860 960,900 930,860" fill="none" stroke="rgba(200,169,110,0.1)" stroke-width="1"/>

      <!-- horizontal rule lines -->
      <line x1="0" y1="950" x2="1080" y2="950" stroke="rgba(200,169,110,0.06)" stroke-width="0.5"/>
      <line x1="0" y1="130" x2="1080" y2="130" stroke="rgba(200,169,110,0.06)" stroke-width="0.5"/>

      <!-- small crosses -->
      <g stroke="rgba(200,169,110,0.15)" stroke-width="1">
        <line x1="46" y1="200" x2="56" y2="200"/>
        <line x1="51" y1="195" x2="51" y2="205"/>
      </g>
      <g stroke="rgba(200,169,110,0.15)" stroke-width="1">
        <line x1="996" y1="500" x2="1006" y2="500"/>
        <line x1="1001" y1="495" x2="1001" y2="505"/>
      </g>
      <g stroke="rgba(200,169,110,0.1)" stroke-width="1">
        <line x1="200" y1="940" x2="210" y2="940"/>
        <line x1="205" y1="935" x2="205" y2="945"/>
      </g>

      <!-- dots cluster bottom right -->
      <circle cx="960" cy="980" r="2" fill="rgba(200,169,110,0.3)"/>
      <circle cx="980" cy="980" r="2" fill="rgba(200,169,110,0.2)"/>
      <circle cx="1000" cy="980" r="2" fill="rgba(200,169,110,0.1)"/>
      <circle cx="960" cy="1000" r="2" fill="rgba(200,169,110,0.15)"/>
      <circle cx="980" cy="1000" r="2" fill="rgba(200,169,110,0.1)"/>

      <!-- vertical accent line left -->
      <line x1="54" y1="140" x2="54" y2="940" stroke="rgba(200,169,110,0.08)" stroke-width="0.5"/>

      <!-- large polygon outline -->
      <polygon points="850,50 1050,200 1050,50" fill="none" stroke="rgba(200,169,110,0.06)" stroke-width="1"/>
    </svg>`;
  }

  function makeContentBg(index, total) {
    const dots = Array.from({length: total}, (_, i) =>
      `<div class="pdot${i === index ? ' active' : ''}"></div>`
    ).join('');

    return `
