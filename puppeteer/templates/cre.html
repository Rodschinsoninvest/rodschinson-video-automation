<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>CRE – Data Insights</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080E1A;
  --bg2:      #0C1628;
  --cyan:     #00E5C8;
  --gold:     #C8A96E;
  --white:    #F0EDE8;
  --muted:    rgba(240,237,232,0.55);
  --dim:      rgba(240,237,232,0.22);
  --border:   rgba(0,229,200,0.15);
  --sans:     'Space Grotesk', sans-serif;
  --mono:     'Space Mono', monospace;
}

html, body {
  width: 1080px; height: 1080px;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--sans);
  color: var(--white);
  -webkit-font-smoothing: antialiased;
}

/* ── BACKGROUND ── */
.bg-layer {
  position: absolute; inset: 0; pointer-events: none; z-index: 0;
}
.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,200,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,200,0.03) 1px, transparent 1px);
  background-size: 54px 54px;
}
.bg-glow-tr {
  position: absolute; top: -200px; right: -200px;
  width: 700px; height: 700px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,229,200,0.07) 0%, transparent 65%);
}
.bg-glow-bl {
  position: absolute; bottom: -250px; left: -100px;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(200,169,110,0.06) 0%, transparent 65%);
}
.bg-line-v {
  position: absolute; left: 72px; top: 0; bottom: 0;
  width: 1px; background: linear-gradient(180deg, transparent 0%, rgba(0,229,200,0.12) 25%, rgba(0,229,200,0.12) 75%, transparent 100%);
}

/* ── CHROME ── */
.top-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 30;
  background: linear-gradient(90deg, var(--cyan) 0%, var(--gold) 50%, var(--cyan) 100%);
}
.bot-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px; z-index: 30;
  background: linear-gradient(90deg, transparent, rgba(0,229,200,0.2) 20%, rgba(0,229,200,0.2) 80%, transparent);
}

/* ── SCENE ── */
.scene {
  position: absolute; inset: 0; display: none;
  flex-direction: column; z-index: 10;
}
.scene.active { display: flex; }

/* ══════════════════════════════════════
   TITLE SLIDE
══════════════════════════════════════ */
.slide-title {
  padding: 52px 80px 52px;
  justify-content: space-between;
}

/* Top zone */
.slide-title .t-top {
  display: flex; align-items: center; gap: 14px;
  opacity: 0; transform: translateY(-12px);
  transition: all 0.5s ease 0.05s;
}
.brand-name {
  font-family: var(--mono); font-size: 12px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(0,229,200,0.7);
}
.live-badge {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px; font-weight: 400;
  color: var(--cyan); letter-spacing: 0.15em;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 6px var(--cyan);
}

/* Mid zone: headline anchors to bottom of t-mid */
.slide-title .t-mid {
  flex: 1; display: flex; flex-direction: column;
  justify-content: flex-end; padding-bottom: 48px;
}
.title-headline {
  font-size: 82px; font-weight: 700; line-height: 1.02;
  color: var(--white); letter-spacing: -0.02em;
  opacity: 0; transform: translateY(24px);
  transition: all 0.75s cubic-bezier(0.16,1,0.3,1) 0.12s;
}
.title-headline em { font-style: italic; color: var(--cyan); font-weight: 400; }
.title-rule {
  width: 0; height: 2px; margin: 28px 0;
  background: linear-gradient(90deg, var(--cyan), var(--gold) 60%, transparent);
  transition: width 0.7s ease 0.3s;
}
.title-sub {
  font-size: 22px; font-weight: 300; color: var(--muted);
  line-height: 1.65; max-width: 680px;
  opacity: 0; transition: opacity 0.5s ease 0.45s;
}

/* Bot zone */
.slide-title .t-bot {
  display: flex; align-items: center; justify-content: space-between;
  opacity: 0; transform: translateY(12px);
  transition: all 0.5s ease 0.6s;
}
.swipe-row {
  display: flex; align-items: center; gap: 12px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
  color: rgba(200,169,110,0.6);
}
.swipe-row::after {
  content: ''; display: block;
  width: 36px; height: 1px; background: currentColor;
}
.slide-count-badge {
  font-family: var(--mono); font-size: 11px; color: var(--dim);
  letter-spacing: 0.12em;
}

/* ══════════════════════════════════════
   CONTENT SLIDE
══════════════════════════════════════ */
.slide-content {
  padding: 0 80px 52px;
  justify-content: space-between;
}

/* Top: full-width tag strip */
.slide-content .c-top { }
.tag-strip {
  display: flex; align-items: center; gap: 0;
  background: rgba(0,229,200,0.05);
  border: 1px solid var(--border);
  padding: 12px 20px; margin-bottom: 0;
  opacity: 0; transform: translateY(-10px);
  transition: all 0.45s ease 0.0s;
}
.tag-arrow {
  font-family: var(--mono); font-size: 11px;
  color: var(--cyan); margin-right: 10px;
}
.tag-label {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--cyan);
}
.tag-num-watermark {
  position: absolute; right: 72px; top: 52px;
  font-family: var(--mono); font-size: 200px; font-weight: 700;
  color: rgba(0,229,200,0.04); line-height: 1;
  letter-spacing: -0.05em; pointer-events: none; z-index: 0;
}

/* Headline + body + stat all in c-mid */
.slide-content .c-mid {
  flex: 1; display: flex; flex-direction: column;
  padding: 32px 0 0; position: relative; z-index: 1;
}
.content-headline {
  font-size: 66px; font-weight: 700; line-height: 1.05;
  color: var(--white); letter-spacing: -0.02em; max-width: 860px;
  opacity: 0; transform: translateY(18px);
  transition: all 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s;
}
.content-headline em { font-style: italic; color: var(--cyan); font-weight: 400; }
.content-rule {
  width: 0; height: 1px; margin: 26px 0;
  background: linear-gradient(90deg, var(--cyan) 0%, var(--gold) 50%, transparent);
  transition: width 0.6s ease 0.25s;
}
.content-body {
  font-size: 26px; font-weight: 300; color: var(--muted);
  line-height: 1.68; max-width: 860px; width: 100%;
  opacity: 0; transition: opacity 0.55s ease 0.3s;
}

/* Stat pushed to bottom of c-mid via margin-top: auto */
.c-bot-sep {
  height: 1px; margin-top: auto; margin-bottom: 24px;
  background: linear-gradient(90deg, rgba(0,229,200,0.2), transparent);
  opacity: 0; transition: opacity 0.4s ease 0.38s;
}
.stat-block {
  display: flex; align-items: center;
  opacity: 0; transform: translateY(10px);
  transition: all 0.5s ease 0.42s;
}
.stat-bar {
  width: 4px; height: 72px;
  background: linear-gradient(180deg, var(--cyan), transparent);
  border-radius: 2px; flex-shrink: 0; margin-right: 28px;
}
.stat-value {
  font-family: var(--mono); font-size: 62px; font-weight: 700;
  color: var(--cyan); line-height: 1; letter-spacing: -0.03em;
  margin-right: 28px; flex-shrink: 0; white-space: nowrap;
}
.stat-desc {
  font-size: 18px; font-weight: 400; color: var(--muted); line-height: 1.5;
}

/* Footer always at the very bottom */
.slide-content .c-bot {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 22px;
  opacity: 0; transition: opacity 0.4s ease 0.55s;
}
.footer-brand {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  letter-spacing: 0.32em; text-transform: uppercase;
  color: rgba(200,169,110,0.4);
}
.footer-count {
  font-family: var(--mono); font-size: 11px; color: var(--dim);
  letter-spacing: 0.15em;
}

/* ══════════════════════════════════════
   CTA SLIDE
══════════════════════════════════════ */
.slide-cta {
  padding: 56px 80px 52px;
  justify-content: space-between;
}

.slide-cta .cta-top {
  opacity: 0; transform: translateY(-10px);
  transition: all 0.45s ease 0.05s;
}
.cta-terminal {
  font-family: var(--mono); font-size: 13px; color: var(--cyan);
  letter-spacing: 0.05em;
}
.cta-terminal-cursor {
  display: inline-block; width: 9px; height: 16px;
  background: var(--cyan); margin-left: 4px; vertical-align: middle;
  animation: blink 1.2s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.slide-cta .cta-mid {
  flex: 1; display: flex; flex-direction: column;
  justify-content: flex-end; padding-bottom: 48px;
}
.cta-headline {
  font-size: 74px; font-weight: 700; line-height: 1.04;
  color: var(--white); letter-spacing: -0.02em; max-width: 900px;
  opacity: 0; transform: translateY(20px);
  transition: all 0.75s cubic-bezier(0.16,1,0.3,1) 0.12s;
}
.cta-headline em { font-style: italic; color: var(--cyan); font-weight: 400; }
.cta-rule {
  width: 0; height: 2px; margin: 28px 0;
  background: linear-gradient(90deg, var(--cyan), var(--gold));
  transition: width 0.65s ease 0.28s;
}
.cta-body {
  font-size: 24px; font-weight: 300; color: var(--muted);
  line-height: 1.65; max-width: 700px;
  opacity: 0; transition: opacity 0.5s ease 0.38s;
}

.slide-cta .cta-bot {
  opacity: 0; transform: translateY(10px);
  transition: all 0.5s ease 0.52s;
}
.hashtag-row {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px;
}
.htag {
  font-family: var(--mono); font-size: 12px; font-weight: 400;
  color: var(--cyan); padding: 6px 14px;
  border: 1px solid rgba(0,229,200,0.25);
  background: rgba(0,229,200,0.05);
  letter-spacing: 0.04em;
}
.cta-brand-row {
  display: flex; align-items: center; justify-content: space-between;
}
.cta-brand {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: rgba(200,169,110,0.5);
}
.cta-count { font-family: var(--mono); font-size: 11px; color: var(--dim); letter-spacing: 0.15em; }

/* ── ANIMATED STATES ── */
.scene.anim .slide-title .t-top,
.scene.anim .slide-title .t-bot    { opacity: 1; transform: none; }
.scene.anim .slide-title .title-headline { opacity: 1; transform: none; }
.scene.anim .slide-title .title-rule     { width: 80px; }
.scene.anim .slide-title .title-sub      { opacity: 1; }

.scene.anim .slide-content .tag-strip        { opacity: 1; transform: none; }
.scene.anim .slide-content .content-headline { opacity: 1; transform: none; }
.scene.anim .slide-content .content-rule     { width: 80px; }
.scene.anim .slide-content .content-body     { opacity: 1; }
.scene.anim .slide-content .c-bot-sep        { opacity: 1; }
.scene.anim .slide-content .stat-block       { opacity: 1; transform: none; }
.scene.anim .slide-content .c-bot            { opacity: 1; }

.scene.anim .slide-cta .cta-top      { opacity: 1; transform: none; }
.scene.anim .slide-cta .cta-headline { opacity: 1; transform: none; }
.scene.anim .slide-cta .cta-rule     { width: 80px; }
.scene.anim .slide-cta .cta-body     { opacity: 1; }
.scene.anim .slide-cta .cta-bot      { opacity: 1; transform: none; }
</style>
</head>
<body>

<div class="top-bar"></div>
<div class="bot-bar"></div>
<div id="scene-container"></div>

<script>
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(s) {
  return esc(s).replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
}

/* Auto-shrink text to fit its container */
function fitText(el, minPx) {
  if (!el || !el.parentElement) return;
  const parent = el.parentElement;
  let size = parseFloat(window.getComputedStyle(el).fontSize);
  let iter = 0;
  while (iter++ < 80 && el.scrollHeight > parent.clientHeight + 4 && size > minPx) {
    size -= 1; el.style.fontSize = size + 'px';
  }
}

function padNum(n) { return String(n||0).padStart(2,'0'); }

function fmtStat(stat) {
  if (!stat) return '';
  const m = String(stat).match(/^([0-9][0-9.,]*\s*[%€xKMBk+]*)[\s\-–—:·]+(.+)$/);
  if (m) {
    return `
    <div class="stat-bar"></div>
    <div class="stat-value">${esc(m[1].trim())}</div>
    <div class="stat-desc">${esc(m[2].trim())}</div>`;
  }
  return `<div class="stat-bar"></div><div class="stat-desc">${esc(stat)}</div>`;
}

window.loadScene = function(slideData) {
  const c     = document.getElementById('scene-container');
  const idx   = slideData.index || 1;
  const total = slideData.total || '';
  const type  = slideData.type  || 'content';
  const brand = slideData.brand || 'Rodschinson Investment';
  const counter = total ? `${padNum(idx)} / ${padNum(total)}` : '';

  // Background layer shared by all slides
  const bgHtml = `
  <div class="bg-layer">
    <div class="bg-grid"></div>
    <div class="bg-glow-tr"></div>
    <div class="bg-glow-bl"></div>
    <div class="bg-line-v"></div>
  </div>`;

  let html = '';

  if (type === 'title') {
    const date = new Date().toISOString().slice(0,10);
    html = `<div class="scene slide-title" id="scene">
      ${bgHtml}
      <div class="t-top">
        <div class="brand-name">${esc(brand)}</div>
        <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      </div>
      <div class="t-mid">
        <div class="title-headline">${fmt(slideData.headline||'')}</div>
        <div class="title-rule"></div>
        <div class="title-sub">${esc(slideData.subheadline||slideData.sub||'')}</div>
      </div>
      <div class="t-bot">
        <div class="swipe-row">${esc(brand)} &nbsp;·&nbsp; ${date} &nbsp;·&nbsp; ${esc(slideData.cta||'Swipe →')}</div>
        <div class="slide-count-badge">${counter}</div>
      </div>
    </div>`;

  } else if (type === 'cta') {
    const tags = (slideData.hashtags||[]).map(h=>`<span class="htag">${esc(h)}</span>`).join('');
    html = `<div class="scene slide-cta" id="scene">
      ${bgHtml}
      <div class="cta-top">
        <div class="cta-terminal">$ contact --team ${esc((brand||'rodschinson').toLowerCase().replace(/\s+/g,''))}<span class="cta-terminal-cursor"></span></div>
      </div>
      <div class="cta-mid">
        <div class="cta-headline">${fmt(slideData.headline||'')}</div>
        <div class="cta-rule"></div>
        <div class="cta-body">${esc(slideData.body||'')}</div>
      </div>
      <div class="cta-bot">
        ${tags ? `<div class="hashtag-row">${tags}</div>` : ''}
        <div class="cta-brand-row">
          <div class="cta-brand">${esc(brand.toUpperCase())} — DATA INSIGHTS</div>
          <div class="cta-count">${counter}</div>
        </div>
      </div>
    </div>`;

  } else {
    // content slide
    const numLabel = `INSIGHT ${padNum(idx)}`;
    html = `<div class="scene slide-content" id="scene">
      ${bgHtml}
      <div class="tag-num-watermark">${padNum(idx)}</div>
      <div class="c-top">
        <div class="tag-strip">
          <span class="tag-arrow">►</span>
          <span class="tag-label">${esc(numLabel)}</span>
        </div>
      </div>
      <div class="c-mid">
        <div class="content-headline">${fmt(slideData.headline||'')}</div>
        <div class="content-rule"></div>
        <div class="content-body">${esc(slideData.body||'')}</div>
        ${slideData.stat ? `<div class="c-bot-sep"></div><div class="stat-block">${fmtStat(slideData.stat)}</div>` : '<div style="margin-top:auto"></div>'}
      </div>
      <div class="c-bot">
        <div class="footer-brand">${esc(brand.toUpperCase())} — DATA INSIGHTS</div>
        <div class="footer-count">${counter}</div>
      </div>
    </div>`;
  }

  c.innerHTML = html;

  // Auto-fit text after layout is computed
  setTimeout(() => {
    const scene = document.getElementById('scene');
    if (!scene) return;
    if (type === 'title') {
      fitText(scene.querySelector('.title-headline'), 36);
      fitText(scene.querySelector('.title-sub'),      14);
    } else if (type === 'content') {
      fitText(scene.querySelector('.content-headline'), 30);
      fitText(scene.querySelector('.content-body'),     16);
    } else if (type === 'cta') {
      fitText(scene.querySelector('.cta-headline'), 36);
      fitText(scene.querySelector('.cta-body'),     16);
    }
  }, 60);

  return true;
};

window.animateScene = function() {
  const s = document.getElementById('scene');
  if (!s) return;
  requestAnimationFrame(() => {
    s.classList.add('active');
    setTimeout(() => s.classList.add('anim'), 40);
  });
};

window.isAnimationComplete = function(d) {
  return new Promise(r => setTimeout(r, d||800));
};
</script>
</body>
</html>
