<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>Carousel — Data Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --dark-blue:#08316F; --sky-blue:#00B6FF; }

html, body {
  width:1080px; height:1080px; overflow:hidden;
  font-family:'Outfit', sans-serif;
  background:var(--dark-blue); color:#fff;
}
#scene-container { width:1080px; height:1080px; position:relative; }

/* ── SCENE ── */
.scene {
  position:absolute; inset:0; display:none;
  flex-direction:column; overflow:hidden;
  background:var(--dark-blue);
}
.scene.active { display:flex; }

/* Diagonal accent overlay */
.scene::before {
  content:''; position:absolute; inset:0;
  background: linear-gradient(
    148deg,
    color-mix(in srgb, var(--sky-blue) 18%, transparent) 0%,
    transparent 50%
  );
  pointer-events:none; z-index:0;
}
/* Bottom-right glow */
.scene::after {
  content:''; position:absolute;
  bottom:-100px; right:-100px;
  width:400px; height:400px;
  background: radial-gradient(circle, color-mix(in srgb, var(--sky-blue) 20%, transparent) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

/* ── HEADER ── */
.frame-header {
  position:absolute; top:0; left:0; right:0; height:68px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 52px; z-index:10;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.frame-header::before {
  content:''; position:absolute; top:0; left:0; right:0; height:4px;
  background: linear-gradient(90deg, var(--sky-blue), color-mix(in srgb, var(--sky-blue) 50%, var(--dark-blue)));
}
#logo-text {
  font-family:'Outfit', sans-serif;
  font-size:14px; font-weight:600; letter-spacing:0.18em;
  text-transform:uppercase; color:rgba(255,255,255,0.82);
}
.frame-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--sky-blue); opacity:0.7;
}
#frame-counter {
  font-size:13px; font-weight:500;
  color:rgba(255,255,255,0.55);
  font-family:'Outfit', sans-serif;
}

/* ── TITLE SLIDE ── */
.slide-title {
  padding:68px 52px 52px;
  flex-direction:column; justify-content:flex-start; position:relative;
}
.t-eyebrow {
  font-size:12px; font-weight:600; letter-spacing:0.36em;
  text-transform:uppercase; color:var(--sky-blue); opacity:0.8;
  display:flex; align-items:center; gap:14px;
}
.t-eyebrow::before { content:''; width:28px; height:2px; background:var(--sky-blue); }
.t-headline {
  font-family:'Playfair Display', serif;
  font-size:88px; font-weight:900; font-style:italic;
  line-height:0.93; color:#fff; letter-spacing:-0.02em;
  margin-top:40px; margin-bottom:auto; position:relative; z-index:1;
}
.t-rule {
  width:48px; height:3px;
  background: linear-gradient(90deg, var(--sky-blue), transparent);
  margin-bottom:22px;
}
.t-sub {
  font-size:20px; font-weight:300; line-height:1.6;
  color:rgba(255,255,255,0.75); position:relative; z-index:1;
}
.t-swipe {
  font-size:12px; font-weight:500; letter-spacing:0.28em;
  text-transform:uppercase; color:rgba(255,255,255,0.55);
  display:flex; align-items:center; gap:10px;
  position:relative; z-index:1;
}
.t-swipe::after { content:'→'; color:var(--sky-blue); }

/* ── CONTENT SLIDE ── */
.slide-content {
  padding:68px 52px 52px;
  flex-direction:column; justify-content:flex-start; position:relative;
}
.c-tag {
  font-size:12px; font-weight:600; letter-spacing:0.32em;
  text-transform:uppercase; color:var(--sky-blue); opacity:0.75;
  margin-bottom:28px; position:relative; z-index:1;
  display:flex; align-items:center; gap:12px;
}
.c-tag::before { content:''; width:24px; height:2px; background:var(--sky-blue); }
.c-headline {
  font-family:'Playfair Display', serif;
  font-size:56px; font-weight:700; font-style:italic;
  line-height:1.0; color:#fff; letter-spacing:-0.01em;
  margin-bottom:auto;
  position:relative; z-index:1;
}
.c-body {
  font-size:19px; font-weight:400; line-height:1.7;
  color:rgba(255,255,255,0.82); position:relative; z-index:1;
}
/* Solid accent block for stat */
.c-stat {
  background:color-mix(in srgb, var(--sky-blue) 15%, transparent);
  border-left:4px solid var(--sky-blue);
  padding:20px 24px; margin-top:24px;
  display:flex; align-items:baseline; gap:12px;
  position:relative; z-index:1;
}
.c-stat-num {
  font-family:'Playfair Display', serif;
  font-size:52px; font-weight:900; color:var(--sky-blue);
  letter-spacing:-0.02em;
}
.c-stat-desc {
  font-size:17px; font-weight:400; color:rgba(255,255,255,0.82);
  line-height:1.4;
}

/* ── CTA SLIDE ── */
.slide-cta {
  padding:68px 52px 52px;
  flex-direction:column; justify-content:center; align-items:center;
  text-align:center; position:relative;
  background: radial-gradient(ellipse 70% 55% at 50% 50%, color-mix(in srgb, var(--sky-blue) 22%, transparent) 0%, transparent 65%) !important;
}
.cta-mono {
  width:64px; height:64px; border-radius:50%;
  border:2px solid rgba(255,255,255,0.55);
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display', serif;
  font-size:30px; font-weight:700; color:#fff;
  margin-bottom:36px; position:relative; z-index:1;
}
.cta-headline {
  font-family:'Playfair Display', serif;
  font-size:68px; font-weight:900; font-style:italic;
  line-height:0.95; color:#fff;
  letter-spacing:-0.02em; margin-bottom:32px;
  position:relative; z-index:1;
}
.cta-rule {
  width:48px; height:2px;
  background: linear-gradient(90deg, transparent, var(--sky-blue), transparent);
  margin:0 auto 28px; position:relative; z-index:1;
}
.cta-body {
  font-size:19px; font-weight:300; line-height:1.65;
  color:rgba(255,255,255,0.75); max-width:720px;
  margin-bottom:36px; position:relative; z-index:1;
}
.hashtags { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; position:relative; z-index:1; }
.hashtag {
  font-size:13px; font-weight:500; color:var(--sky-blue);
  border:1px solid color-mix(in srgb, var(--sky-blue) 28%, transparent);
  padding:6px 16px; border-radius:20px;
}
</style>
</head>
<body>
<div id="scene-container">
  <div class="frame-header">
    <div id="logo-text">Brand</div>
    <div class="frame-dot"></div>
    <div id="frame-counter"></div>
  </div>
</div>
<script>
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(s){ return esc(s).replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/\n/g,'<br>'); }

function parseStatBlock(stat) {
  if (!stat) return '';
  const [v, d] = String(stat).split(/\s*—\s*/, 2);
  return `<div class="c-stat">
    <div class="c-stat-num">${esc(v.trim())}</div>
    <div class="c-stat-desc">${esc(d||'')}</div>
  </div>`;
}

window.loadScene = function(slideData) {
  const c     = document.getElementById('scene-container');
  const idx   = slideData.index || 1;
  const type  = slideData.type  || 'content';
  const total = slideData.total || '';

  const _bname = (window.__brand && window.__brand.name) || slideData.brand || '';
  const _b1    = (_bname[0] || 'B').toUpperCase();
  const cntTxt = total ? `${String(idx).padStart(2,'0')} / ${String(total).padStart(2,'0')}` : '';

  let sceneHtml = '';

  if (type === 'title') {
    sceneHtml = `<div class="scene slide-title active" id="scene">
      <div class="t-eyebrow">${esc(_bname)}</div>
      <div class="t-headline">${fmt(slideData.headline || '')}</div>
      <div>
        <div class="t-rule"></div>
        <div class="t-sub">${esc(slideData.subheadline || '')}</div>
      </div>
      <div class="t-swipe">${esc(slideData.cta || 'Swipe')}</div>
    </div>`;

  } else if (type === 'cta') {
    const tags = (slideData.hashtags || []).map(h => `<span class="hashtag">${esc(h)}</span>`).join('');
    sceneHtml = `<div class="scene slide-cta active" id="scene">
      <div class="cta-mono">${_b1}</div>
      <div class="cta-headline">${fmt(slideData.headline || '')}</div>
      <div class="cta-rule"></div>
      <div class="cta-body">${esc(slideData.body || '')}</div>
      ${tags ? `<div class="hashtags">${tags}</div>` : ''}
    </div>`;

  } else {
    sceneHtml = `<div class="scene slide-content active" id="scene">
      <div class="c-tag">${String(idx).padStart(2,'0')}</div>
      <div class="c-headline">${fmt(slideData.headline || '')}</div>
      <div class="c-body">${esc(slideData.body || '')}</div>
      ${parseStatBlock(slideData.stat)}
    </div>`;
  }

  c.innerHTML = `<div class="frame-header">
    <div id="logo-text">${esc(_bname)}</div>
    <div class="frame-dot"></div>
    <div id="frame-counter">${cntTxt}</div>
  </div>` + sceneHtml;
  return true;
};

window.animateScene = function() {};
window.isAnimationComplete = function(d){ return new Promise(r=>setTimeout(r, d||400)); };
</script>
</body>
</html>
