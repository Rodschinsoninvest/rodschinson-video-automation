<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>Carousel — Bold Dark</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --dark-blue:#0C0C0E; --sky-blue:#C8A96E; }

html, body {
  width:1080px; height:1080px; overflow:hidden;
  font-family:'DM Sans', sans-serif;
  background:var(--dark-blue); color:#fff;
}
#scene-container { width:1080px; height:1080px; position:relative; }

/* ── SCENE ── */
.scene {
  position:absolute; inset:0; display:none;
  flex-direction:column; overflow:hidden;
  background:var(--dark-blue);
}
.scene.active { display:flex; }

/* Gold corner L-brackets */
.scene::before {
  content:''; position:absolute;
  top:44px; left:44px;
  width:60px; height:60px;
  border-top:2px solid color-mix(in srgb, var(--sky-blue) 55%, transparent);
  border-left:2px solid color-mix(in srgb, var(--sky-blue) 55%, transparent);
  z-index:5; pointer-events:none;
}
.scene::after {
  content:''; position:absolute;
  bottom:44px; right:44px;
  width:60px; height:60px;
  border-bottom:2px solid color-mix(in srgb, var(--sky-blue) 55%, transparent);
  border-right:2px solid color-mix(in srgb, var(--sky-blue) 55%, transparent);
  z-index:5; pointer-events:none;
}

/* ── HEADER ── */
.frame-header {
  position:absolute; top:0; left:0; right:0; height:72px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 52px; z-index:10;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.logo-text {
  font-family:'DM Sans', sans-serif;
  font-size:13px; font-weight:500; letter-spacing:0.22em;
  text-transform:uppercase; color:rgba(255,255,255,0.82);
}
#frame-counter {
  font-family:'DM Serif Display', serif;
  font-size:13px; color:var(--sky-blue); opacity:0.7;
}

/* ── TITLE SLIDE ── */
.slide-title {
  padding:72px 52px 56px;
  justify-content:flex-start;
}
/* Faint watermark year */
.watermark-yr {
  position:absolute;
  top:60px; right:52px;
  font-family:'DM Serif Display', serif;
  font-size:200px; font-weight:400;
  color:rgba(255,255,255,0.025);
  line-height:1; z-index:0;
  user-select:none;
}
.t-eyebrow {
  font-size:11px; font-weight:500; letter-spacing:0.38em;
  text-transform:uppercase; color:var(--sky-blue);
  opacity:0.75; position:relative; z-index:1;
}
.t-headline {
  font-family:'DM Serif Display', serif;
  font-size:88px; font-weight:400; line-height:0.95;
  color:#fff; letter-spacing:-0.01em;
  position:relative; z-index:1;
  margin-top:40px; margin-bottom:auto;
}
.t-divider {
  width:64px; height:1px; background:var(--sky-blue);
  opacity:0.6; margin-bottom:28px; position:relative; z-index:1;
}
.t-sub {
  font-size:20px; font-weight:300; line-height:1.65;
  color:rgba(255,255,255,0.75);
  position:relative; z-index:1;
}
.t-swipe {
  position:relative; z-index:1;
  font-size:12px; font-weight:500; letter-spacing:0.3em;
  text-transform:uppercase; color:rgba(255,255,255,0.55);
  display:flex; align-items:center; gap:10px;
}
.t-swipe::after { content:'→'; color:var(--sky-blue); }

/* ── CONTENT SLIDE ── */
.slide-content {
  padding:72px 52px 56px;
  justify-content:flex-start;
}
.c-tag-row {
  display:flex; align-items:center; gap:20px; margin-bottom:36px;
}
.c-tag-num {
  font-family:'DM Serif Display', serif;
  font-size:18px; font-style:italic;
  color:var(--sky-blue); letter-spacing:0.05em;
}
.c-tag-line { flex:1; height:1px; background:rgba(255,255,255,0.1); }
/* Faint large index background */
.c-watermark {
  position:absolute;
  top:60px; right:44px;
  font-family:'DM Serif Display', serif;
  font-size:180px; font-weight:400;
  color:rgba(255,255,255,0.03); line-height:1; z-index:0;
}
.c-headline {
  font-family:'DM Serif Display', serif;
  font-size:58px; font-weight:400; line-height:1.05;
  color:#fff; letter-spacing:-0.01em;
  margin-bottom:auto; position:relative; z-index:1;
}
.c-rule { width:32px; height:1px; background:rgba(255,255,255,0.55); margin:28px 0; }
.c-body {
  font-size:19px; font-weight:300; line-height:1.7;
  color:rgba(255,255,255,0.82); max-width:780px;
  position:relative; z-index:1;
}
.c-stat {
  border-top:1px solid rgba(255,255,255,0.1);
  padding-top:24px; margin-top:28px;
  display:flex; align-items:baseline; gap:12px;
  position:relative; z-index:1;
}
.c-stat-num {
  font-family:'DM Serif Display', serif;
  font-size:56px; font-weight:400; color:var(--sky-blue);
  letter-spacing:-0.02em;
}
.c-stat-desc {
  font-size:17px; font-weight:300; color:rgba(255,255,255,0.75);
  line-height:1.5; flex:1;
}

/* ── CTA SLIDE ── */
.slide-cta {
  justify-content:center; align-items:center;
  text-align:center; padding:52px;
  background: radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in srgb, var(--sky-blue) 12%, transparent) 0%, transparent 65%);
}
.cta-overline {
  font-size:11px; font-weight:500; letter-spacing:0.42em;
  text-transform:uppercase; color:var(--sky-blue); margin-bottom:36px; opacity:0.8;
}
.cta-headline {
  font-family:'DM Serif Display', serif;
  font-size:72px; font-weight:400; line-height:1.0;
  color:#fff; letter-spacing:-0.01em; margin-bottom:36px;
}
.cta-rule { width:48px; height:1px; background:var(--sky-blue); opacity:0.6; margin:0 auto 32px; }
.cta-body {
  font-size:20px; font-weight:300; line-height:1.7;
  color:rgba(255,255,255,0.75); max-width:680px; margin-bottom:40px;
}
.hashtags { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
.hashtag {
  font-size:13px; font-weight:400; letter-spacing:0.08em;
  color:var(--sky-blue); border:1px solid color-mix(in srgb, var(--sky-blue) 25%, transparent);
  padding:6px 16px; border-radius:20px; opacity:0.75;
}
</style>
</head>
<body>
<div id="scene-container">
  <div class="frame-header">
    <div class="logo-text" id="logo-text">Brand</div>
    <div id="frame-counter"></div>
  </div>
</div>
<script>
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(s){ return esc(s).replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/\n/g,'<br>'); }

function parseStatBlock(stat) {
  if (!stat) return '';
  const [v, d] = String(stat).split(/\s*—\s*/, 2);
  return `<div class="c-stat">
    <div class="c-stat-num">${esc(v.trim())}</div>
    <div class="c-stat-desc">${esc(d||'')}</div>
  </div>`;
}

window.loadScene = function(slideData) {
  const c     = document.getElementById('scene-container');
  const idx   = slideData.index || 1;
  const type  = slideData.type  || 'content';
  const total = slideData.total || '';
  const yr    = new Date().getFullYear();

  document.getElementById('frame-counter').textContent =
    total ? `${String(idx).padStart(2,'0')} / ${String(total).padStart(2,'0')}` : '';

  const _bname = (window.__brand && window.__brand.name) || slideData.brand || '';
  const lt = document.getElementById('logo-text');
  if (lt && _bname) lt.textContent = _bname;

  let sceneHtml = '';

  if (type === 'title') {
    sceneHtml = `<div class="scene slide-title active" id="scene">
      <div class="watermark-yr">${yr}</div>
      <div class="t-eyebrow">${esc(_bname)}</div>
      <div class="t-headline">${fmt(slideData.headline || '')}</div>
      <div>
        <div class="t-divider"></div>
        <div class="t-sub">${esc(slideData.subheadline || '')}</div>
      </div>
      <div class="t-swipe">${esc(slideData.cta || 'Swipe')}</div>
    </div>`;

  } else if (type === 'cta') {
    const tags = (slideData.hashtags || []).map(h => `<span class="hashtag">${esc(h)}</span>`).join('');
    sceneHtml = `<div class="scene slide-cta active" id="scene">
      <div class="cta-overline">${esc(_bname)}</div>
      <div class="cta-headline">${fmt(slideData.headline || '')}</div>
      <div class="cta-rule"></div>
      <div class="cta-body">${esc(slideData.body || '')}</div>
      ${tags ? `<div class="hashtags">${tags}</div>` : ''}
    </div>`;

  } else {
    sceneHtml = `<div class="scene slide-content active" id="scene">
      <div class="c-watermark">${String(idx).padStart(2,'0')}</div>
      <div class="c-tag-row">
        <div class="c-tag-num">${String(idx).padStart(2,'0')}.</div>
        <div class="c-tag-line"></div>
      </div>
      <div class="c-headline">${fmt(slideData.headline || '')}</div>
      <div class="c-rule"></div>
      <div class="c-body">${esc(slideData.body || '')}</div>
      ${parseStatBlock(slideData.stat)}
    </div>`;
  }

  // Re-insert header + new scene
  c.innerHTML = `<div class="frame-header">
    <div class="logo-text" id="logo-text">${esc(_bname)}</div>
    <div id="frame-counter">${total ? String(idx).padStart(2,'0')+' / '+String(total).padStart(2,'0') : ''}</div>
  </div>` + sceneHtml;
  return true;
};

window.animateScene = function() {};
window.isAnimationComplete = function(d){ return new Promise(r=>setTimeout(r, d||400)); };
</script>
</body>
</html>
