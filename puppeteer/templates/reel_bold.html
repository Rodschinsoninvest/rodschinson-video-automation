<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1080px;height:1920px;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  background:#0a0a0a;color:#fff;}
#scene-container{width:1080px;height:1920px;position:relative;}

.scene{
  width:1080px;height:1920px;position:relative;
  display:flex;flex-direction:column;overflow:hidden;
  background:#0a0a0a;
}
/* diagonal slash accent */
.scene::before{
  content:'';position:absolute;
  top:-200px;right:-100px;
  width:600px;height:2400px;
  background:linear-gradient(135deg,rgba(255,68,68,0.18) 0%,rgba(255,107,53,0.08) 50%,transparent 100%);
  transform:rotate(-15deg);pointer-events:none;
}

.top-bar{position:absolute;top:0;left:0;right:0;height:6px;
  background:linear-gradient(90deg,#FF4444 0%,#FF6B35 100%);z-index:10;}
.header{position:absolute;top:6px;left:0;right:0;height:88px;
  display:flex;align-items:center;justify-content:space-between;padding:0 60px;z-index:10;}
.hdr-brand{font-size:20px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.8);}
.hdr-badge{
  font-size:15px;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;
  color:#fff;background:#FF4444;padding:10px 22px;border-radius:4px;}

.footer{position:absolute;bottom:0;left:0;right:0;height:88px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 60px;border-top:1px solid rgba(255,68,68,0.2);
  background:rgba(10,10,10,0.95);z-index:10;}
.ftr-l{font-size:19px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.5);}
.ftr-r{font-size:19px;color:#FF6B35;font-weight:600;}

/* ══ TITLE CARD ══ */
.scene-title{justify-content:center;align-items:flex-start;}
.tc-wrap{padding:100px 70px 100px;display:flex;flex-direction:column;gap:0;}
.tc-label{
  display:inline-block;font-size:20px;font-weight:900;letter-spacing:0.22em;text-transform:uppercase;
  color:#0a0a0a;background:#FF4444;padding:10px 24px;border-radius:4px;margin-bottom:60px;align-self:flex-start;
}
.tc-headline{font-size:116px;font-weight:900;line-height:0.95;color:#fff;margin-bottom:50px;letter-spacing:-0.02em;}
.tc-accent{width:100%;height:5px;background:linear-gradient(90deg,#FF4444,#FF6B35,transparent);margin-bottom:50px;}
.tc-sub{font-size:44px;font-weight:400;line-height:1.35;color:rgba(255,255,255,0.7);}

/* ══ BIG NUMBER ══ */
.scene-number{justify-content:center;align-items:center;}
.bn-top{
  align-self:stretch;padding:0 70px;margin-bottom:50px;
  font-size:26px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;
  color:rgba(255,255,255,0.55);text-align:left;
}
.bn-center{display:flex;flex-direction:column;align-items:center;padding:0 60px;width:100%;}
.bn-num{font-size:280px;font-weight:900;line-height:0.85;color:#FF4444;letter-spacing:-0.04em;text-align:center;}
.bn-unit{font-size:66px;font-weight:800;color:#fff;margin-top:16px;letter-spacing:0.04em;}
.bn-line{width:80px;height:5px;background:#FF4444;margin:55px auto;}
.bn-ctx{font-size:36px;font-weight:400;color:rgba(255,255,255,0.65);text-align:center;line-height:1.4;padding:0 80px;max-height:220px;}

/* ══ BULLETS ══ */
.scene-bullets{justify-content:flex-start;}
.tb-wrap{margin-top:100px;padding:0 70px;flex:1;display:flex;flex-direction:column;}
.tb-title{font-size:72px;font-weight:900;line-height:1.0;color:#fff;margin-bottom:30px;}
.tb-accent{width:80px;height:5px;background:#FF4444;margin-bottom:55px;}
.tb-item{
  display:flex;align-items:flex-start;gap:26px;margin-bottom:48px;
  opacity:0;transform:translateY(20px);transition:opacity 0.35s,transform 0.35s;
}
.tb-item.visible{opacity:1;transform:none;}
.tb-bar{width:6px;border-radius:3px;background:#FF4444;align-self:stretch;flex-shrink:0;min-height:50px;}
.tb-text{font-size:40px;font-weight:600;line-height:1.35;color:rgba(255,255,255,0.9);}

/* ══ BAR CHART ══ */
.scene-chart{justify-content:flex-start;}
.bc-wrap{margin-top:100px;padding:0 70px;flex:1;display:flex;flex-direction:column;}
.bc-title{font-size:60px;font-weight:900;line-height:1.05;color:#fff;margin-bottom:25px;}
.bc-accent{width:80px;height:5px;background:#FF4444;margin-bottom:50px;}
.bc-bars{flex:1;display:flex;flex-direction:column;justify-content:space-evenly;}
.bc-row{display:flex;flex-direction:column;gap:10px;}
.bc-meta{display:flex;justify-content:space-between;}
.bc-lbl{font-size:30px;font-weight:600;color:rgba(255,255,255,0.8);}
.bc-vl{font-size:34px;font-weight:900;color:#FF4444;}
.bc-track{height:22px;background:rgba(255,255,255,0.08);border-radius:11px;overflow:hidden;}
.bc-fill{height:100%;border-radius:11px;background:linear-gradient(90deg,#FF4444,#FF6B35);width:0%;transition:width 0.9s cubic-bezier(.4,0,.2,1);}
.bc-fill.anim{width:var(--w);}
.bc-src{font-size:22px;color:rgba(255,255,255,0.3);margin-top:16px;text-align:right;}

/* ══ CTA ══ */
.scene-cta{justify-content:center;align-items:flex-start;}
.cta-wrap{padding:80px 70px;display:flex;flex-direction:column;gap:50px;}
.cta-tag{font-size:22px;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:#FF4444;}
.cta-headline{font-size:92px;font-weight:900;line-height:1.0;color:#fff;}
.cta-accent{width:100%;height:5px;background:linear-gradient(90deg,#FF4444,#FF6B35,transparent);}
.cta-btn{
  align-self:flex-start;padding:36px 80px;background:#FF4444;color:#fff;
  font-size:32px;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;border-radius:6px;
}
.cta-url{font-size:28px;color:rgba(255,255,255,0.45);letter-spacing:0.06em;}
</style>
</head>
<body>
<div id="scene-container"></div>
<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(s){return esc(s).replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');}
function fitText(el,minPx){
  if(!el||!el.parentElement)return;
  let size=parseFloat(getComputedStyle(el).fontSize),iter=0;
  while(iter++<80&&el.scrollHeight>el.parentElement.clientHeight+8&&size>minPx){size-=2;el.style.fontSize=size+'px';}
}

const B='RODSCHINSON';const U='rodschinson.com';
const HDR=`<div class="top-bar"></div><div class="header"><span class="hdr-brand">${B}</span><span class="hdr-badge">REEL</span></div>`;
const FTR=`<div class="footer"><span class="ftr-l">${B}</span><span class="ftr-r">${U}</span></div>`;

window.loadScene=function(data){
  const c=document.getElementById('scene-container');
  const v=data.visuel||{};const tv=data.type_visuel||'title_card';let html='';

  if(tv==='title_card'){
    html=`<div class="scene scene-title">${HDR}${FTR}
      <div class="tc-wrap">
        ${v.eyebrow?`<div class="tc-label">${esc(v.eyebrow)}</div>`:''}
        <div class="tc-headline" id="_hl">${fmt(v.titre_principal||v.titre||'')}</div>
        <div class="tc-accent"></div>
        <div class="tc-sub" id="_sub">${fmt(v.sous_titre||v.subtitle||'')}</div>
      </div></div>`;

  }else if(tv==='big_number'){
    html=`<div class="scene scene-number">${HDR}${FTR}
      <div class="bn-top" id="_ey">${fmt(v.eyebrow||v.label||v.titre||'')}</div>
      <div class="bn-center">
        <div class="bn-num">${esc(v.valeur||'0')}</div>
        <div class="bn-unit">${esc(v.unite||'%')}</div>
        <div class="bn-line"></div>
      </div>
      <div class="bn-ctx" id="_ctx">${fmt(v.contexte||v.subtitle||'')}</div></div>`;

  }else if(tv==='text_bullets'){
    const items=v.items||v.elements||v.points||[];
    const rows=items.map((it,i)=>`<div class="tb-item" data-i="${i}"><div class="tb-bar"></div><div class="tb-text">${fmt(String(it))}</div></div>`).join('');
    html=`<div class="scene scene-bullets">${HDR}${FTR}
      <div class="tb-wrap">
        <div class="tb-title" id="_tit">${fmt(v.titre||v.titre_principal||'')}</div>
        <div class="tb-accent"></div>${rows}
      </div></div>`;

  }else if(tv==='bar_chart'){
    const series=v.series||[];const maxV=Math.max(...series.map(s=>s.valeur),1);const unite=v.unite||'%';
    const bars=series.map(s=>{
      const pct=((s.valeur/maxV)*100).toFixed(1);
      return `<div class="bc-row"><div class="bc-meta"><span class="bc-lbl">${esc(s.label)}</span><span class="bc-vl">${s.valeur}${unite}</span></div><div class="bc-track"><div class="bc-fill" style="--w:${pct}%"></div></div></div>`;
    }).join('');
    html=`<div class="scene scene-chart">${HDR}${FTR}
      <div class="bc-wrap">
        <div class="bc-title" id="_tit">${fmt(v.titre||v.titre_principal||'')}</div>
        <div class="bc-accent"></div>
        <div class="bc-bars">${bars}</div>
        ${v.source?`<div class="bc-src">${esc(v.source)}</div>`:''}
      </div></div>`;

  }else{
    const isStep=tv==='process_steps';
    const items=isStep?(v.etapes||v.items||[]):(v.items||v.elements||[]);
    if(isStep&&items.length){
      const rows=items.map((it,i)=>`<div class="tb-item" data-i="${i}"><div class="tb-bar"></div><div class="tb-text">${fmt(String(it))}</div></div>`).join('');
      html=`<div class="scene scene-bullets">${HDR}${FTR}<div class="tb-wrap"><div class="tb-title" id="_tit">${fmt(v.titre||v.titre_principal||'')}</div><div class="tb-accent"></div>${rows}</div></div>`;
    }else{
      html=`<div class="scene scene-cta">${HDR}${FTR}
        <div class="cta-wrap">
          <div class="cta-tag">${esc(v.eyebrow||B)}</div>
          <div class="cta-headline" id="_hl">${fmt(v.headline||v.titre_principal||v.titre||'')}</div>
          <div class="cta-accent"></div>
          <div class="cta-btn">${esc(v.cta_text||v.cta||'Consultation Gratuite')}</div>
          <div class="cta-url">${esc(v.url||v.site||U)}</div>
        </div></div>`;
    }
  }

  c.innerHTML=html;
  setTimeout(()=>{
    fitText(document.getElementById('_hl'),38);
    fitText(document.getElementById('_sub'),22);
    fitText(document.getElementById('_tit'),28);
    fitText(document.getElementById('_ctx'),20);
    fitText(document.getElementById('_ey'),18);
  },60);
  return true;
};

window.animateScene=function(){
  const s=document.querySelector('.scene');if(!s)return;
  requestAnimationFrame(()=>{
    s.classList.add('active');
    document.querySelectorAll('.tb-item').forEach((el,i)=>setTimeout(()=>el.classList.add('visible'),100+i*120));
    setTimeout(()=>document.querySelectorAll('.bc-fill').forEach(el=>el.classList.add('anim')),200);
  });
};
window.isAnimationComplete=function(d){return new Promise(r=>setTimeout(r,d||600));};
</script>
</body>
</html>
