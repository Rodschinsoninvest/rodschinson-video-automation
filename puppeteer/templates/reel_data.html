<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1080px; height: 1920px; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  background: #080E1A; color: #fff;
}
#scene-container { width: 1080px; height: 1920px; position: relative; }

/* ── SHARED ── */
.scene {
  width: 1080px; height: 1920px; position: relative;
  display: flex; flex-direction: column; overflow: hidden;
  background: #080E1A;
}
/* dot grid */
.scene::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(0,229,200,0.18) 1px, transparent 1px);
  background-size: 54px 54px;
  opacity: 0.35; pointer-events: none;
}
.scene::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 45% at 85% 10%, rgba(0,229,200,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 5% 90%,  rgba(0,182,255,0.08) 0%, transparent 60%);
  pointer-events: none;
}

/* top bar */
.top-bar {
  position: absolute; top:0; left:0; right:0; height:5px;
  background: linear-gradient(90deg, #00E5C8 0%, #00B6FF 100%);
  z-index:10;
}
.header {
  position: absolute; top:5px; left:0; right:0; height:88px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 60px; z-index:10;
}
.header-brand  { font-size:20px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.7); }
.header-badge  {
  font-size:17px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase;
  color:#080E1A; background:#00E5C8; padding:8px 20px; border-radius:4px;
}

/* bottom */
.footer {
  position:absolute; bottom:0; left:0; right:0; height:88px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 60px; border-top:1px solid rgba(0,229,200,0.15);
  background:rgba(8,14,26,0.9); z-index:10;
}
.footer-l { font-size:19px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.5); }
.footer-r { font-size:20px; color:#00E5C8; font-weight:500; }

/* ── CORNER BRACKETS ── */
.bracket {
  position:absolute; width:50px; height:50px;
  border-color:#00E5C8; border-style:solid; opacity:0.5; z-index:5;
}
.bracket.tl { top:100px; left:30px; border-width:2px 0 0 2px; }
.bracket.tr { top:100px; right:30px; border-width:2px 2px 0 0; }
.bracket.bl { bottom:100px; left:30px; border-width:0 0 2px 2px; }
.bracket.br { bottom:100px; right:30px; border-width:0 2px 2px 0; }

/* ══ TITLE CARD ══ */
.scene-title { justify-content:center; align-items:center; text-align:center; }
.tc-tag {
  font-size:22px; font-weight:700; letter-spacing:0.26em; text-transform:uppercase;
  color:#00E5C8; margin-bottom:50px; padding:0 80px;
}
.tc-content { padding:0 80px; display:flex; flex-direction:column; align-items:center; }
.tc-headline { font-size:108px; font-weight:900; line-height:1.0; color:#fff; text-align:center; margin-bottom:55px; }
.tc-line {
  width:0; height:3px; background:linear-gradient(90deg, transparent, #00E5C8, transparent);
  margin:0 auto 55px; transition:width 0.6s ease;
}
.tc-line.anim { width:80%; }
.tc-sub { font-size:40px; font-weight:400; line-height:1.4; color:rgba(255,255,255,0.65); text-align:center; }

/* ══ BIG NUMBER ══ */
.scene-number { justify-content:center; align-items:center; }
.bn-label {
  font-size:26px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase;
  color:rgba(255,255,255,0.5); text-align:center; padding:0 80px; margin-bottom:60px;
}
.bn-box {
  display:flex; flex-direction:column; align-items:center;
  padding:80px; background:rgba(0,229,200,0.05);
  border:1px solid rgba(0,229,200,0.2); border-radius:12px;
  margin:0 60px; position:relative; z-index:2;
}
.bn-number { font-size:270px; font-weight:900; line-height:0.88; color:#00E5C8; letter-spacing:-0.04em; }
.bn-unit   { font-size:68px;  font-weight:700; color:#fff; margin-top:20px; letter-spacing:0.05em; }
.bn-sep    { width:60px; height:3px; background:#00E5C8; margin:50px auto 0; opacity:0.6; }
.bn-ctx    { font-size:34px; font-weight:400; color:rgba(255,255,255,0.65); text-align:center; margin-top:50px; line-height:1.4; padding:0 80px; }

/* ══ BULLETS ══ */
.scene-bullets { justify-content:flex-start; }
.tb-wrap { margin-top:100px; padding:0 70px; flex:1; display:flex; flex-direction:column; }
.tb-title { font-size:68px; font-weight:900; line-height:1.1; color:#fff; margin-bottom:30px; }
.tb-rule  { width:60px; height:3px; background:#00E5C8; margin-bottom:55px; }
.tb-item  {
  display:flex; align-items:flex-start; gap:24px; margin-bottom:44px;
  opacity:0; transform:translateX(-20px); transition:opacity 0.35s, transform 0.35s;
}
.tb-item.visible { opacity:1; transform:none; }
.tb-num  {
  font-size:22px; font-weight:800; color:#080E1A; background:#00E5C8;
  min-width:42px; height:42px; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; margin-top:6px;
}
.tb-text { font-size:40px; font-weight:500; line-height:1.35; color:rgba(255,255,255,0.88); }

/* ══ BAR CHART (horizontal) ══ */
.scene-chart { justify-content:flex-start; }
.bc-wrap { margin-top:100px; padding:0 70px; flex:1; display:flex; flex-direction:column; }
.bc-title { font-size:60px; font-weight:900; line-height:1.1; color:#fff; margin-bottom:25px; }
.bc-rule  { width:60px; height:3px; background:#00E5C8; margin-bottom:50px; }
.bc-bars  { flex:1; display:flex; flex-direction:column; justify-content:space-evenly; }
.bc-row   { display:flex; flex-direction:column; gap:10px; }
.bc-meta  { display:flex; justify-content:space-between; }
.bc-lbl   { font-size:30px; font-weight:600; color:rgba(255,255,255,0.8); }
.bc-vl    { font-size:34px; font-weight:900; color:#00E5C8; }
.bc-track { height:22px; background:rgba(255,255,255,0.08); border-radius:11px; overflow:hidden; }
.bc-fill  { height:100%; border-radius:11px; background:linear-gradient(90deg,#00E5C8,#00B6FF); width:0%; transition:width 0.9s cubic-bezier(.4,0,.2,1); }
.bc-fill.anim { width:var(--w); }
.bc-src   { font-size:22px; color:rgba(255,255,255,0.3); margin-top:16px; text-align:right; }

/* ══ CTA ══ */
.scene-cta { justify-content:center; align-items:center; text-align:center; }
.cta-wrap  { padding:0 80px; display:flex; flex-direction:column; align-items:center; gap:55px; }
.cta-tag   { font-size:22px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:#00E5C8; }
.cta-headline { font-size:88px; font-weight:900; line-height:1.1; color:#fff; }
.cta-sep   { width:100px; height:3px; background:linear-gradient(90deg,#00E5C8,#00B6FF); }
.cta-btn   {
  padding:38px 90px; border:2px solid #00E5C8; color:#00E5C8;
  font-size:32px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase;
  border-radius:6px; background:rgba(0,229,200,0.08);
}
.cta-url   { font-size:28px; color:rgba(255,255,255,0.45); letter-spacing:0.08em; }
</style>
</head>
<body>
<div id="scene-container"></div>
<script>
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(s){ return esc(s).replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/\n/g,'<br>'); }
function fitText(el,minPx){
  if(!el||!el.parentElement) return;
  let size=parseFloat(getComputedStyle(el).fontSize),iter=0;
  while(iter++<80&&el.scrollHeight>el.parentElement.clientHeight+8&&size>minPx){ size-=2;el.style.fontSize=size+'px'; }
}

const B='RODSCHINSON'; const U='rodschinson.com';
const HDR=`<div class="top-bar"></div><div class="header"><span class="header-brand">${B}</span><span class="header-badge">DATA</span></div>`;
const FTR=`<div class="footer"><span class="footer-l">${B}</span><span class="footer-r">${U}</span></div>`;
const BRK=`<div class="bracket tl"></div><div class="bracket tr"></div><div class="bracket bl"></div><div class="bracket br"></div>`;

window.loadScene = function(data){
  const c=document.getElementById('scene-container');
  const v=data.visuel||{};
  const tv=data.type_visuel||'title_card';
  let html='';

  if(tv==='title_card'){
    html=`<div class="scene scene-title">${HDR}${FTR}${BRK}
      <div class="tc-content">
        ${v.eyebrow?`<div class="tc-tag">${esc(v.eyebrow)}</div>`:''}
        <div class="tc-headline" id="_hl">${fmt(v.titre_principal||v.titre||'')}</div>
        <div class="tc-line" id="_ln"></div>
        <div class="tc-sub" id="_sub">${fmt(v.sous_titre||v.subtitle||'')}</div>
      </div></div>`;

  } else if(tv==='big_number'){
    html=`<div class="scene scene-number">${HDR}${FTR}${BRK}
      <div class="bn-label" id="_ey">${fmt(v.eyebrow||v.label||v.titre||'')}</div>
      <div class="bn-box">
        <div class="bn-number">${esc(v.valeur||'0')}</div>
        <div class="bn-unit">${esc(v.unite||'%')}</div>
        <div class="bn-sep"></div>
      </div>
      <div class="bn-ctx" id="_ctx">${fmt(v.contexte||v.subtitle||'')}</div></div>`;

  } else if(tv==='text_bullets'){
    const items=v.items||v.elements||v.points||[];
    const rows=items.map((it,i)=>`<div class="tb-item" data-i="${i}"><div class="tb-num">${String(i+1).padStart(2,'0')}</div><div class="tb-text">${fmt(String(it))}</div></div>`).join('');
    html=`<div class="scene scene-bullets">${HDR}${FTR}${BRK}
      <div class="tb-wrap">
        <div class="tb-title" id="_tit">${fmt(v.titre||v.titre_principal||'')}</div>
        <div class="tb-rule"></div>${rows}
      </div></div>`;

  } else if(tv==='bar_chart'){
    const series=v.series||[]; const maxV=Math.max(...series.map(s=>s.valeur),1); const unite=v.unite||'%';
    const bars=series.map(s=>{
      const pct=((s.valeur/maxV)*100).toFixed(1);
      return `<div class="bc-row"><div class="bc-meta"><span class="bc-lbl">${esc(s.label)}</span><span class="bc-vl">${s.valeur}${unite}</span></div><div class="bc-track"><div class="bc-fill" style="--w:${pct}%"></div></div></div>`;
    }).join('');
    html=`<div class="scene scene-chart">${HDR}${FTR}${BRK}
      <div class="bc-wrap">
        <div class="bc-title" id="_tit">${fmt(v.titre||v.titre_principal||'')}</div>
        <div class="bc-rule"></div>
        <div class="bc-bars">${bars}</div>
        ${v.source?`<div class="bc-src">${esc(v.source)}</div>`:''}
      </div></div>`;

  } else {
    /* cta_screen + process_steps */
    const isStep=tv==='process_steps';
    const items=isStep?(v.etapes||v.items||[]):(v.items||v.elements||[]);
    if(isStep&&items.length){
      const rows=items.map((it,i)=>`<div class="tb-item" data-i="${i}"><div class="tb-num">${String(i+1).padStart(2,'0')}</div><div class="tb-text">${fmt(String(it))}</div></div>`).join('');
      html=`<div class="scene scene-bullets">${HDR}${FTR}${BRK}<div class="tb-wrap"><div class="tb-title" id="_tit">${fmt(v.titre||v.titre_principal||'')}</div><div class="tb-rule"></div>${rows}</div></div>`;
    } else {
      html=`<div class="scene scene-cta">${HDR}${FTR}${BRK}
        <div class="cta-wrap">
          <div class="cta-tag">${esc(v.eyebrow||B)}</div>
          <div class="cta-headline" id="_hl">${fmt(v.headline||v.titre_principal||v.titre||'')}</div>
          <div class="cta-sep"></div>
          <div class="cta-btn">${esc(v.cta_text||v.cta||'Consultation Gratuite')}</div>
          <div class="cta-url">${esc(v.url||v.site||U)}</div>
        </div></div>`;
    }
  }

  c.innerHTML=html;
  setTimeout(()=>{
    fitText(document.getElementById('_hl'),40);
    fitText(document.getElementById('_sub'),22);
    fitText(document.getElementById('_tit'),28);
    fitText(document.getElementById('_ctx'),20);
    fitText(document.getElementById('_ey'),18);
    document.getElementById('_ln')?.classList.add('anim');
  },60);
  return true;
};

window.animateScene=function(){
  const s=document.querySelector('.scene'); if(!s) return;
  requestAnimationFrame(()=>{
    s.classList.add('active');
    document.querySelectorAll('.tb-item').forEach((el,i)=>setTimeout(()=>el.classList.add('visible'),100+i*130));
    setTimeout(()=>document.querySelectorAll('.bc-fill').forEach(el=>el.classList.add('anim')),200);
  });
};
window.isAnimationComplete=function(d){return new Promise(r=>setTimeout(r,d||600));};
</script>
</body>
</html>
