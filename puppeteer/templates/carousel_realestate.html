<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>Carousel — Real Estate Light</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #F5F2ED;
  --navy:  #08316F;
  --gold:  #C8A96E;
  --sky:   #00B6FF;
  --ink:   #0D1F3C;
  --muted: rgba(8,49,111,0.36);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'DM Sans', sans-serif;
}

html, body {
  width: 1080px; height: 1080px;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--sans);
  color: var(--ink);
}

#scene-container { width: 1080px; height: 1080px; position: relative; }

/* ═══ SCENE BASE ════════════════════════════════════════════════════════════ */
.scene {
  position: absolute; inset: 0;
  overflow: hidden;
  background: var(--bg);
  display: none;
}
.scene.active { display: block; }

/* Blueprint grid overlay */
.scene::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(color-mix(in srgb, var(--navy) 2.2%, transparent) 1px, transparent 1px),
    linear-gradient(90deg, color-mix(in srgb, var(--navy) 2.2%, transparent) 1px, transparent 1px);
  background-size: 54px 54px;
  pointer-events: none; z-index: 0;
}

/* ═══ ARCHITECTURAL CHROME ═══════════════════════════════════════════════════ */

/* Top gold-navy rule */
.scene-rule {
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--navy) 0%, var(--gold) 55%, transparent 100%);
  z-index: 20;
}

/* Architectural corner marks */
.c-mark {
  position: absolute; width: 52px; height: 52px;
  pointer-events: none; z-index: 20; opacity: 0.25;
}
.c-mark.tl { top: 4px; left: 0; }
.c-mark.tr { top: 4px; right: 0; transform: scaleX(-1); }
.c-mark.bl { bottom: 0; left: 0; transform: scaleY(-1); }
.c-mark.br { bottom: 0; right: 0; transform: scale(-1); }

/* Frame header */
.frame-header {
  position: absolute; top: 4px; left: 0; right: 0; height: 62px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 56px;
  z-index: 10;
  border-bottom: 1px solid color-mix(in srgb, var(--navy) 7%, transparent);
  background: var(--bg);
}
.fh-brand {
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  letter-spacing: 0.36em; text-transform: uppercase;
  color: var(--navy); opacity: 0.45;
}
.fh-tag { font-size: 11px; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); }
#frame-counter { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; }

/* Frame footer */
.frame-footer {
  position: absolute; bottom: 0; left: 0; right: 0; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 56px;
  z-index: 10;
  border-top: 1px solid color-mix(in srgb, var(--navy) 7%, transparent);
  background: var(--bg);
}
.ff-brand { font-size: 11px; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; color: var(--muted); }
.ff-swipe { font-size: 11px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); display: flex; align-items: center; gap: 8px; }
.ff-swipe::after { content: '→'; color: var(--navy); }

/* ═══ CONTENT AREA ════════════════════════════════════════════════════════ */
.content-area {
  position: absolute;
  top: 66px; bottom: 52px; left: 0; right: 0;
  padding: 40px 56px;
  display: flex; flex-direction: column;
  z-index: 5;
}

/* Skyline decorative SVG */
.skyline-deco {
  position: absolute; bottom: 52px; left: 0; right: 0;
  height: 180px; pointer-events: none;
  z-index: 1; opacity: 0.05;
}

/* ── SLIDE: TITLE ── */
.sl-title { justify-content: space-between; }

.t-eyebrow {
  font-size: 12px; font-weight: 600; letter-spacing: 0.4em;
  text-transform: uppercase; color: var(--gold);
  display: flex; align-items: center; gap: 14px;
  opacity: 0; transition: opacity 0.5s ease;
}
.t-eyebrow::before { content: ''; width: 24px; height: 2px; background: var(--gold); flex-shrink: 0; }

.t-headline {
  font-family: var(--serif);
  font-size: 88px; font-weight: 700; line-height: 0.9;
  color: var(--navy); letter-spacing: -0.01em;
  flex: 1; display: flex; align-items: center;
  opacity: 0; transform: translateY(18px);
  transition: all 0.7s cubic-bezier(0.16,1,0.3,1) 0.15s;
}
.t-headline em { font-style: italic; color: var(--gold); }

.t-bottom { display: flex; flex-direction: column; gap: 16px; }
.t-divider { display: flex; align-items: center; gap: 16px; }
.t-div-line { flex: 1; height: 1px; background: color-mix(in srgb, var(--navy) 12%, transparent); }
.t-div-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
.t-sub {
  font-size: 20px; font-weight: 300; line-height: 1.65;
  color: var(--muted);
  opacity: 0; transition: opacity 0.6s ease 0.5s;
}

/* Title: architectural building right-side graphic */
.t-building-deco {
  position: absolute; right: 0; top: 66px; bottom: 52px;
  width: 42%;
  display: flex; align-items: flex-end; justify-content: flex-end;
  overflow: hidden;
  z-index: 2; pointer-events: none;
  opacity: 0; transition: opacity 0.9s ease 0.2s;
}

.scene.active .t-eyebrow { opacity: 1; }
.scene.active .t-headline { opacity: 1; transform: none; }
.scene.active .t-sub { opacity: 1; }
.scene.active .t-building-deco { opacity: 1; }

/* ── SLIDE: CONTENT ── */
.sl-content { justify-content: space-between; }

.c-index {
  font-size: 12px; font-weight: 600; letter-spacing: 0.36em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 16px;
  opacity: 0; transition: opacity 0.4s ease;
}
.c-headline {
  font-family: var(--serif);
  font-size: 58px; font-weight: 700; line-height: 1.0;
  color: var(--navy); margin-bottom: 28px;
  opacity: 0; transform: translateY(14px);
  transition: all 0.65s cubic-bezier(0.16,1,0.3,1) 0.1s;
}
.c-headline em { font-style: italic; color: var(--gold); }
.c-rule { width: 0; height: 2px; background: var(--gold); margin-bottom: 28px; transition: width 0.5s ease 0.35s; }
.c-body {
  font-size: 22px; font-weight: 300; line-height: 1.72;
  color: var(--muted); flex: 1;
  opacity: 0; transition: opacity 0.6s ease 0.4s;
}

/* Stat block */
.c-stat {
  display: inline-flex; align-items: baseline; gap: 6px;
  padding: 18px 24px; margin-top: 24px;
  border-left: 4px solid var(--navy);
  background: color-mix(in srgb, var(--navy) 3%, transparent);
  opacity: 0; transition: opacity 0.5s ease 0.6s;
}
.c-stat-num { font-family: var(--serif); font-size: 60px; font-weight: 700; color: var(--navy); line-height: 1; }
.c-stat-unit { font-family: var(--serif); font-size: 26px; font-weight: 400; font-style: italic; color: var(--gold); }
.c-stat-label { font-size: 13px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-left: 8px; }

.scene.active .c-index { opacity: 1; }
.scene.active .c-headline { opacity: 1; transform: none; }
.scene.active .c-rule { width: 48px; }
.scene.active .c-body { opacity: 1; }
.scene.active .c-stat { opacity: 1; }

/* ── SLIDE: CTA ── */
.sl-cta { justify-content: center; }

.cta-tag {
  font-size: 12px; font-weight: 600; letter-spacing: 0.4em;
  text-transform: uppercase; color: var(--sky);
  margin-bottom: 28px;
  opacity: 0; transition: opacity 0.4s ease;
}
.cta-rule { width: 0; height: 2px; background: var(--navy); opacity: 0.15; margin-bottom: 32px; transition: width 0.7s ease 0.1s; }
.cta-headline {
  font-family: var(--serif);
  font-size: 72px; font-weight: 700; line-height: 0.95;
  color: var(--navy); margin-bottom: 32px;
  opacity: 0; transform: translateY(16px);
  transition: all 0.7s ease 0.2s;
}
.cta-headline em { font-style: italic; color: var(--gold); }
.cta-gold-rule { width: 0; height: 1px; background: var(--gold); margin-bottom: 28px; transition: width 0.5s ease 0.5s; }
.cta-body { font-size: 20px; font-weight: 300; line-height: 1.65; color: var(--muted); margin-bottom: 36px; opacity: 0; transition: opacity 0.5s ease 0.55s; }
.cta-btn { display: inline-block; padding: 14px 44px; border: 1.5px solid color-mix(in srgb, var(--navy) 28%, transparent); font-size: 13px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; color: var(--navy); margin-bottom: 16px; opacity: 0; transition: opacity 0.5s ease 0.7s; }
.cta-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; opacity: 0; transition: opacity 0.4s ease 0.9s; }
.hashtag { font-size: 13px; color: var(--muted); }

/* CTA: building silhouette background */
.cta-bldg {
  position: absolute; bottom: 52px; left: 0; right: 0;
  height: 220px; pointer-events: none;
  z-index: 1; opacity: 0.055;
}

.scene.active .cta-tag { opacity: 1; }
.scene.active .cta-headline { opacity: 1; transform: none; }
.scene.active .cta-rule { width: 100%; }
.scene.active .cta-gold-rule { width: 56px; }
.scene.active .cta-body { opacity: 1; }
.scene.active .cta-btn { opacity: 1; }
.scene.active .cta-tags { opacity: 1; }
</style>
</head>
<body>

<div id="scene-container"></div>

<script>
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmt(s) {
  if (!s) return '';
  return esc(s).replace(/\*([^*]+)\*/g,'<em>$1</em>');
}

const CORNER_SVG = `<svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M4 4 L4 26" stroke="#08316F" stroke-width="1.5"/>
  <path d="M4 4 L26 4" stroke="#08316F" stroke-width="1.5"/>
  <path d="M4 4 L20 4 L20 20 L4 20" stroke="#08316F" stroke-width="0.5" fill="none" opacity="0.35"/>
  <circle cx="4" cy="4" r="2" fill="#C8A96E"/>
</svg>`;

const SKYLINE_SVG = `<svg viewBox="0 0 1080 180" preserveAspectRatio="xMidYMax meet" fill="#08316F" xmlns="http://www.w3.org/2000/svg">
  <rect x="0"   y="60"  width="70"  height="120"/>
  <rect x="70"  y="20"  width="90"  height="160"/>
  <rect x="83"  y="5"   width="10"  height="15" fill="#C8A96E"/>
  <rect x="160" y="50"  width="60"  height="130"/>
  <rect x="220" y="0"   width="120" height="180"/>
  <rect x="238" y="0"   width="14"  height="0"/>
  <rect x="340" y="40"  width="80"  height="140"/>
  <rect x="420" y="70"  width="55"  height="110"/>
  <rect x="475" y="30"  width="100" height="150"/>
  <rect x="492" y="5"   width="12"  height="25" fill="#C8A96E"/>
  <rect x="575" y="60"  width="70"  height="120"/>
  <rect x="645" y="10"  width="110" height="170"/>
  <rect x="660" y="0"   width="16"  height="10"/>
  <rect x="755" y="50"  width="65"  height="130"/>
  <rect x="820" y="80"  width="50"  height="100"/>
  <rect x="870" y="25"  width="100" height="155"/>
  <rect x="888" y="5"   width="14"  height="20" fill="#C8A96E"/>
  <rect x="970" y="55"  width="60"  height="125"/>
  <rect x="1030" y="40" width="50"  height="140"/>
  <rect x="0" y="178" width="1080" height="2"/>
  <rect x="226" y="20" width="6" height="8" fill="#F5F2ED" opacity="0.5"/>
  <rect x="240" y="20" width="6" height="8" fill="#F5F2ED" opacity="0.5"/>
  <rect x="254" y="20" width="6" height="8" fill="#F5F2ED" opacity="0.5"/>
  <rect x="226" y="34" width="6" height="8" fill="#F5F2ED" opacity="0.5"/>
  <rect x="240" y="34" width="6" height="8" fill="#F5F2ED" opacity="0.5"/>
  <rect x="254" y="34" width="6" height="8" fill="#F5F2ED" opacity="0.5"/>
  <rect x="226" y="48" width="6" height="8" fill="#F5F2ED" opacity="0.5"/>
  <rect x="240" y="48" width="6" height="8" fill="#F5F2ED" opacity="0.5"/>
  <rect x="254" y="48" width="6" height="8" fill="#F5F2ED" opacity="0.5"/>
</svg>`;

const BUILDING_DECO_SVG = `<svg viewBox="0 0 460 960" width="100%" height="100%" preserveAspectRatio="xMaxYMax meet" fill="#08316F" xmlns="http://www.w3.org/2000/svg" style="opacity:.06">
  <rect x="0"   y="300" width="100" height="660"/>
  <rect x="100" y="200" width="140" height="760"/>
  <rect x="118" y="150" width="18"  height="50"/>
  <rect x="240" y="100" width="220" height="860"/>
  <rect x="270" y="50"  width="24"  height="50" fill="#C8A96E"/>
  ${[...Array(14)].map((_,r)=>[...Array(5)].map((_,c)=>`<rect x="${248+c*36}" y="${115+r*50}" width="22" height="30" fill="#F5F2ED" opacity="0.45"/>`).join('')).join('')}
  <rect x="0" y="958" width="460" height="2" opacity="0.3"/>
</svg>`;

function parseStatBlock(stat) {
  if (!stat) return '';
  const m = String(stat).match(/^([0-9,.]+)\s*([%x$€k+M]*)(.*)$/);
  if (!m) return `<div class="c-stat"><div class="c-stat-num">${esc(stat)}</div></div>`;
  return `<div class="c-stat">
    <div class="c-stat-num">${esc(m[1])}</div>
    <div class="c-stat-unit">${esc(m[2])}</div>
    <div class="c-stat-label">${esc(m[3].trim())}</div>
  </div>`;
}

window.loadScene = function(slideData) {
  const idx   = slideData.index || 1;
  const type  = slideData.type  || 'content';
  const total = slideData.total || '';

  const _bname = (window.__brand && window.__brand.name) || slideData.brand || 'Rodschinson';

  const counterHtml  = total ? `${idx} / ${total}` : `${idx}`;
  const chromeHtml = `
    <div class="scene-rule"></div>
    <div class="c-mark tl">${CORNER_SVG}</div>
    <div class="c-mark tr">${CORNER_SVG}</div>
    <div class="c-mark bl">${CORNER_SVG}</div>
    <div class="c-mark br">${CORNER_SVG}</div>
    <div class="frame-header">
      <div class="fh-brand" id="logo-text">${esc(_bname)}</div>
      <div class="fh-tag">${esc(slideData.tag || 'Real Estate')}</div>
      <div id="frame-counter">${counterHtml}</div>
    </div>
    <div class="frame-footer">
      <div class="ff-brand" id="ff-brand">${esc(_bname)}</div>
      ${type !== 'cta' ? `<div class="ff-swipe">${esc(slideData.swipe_hint || 'Swipe')}</div>` : ''}
    </div>`;

  let innerHtml = '';

  if (type === 'title') {
    innerHtml = `
      <div class="t-building-deco">${BUILDING_DECO_SVG}</div>
      <div class="content-area sl-title">
        <div class="t-eyebrow">${esc(slideData.tag || _bname)}</div>
        <div class="t-headline">${fmt(slideData.headline || '')}</div>
        <div class="t-bottom">
          <div class="t-divider"><div class="t-div-line"></div><div class="t-div-dot"></div><div class="t-div-line"></div></div>
          <div class="t-sub">${esc(slideData.subheadline || '')}</div>
        </div>
      </div>`;
  } else if (type === 'cta') {
    const tags = (slideData.hashtags || []).map(h => `<span class="hashtag">${esc(h)}</span>`).join('');
    innerHtml = `
      <div class="cta-bldg">${SKYLINE_SVG}</div>
      <div class="content-area sl-cta">
        <div class="cta-tag">${esc(slideData.tag || _bname)}</div>
        <div class="cta-rule"></div>
        <div class="cta-headline">${fmt(slideData.headline || '')}</div>
        <div class="cta-gold-rule"></div>
        <div class="cta-body">${esc(slideData.body || '')}</div>
        <div class="cta-btn">${esc(slideData.cta || 'Learn More')}</div>
        ${tags ? `<div class="cta-tags">${tags}</div>` : ''}
      </div>`;
  } else {
    innerHtml = `
      <div class="skyline-deco">${SKYLINE_SVG}</div>
      <div class="content-area sl-content">
        <div class="c-index">${esc(slideData.tag || '')} — ${idx}</div>
        <div class="c-headline">${fmt(slideData.headline || '')}</div>
        <div class="c-rule"></div>
        <div class="c-body">${esc(slideData.body || '')}</div>
        ${parseStatBlock(slideData.stat)}
      </div>`;
  }

  document.getElementById('scene-container').innerHTML =
    `<div class="scene active" id="scene">${chromeHtml}${innerHtml}</div>`;
  return true;
};

window.animateScene = function() { /* animations handled by CSS .active */ };
</script>
</body>
</html>
