<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>Carousel — Clean Data</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --dark-blue:#031520; --sky-blue:#00B6FF; }

html, body {
  width:1080px; height:1080px; overflow:hidden;
  font-family:'Space Grotesk', sans-serif;
  background:var(--dark-blue); color:#fff;
}
#scene-container { width:1080px; height:1080px; position:relative; }

/* ── SCENE ── */
.scene {
  position:absolute; inset:0; display:none;
  flex-direction:column; overflow:hidden;
  background:var(--dark-blue);
}
.scene.active { display:flex; }

/* Grid lines background */
.scene::before {
  content:''; position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(0,182,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,182,255,0.03) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none; z-index:0;
}

/* Scan line top */
.scan-line {
  position:absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, transparent, var(--sky-blue), color-mix(in srgb, var(--sky-blue) 50%, green), transparent);
  z-index:10;
}

/* ── HEADER ── */
.frame-header {
  position:absolute; top:3px; left:0; right:0; height:68px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 48px; z-index:10;
  border-bottom:1px solid rgba(0,182,255,0.1);
}
#frame-brand {
  font-family:'Space Mono', monospace;
  font-size:13px; letter-spacing:0.16em;
  text-transform:uppercase; color:rgba(255,255,255,0.5);
}
.frame-meta {
  font-family:'Space Mono', monospace;
  font-size:12px; color:var(--sky-blue); opacity:0.6;
  letter-spacing:0.14em;
}
#frame-counter {
  font-family:'Space Mono', monospace;
  font-size:12px; color:rgba(255,255,255,0.3);
}

/* ── TITLE SLIDE ── */
.slide-title {
  padding:71px 48px 48px;
  flex-direction:column; justify-content:space-between;
  position:relative;
}
.ticker {
  font-family:'Space Mono', monospace;
  font-size:11px; letter-spacing:0.2em;
  text-transform:uppercase; color:var(--sky-blue); opacity:0.7;
  margin-bottom:0;
  display:flex; align-items:center; gap:12px;
}
.ticker::before { content:'▶'; font-size:9px; }
.t-headline {
  font-family:'Space Grotesk', sans-serif;
  font-size:78px; font-weight:700; line-height:0.95;
  color:#fff; letter-spacing:-0.025em;
  flex:1; display:flex; align-items:center; position:relative; z-index:1;
}
.t-rule {
  width:0; height:3px; background:var(--sky-blue);
  transition:width 0.7s cubic-bezier(0.4,0,0.2,1);
  margin-bottom:20px;
}
.scene.active .t-rule, .scene.anim .t-rule { width:80px; }
.t-sub {
  font-size:19px; font-weight:400; line-height:1.6;
  color:rgba(255,255,255,0.42);
}
.t-bottom {
  display:flex; justify-content:space-between; align-items:flex-end;
}
.t-meta {
  font-family:'Space Mono', monospace;
  font-size:11px; color:rgba(255,255,255,0.2);
  letter-spacing:0.16em;
}

/* ── CONTENT SLIDE ── */
.slide-content {
  padding:71px 48px 48px;
  flex-direction:column; justify-content:space-between;
}
.data-tag {
  display:inline-flex; align-items:center; gap:10px;
  background:color-mix(in srgb, var(--sky-blue) 10%, transparent);
  border:1px solid color-mix(in srgb, var(--sky-blue) 22%, transparent);
  padding:6px 16px; margin-bottom:28px; align-self:flex-start;
}
.data-tag span {
  font-family:'Space Mono', monospace;
  font-size:11px; letter-spacing:0.2em;
  text-transform:uppercase; color:var(--sky-blue);
}
.data-tag::before {
  content:'▶'; font-size:9px; color:color-mix(in srgb, var(--sky-blue) 60%, green);
}
.c-headline {
  font-size:54px; font-weight:700; line-height:1.0;
  color:#fff; letter-spacing:-0.02em; flex:1;
  display:flex; align-items:flex-start;
}
.c-body {
  font-size:18px; font-weight:400; line-height:1.7;
  color:rgba(255,255,255,0.48);
}
.c-stat-line {
  display:flex; align-items:center; gap:0;
  border-top:1px solid rgba(0,182,255,0.12);
  padding-top:20px; margin-top:24px;
}
.c-stat-bar {
  width:4px; height:52px;
  background: linear-gradient(180deg, var(--sky-blue), color-mix(in srgb, var(--sky-blue) 50%, green));
  margin-right:20px; flex-shrink:0;
}
.c-stat-num {
  font-family:'Space Mono', monospace;
  font-size:44px; font-weight:700; color:var(--sky-blue);
  letter-spacing:-0.02em; margin-right:16px;
}
.c-stat-desc {
  font-size:16px; font-weight:400; color:rgba(255,255,255,0.4);
  line-height:1.45;
}
/* Data bars bottom decoration */
.data-bars-deco {
  position:absolute; bottom:0; left:0; right:0; height:32px;
  display:flex; gap:3px; align-items:flex-end; padding:0 48px;
  opacity:0.2; z-index:0;
}
.dbar {
  flex:1; background:var(--sky-blue); border-radius:2px 2px 0 0;
  min-height:4px;
}

/* ── CTA SLIDE ── */
.slide-cta {
  padding:71px 48px 48px;
  flex-direction:column; justify-content:center; align-items:flex-start;
}
.cta-prompt {
  font-family:'Space Mono', monospace;
  font-size:16px; color:var(--sky-blue); letter-spacing:0.12em;
  margin-bottom:36px;
  display:flex; align-items:center; gap:10px;
}
.cta-prompt::before { content:'$'; opacity:0.6; }
.cta-headline {
  font-size:58px; font-weight:700; line-height:0.97;
  color:#fff; letter-spacing:-0.02em; margin-bottom:36px;
}
.cta-divider {
  width:100%; height:1px;
  background:color-mix(in srgb, var(--sky-blue) 20%, transparent);
  margin-bottom:32px;
}
.cta-body {
  font-size:19px; font-weight:400; line-height:1.65;
  color:rgba(255,255,255,0.45); margin-bottom:40px;
  max-width:780px;
}
.hashtags { display:flex; flex-wrap:wrap; gap:10px; }
.hashtag {
  font-family:'Space Mono', monospace;
  font-size:12px; letter-spacing:0.1em;
  color:var(--sky-blue);
  border:1px solid color-mix(in srgb, var(--sky-blue) 25%, transparent);
  padding:6px 14px;
}
</style>
</head>
<body>
<div id="scene-container">
  <div class="scan-line"></div>
  <div class="frame-header">
    <div id="frame-brand">Brand</div>
    <div class="frame-meta">INSIGHTS</div>
    <div id="frame-counter"></div>
  </div>
</div>
<script>
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(s){ return esc(s).replace(/\*([^*]+)\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); }

function parseStatBlock(stat) {
  if (!stat) return '';
  const [v, d] = String(stat).split(/\s*—\s*/, 2);
  return `<div class="c-stat-line">
    <div class="c-stat-bar"></div>
    <div class="c-stat-num">${esc(v.trim())}</div>
    <div class="c-stat-desc">${esc(d||'')}</div>
  </div>`;
}

function dataBars() {
  const heights = [40,65,30,80,55,45,90,35,70,60,48,72,38,85,50,42,68,58,46,74];
  return '<div class="data-bars-deco">' +
    heights.map(h => `<div class="dbar" style="height:${h}%"></div>`).join('') +
  '</div>';
}

window.loadScene = function(slideData) {
  const c     = document.getElementById('scene-container');
  const idx   = slideData.index || 1;
  const type  = slideData.type  || 'content';
  const total = slideData.total || '';

  const _bname = (window.__brand && window.__brand.name) || slideData.brand || '';
  const cntTxt = total ? `${String(idx).padStart(2,'0')} / ${String(total).padStart(2,'0')}` : '';

  let sceneHtml = '';

  if (type === 'title') {
    sceneHtml = `<div class="scene slide-title active anim" id="scene">
      <div class="ticker">${esc(_bname)}</div>
      <div class="t-headline">${fmt(slideData.headline || '')}</div>
      <div>
        <div class="t-rule"></div>
        <div class="t-sub">${esc(slideData.subheadline || '')}</div>
      </div>
      <div class="t-bottom">
        <div class="t-meta">${esc(slideData.cta || 'Swipe →')}</div>
      </div>
    </div>`;

  } else if (type === 'cta') {
    const tags = (slideData.hashtags || []).map(h => `<span class="hashtag">${esc(h)}</span>`).join('');
    sceneHtml = `<div class="scene slide-cta active" id="scene">
      <div class="cta-prompt">${esc(_bname)}</div>
      <div class="cta-headline">${fmt(slideData.headline || '')}</div>
      <div class="cta-divider"></div>
      <div class="cta-body">${esc(slideData.body || '')}</div>
      ${tags ? `<div class="hashtags">${tags}</div>` : ''}
    </div>`;

  } else {
    sceneHtml = `<div class="scene slide-content active" id="scene">
      <div class="data-tag"><span>${String(idx).padStart(2,'0')} // POINT</span></div>
      <div class="c-headline">${fmt(slideData.headline || '')}</div>
      <div class="c-body">${esc(slideData.body || '')}</div>
      ${parseStatBlock(slideData.stat)}
      ${dataBars()}
    </div>`;
  }

  c.innerHTML = `<div class="scan-line"></div>
<div class="frame-header">
  <div id="frame-brand">${esc(_bname)}</div>
  <div class="frame-meta">INSIGHTS</div>
  <div id="frame-counter">${cntTxt}</div>
</div>` + sceneHtml;
  return true;
};

window.animateScene = function() {};
window.isAnimationComplete = function(d){ return new Promise(r=>setTimeout(r, d||400)); };
</script>
</body>
</html>
