<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{ --brand-primary:#08316F; --brand-accent:#C8A96E; --navy:#08316F;
         --ink:#0c1526; --grey:#64748b; --line:#e6eaf0; --stripe:#f7f9fc; }
  @page{ size:A4 portrait; margin:0; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ font-family:'Inter','Helvetica Neue',Arial,sans-serif; color:var(--ink);
             -webkit-font-smoothing:antialiased; }
  .page{ width:210mm; min-height:297mm; padding:0 0 18mm; position:relative;
         page-break-after:always; break-after:page; overflow:hidden; }
  .page:last-child{ page-break-after:auto; }

  /* ── Header ── */
  .head{ background:linear-gradient(135deg,var(--brand-primary) 0%,#0a4a9a 100%);
         color:#fff; padding:20mm 16mm 14mm; }
  .head.cont{ padding:10mm 16mm 8mm; }
  .wm{ display:flex; align-items:baseline; gap:8px; letter-spacing:.28em; }
  .wm .l1{ font-weight:800; font-size:15px; }
  .wm .l2{ font-weight:400; font-size:9px; opacity:.8; letter-spacing:.34em; }
  .h-title{ font-family:'Montserrat',sans-serif; font-weight:800; font-size:30px;
            margin-top:16px; letter-spacing:-.01em; }
  .head.cont .h-title{ font-size:18px; margin-top:8px; }
  .h-sub{ font-size:12px; opacity:.82; margin-top:4px; font-weight:400; }
  .accent-bar{ height:4px; background:var(--brand-accent); }

  /* ── Asset info strip ── */
  .info{ display:flex; flex-wrap:wrap; gap:0; padding:0 16mm; margin-top:10mm; }
  .info .cell{ flex:1; min-width:120px; padding:10px 16px 10px 0; }
  .info .k{ font-size:8.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--grey); }
  .info .v{ font-family:'Montserrat',sans-serif; font-weight:700; font-size:13.5px; color:var(--navy); margin-top:3px; }

  /* ── Table ── */
  .wrap{ padding:6mm 16mm 0; }
  table{ width:100%; border-collapse:collapse; font-size:9.5px; }
  thead th{ background:var(--navy); color:#fff; text-align:left; font-weight:600;
            font-size:8px; letter-spacing:.08em; text-transform:uppercase;
            padding:7px 8px; }
  tbody td{ padding:6px 8px; border-bottom:1px solid var(--line); vertical-align:top;
            line-height:1.3; word-break:break-word; }
  tbody tr:nth-child(even){ background:var(--stripe); }
  .c-idx{ width:22px; color:var(--grey); font-weight:600; }
  .c-company{ font-weight:700; color:var(--navy); width:21%; }
  .c-contact{ width:15%; }
  .c-role{ width:12%; color:var(--grey); }
  .c-email{ width:21%; color:#1f3a5f; }
  .c-phone{ width:13%; white-space:nowrap; }
  .c-loc{ width:9%; color:var(--grey); }
  .c-stage{ width:9%; }
  .pill{ display:inline-block; padding:2px 7px; border-radius:10px; font-size:7.5px;
         font-weight:700; background:rgba(8,49,111,.08); color:var(--navy); white-space:nowrap; }
  .pill.t{ background:rgba(0,150,80,.12); color:#0a7a43; }   /* "transmis" */
  .pill.s{ background:rgba(200,150,40,.16); color:#9a6a00; } /* "stand by" */

  /* ── Footer ── */
  .foot{ position:absolute; bottom:8mm; left:16mm; right:16mm;
         display:flex; justify-content:space-between; align-items:center;
         font-size:8px; color:var(--grey); border-top:1px solid var(--line); padding-top:6px; }
</style>
</head>
<body>
<div id="doc"></div>
<script>
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

window.loadBuyers = function(data, brandName){
  const L = data.labels || {};
  const buyers = (data.buyers || []);
  const brand = brandName || 'Rodschinson';

  const stagePill = (st)=>{
    const s = (st||'').toLowerCase();
    let cls = '';
    if (s.includes('transmis') || s.includes('sent') || s.includes('offer') || s.includes('bod')) cls = ' t';
    else if (s.includes('stand') || s.includes('wait') || s.includes('hold')) cls = ' s';
    return st ? `<span class="pill${cls}">${esc(st)}</span>` : '';
  };

  // Chunk rows across A4 pages (first page has the big header).
  const chunk = (a,n)=>{ const o=[]; for(let i=0;i<a.length;i+=n) o.push(a.slice(i,i+n)); return o; };
  const FIRST = 20, REST = 30;
  const pages = [];
  if (buyers.length <= FIRST) pages.push(buyers);
  else { pages.push(buyers.slice(0, FIRST)); chunk(buyers.slice(FIRST), REST).forEach(c=>pages.push(c)); }

  const headBlock = (cont)=>`
    <div class="head${cont?' cont':''}">
      <div class="wm"><span class="l1">${esc(brand.toUpperCase())}</span><span class="l2">INVESTMENT</span></div>
      <div class="h-title">${esc(L.title||'Buyer Shortlist')}</div>
      ${cont?'':`<div class="h-sub">${esc(L.subtitle||'')}</div>`}
    </div>
    <div class="accent-bar"></div>`;

  const infoStrip = `
    <div class="info">
      <div class="cell"><div class="k">${esc(L.asset_label||'Asset')}</div><div class="v">${esc(data.asset_name||'—')}</div></div>
      ${data.reference?`<div class="cell" style="flex:0 0 auto"><div class="k">${esc(L.ref_label||'Reference')}</div><div class="v">${esc(data.reference)}</div></div>`:''}
      <div class="cell" style="flex:0 0 auto"><div class="k">${esc(L.count_label||'buyers')}</div><div class="v">${buyers.length}</div></div>
      <div class="cell" style="flex:0 0 auto"><div class="k">${esc(L.generated||'Generated')}</div><div class="v">${esc(data.generated_at||'')}</div></div>
    </div>`;

  const thead = `<thead><tr>
      <th class="c-idx">#</th>
      <th class="c-company">${esc(L.col_company||'Company')}</th>
      <th class="c-contact">${esc(L.col_contact||'Contact')}</th>
      <th class="c-role">${esc(L.col_role||'Role')}</th>
      <th class="c-email">${esc(L.col_email||'Email')}</th>
      <th class="c-phone">${esc(L.col_phone||'Phone')}</th>
      <th class="c-loc">${esc(L.col_location||'Location')}</th>
      <th class="c-stage">${esc(L.col_stage||'Stage')}</th>
    </tr></thead>`;

  let offset = 0;
  const html = pages.map((rows, pi)=>{
    const body = rows.map((b,i)=>`<tr>
        <td class="c-idx">${offset+i+1}</td>
        <td class="c-company">${esc(b.company||'—')}</td>
        <td class="c-contact">${esc(b.contact||'')}</td>
        <td class="c-role">${esc(b.function||'')}</td>
        <td class="c-email">${esc(b.email||'')}</td>
        <td class="c-phone">${esc(b.phone||'')}</td>
        <td class="c-loc">${esc(b.city||b.country||'')}</td>
        <td class="c-stage">${stagePill(b.stage)}</td>
      </tr>`).join('');
    offset += rows.length;
    return `<div class="page">
      ${headBlock(pi>0)}
      ${pi===0 ? infoStrip : ''}
      <div class="wrap"><table>${thead}<tbody>${body}</tbody></table></div>
      <div class="foot"><span>${esc(L.confidential||'Confidential — internal use only')}</span><span>${esc(brand)} · ${pi+1}/${pages.length}</span></div>
    </div>`;
  }).join('');

  document.getElementById('doc').innerHTML = html;
  return true;
};
</script>
</body>
</html>
