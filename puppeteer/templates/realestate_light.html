<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Real Estate — Light</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #F5F2ED;
  --navy:  #08316F;
  --gold:  #C8A96E;
  --sky:   #00B6FF;
  --ink:   #0D1F3C;
  --muted: rgba(8,49,111,0.38);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'DM Sans', sans-serif;
}

html, body {
  width: 1920px; height: 1080px;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--sans);
  color: var(--ink);
}

#scene-container { position: absolute; inset: 0; }

/* ═══ ARCHITECTURAL CHROME ═══════════════════════════════════════════════════ */

/* Blueprint corner bracket — top-left */
.arc-corner-tl {
  position: absolute; top: 0; left: 0;
  width: 120px; height: 120px;
  pointer-events: none; z-index: 5;
  opacity: 0.18;
}
/* Blueprint corner bracket — bottom-right */
.arc-corner-br {
  position: absolute; bottom: 0; right: 0;
  width: 120px; height: 120px;
  pointer-events: none; z-index: 5;
  opacity: 0.18;
  transform: rotate(180deg);
}

/* Top gold rule */
.top-rule {
  position: absolute; top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--navy) 0%, var(--gold) 40%, transparent 100%);
  z-index: 10;
}

/* Side measurement marks (architectural) */
.measure-left {
  position: absolute; left: 72px; top: 120px; bottom: 120px;
  width: 1px;
  background: color-mix(in srgb, var(--navy) 8%, transparent);
  z-index: 5;
}
.measure-left::before,
.measure-left::after {
  content: '';
  position: absolute; left: -4px; right: -4px;
  height: 1px;
  background: color-mix(in srgb, var(--navy) 15%, transparent);
}
.measure-left::before { top: 0; }
.measure-left::after  { bottom: 0; }

/* Skyline silhouette strip */
.skyline {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 220px;
  pointer-events: none; z-index: 1;
  opacity: 0.06;
}

/* Brand bar */
.brand-bar {
  position: absolute; top: 4px; left: 0; right: 0; height: 72px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 88px 0 96px;
  z-index: 10;
  border-bottom: 1px solid color-mix(in srgb, var(--navy) 7%, transparent);
}
.brand-name {
  font-family: var(--sans);
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.35em; text-transform: uppercase;
  color: var(--navy); opacity: 0.55;
}
.brand-tag {
  font-family: var(--sans);
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--gold);
}

/* Footer */
.scene-footer {
  position: absolute; bottom: 0; left: 0; right: 0; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 88px 0 96px;
  z-index: 10;
  border-top: 1px solid color-mix(in srgb, var(--navy) 6%, transparent);
}
.ftr-brand { font-size: 11px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); }
.ftr-meta  { font-size: 11px; color: var(--gold); letter-spacing: 0.1em; }

/* Grid overlay — faint blueprint grid */
.grid-overlay {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(color-mix(in srgb, var(--navy) 2.5%, transparent) 1px, transparent 1px),
    linear-gradient(90deg, color-mix(in srgb, var(--navy) 2.5%, transparent) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none; z-index: 0;
}

/* ═══ SCENES ════════════════════════════════════════════════════════════════ */
.scene {
  position: absolute; inset: 0;
  display: none;
}
.scene.active { display: block; }

/* Content area inside brand chrome */
.inner {
  position: absolute;
  top: 76px; bottom: 56px; left: 96px; right: 88px;
  display: flex; flex-direction: column;
  justify-content: center;
}
.inner.padded { padding: 40px 0; }

/* ── TITLE CARD ── */
.tc-eyebrow {
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.42em; text-transform: uppercase;
  color: var(--gold);
  opacity: 0; transition: opacity 0.5s ease;
  margin-bottom: 24px;
}
.tc-rule {
  width: 0; height: 2px;
  background: linear-gradient(90deg, var(--navy), transparent);
  margin-bottom: 32px;
  transition: width 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s;
}
.tc-headline {
  font-family: var(--serif);
  font-size: 104px; font-weight: 700; line-height: 0.93;
  color: var(--navy); max-width: 70%;
  opacity: 0; transform: translateY(18px);
  transition: all 0.75s cubic-bezier(0.16,1,0.3,1) 0.2s;
}
.tc-headline em { font-style: italic; color: var(--gold); }
.tc-gold-rule {
  width: 0; height: 1px; background: var(--gold);
  margin: 32px 0 28px;
  transition: width 0.6s ease 0.55s;
}
.tc-sub {
  font-size: 22px; font-weight: 300; line-height: 1.65;
  color: var(--muted); max-width: 55%;
  opacity: 0; transform: translateY(10px);
  transition: all 0.6s ease 0.65s;
}
/* Decorative building graphic — right side */
.tc-building {
  position: absolute; right: 0; top: 76px; bottom: 56px;
  width: 38%;
  display: flex; align-items: flex-end; justify-content: flex-end;
  overflow: hidden;
  opacity: 0; transition: opacity 0.8s ease 0.3s;
}

.scene.anim .tc-eyebrow { opacity: 1; }
.scene.anim .tc-headline { opacity: 1; transform: none; }
.scene.anim .tc-sub { opacity: 1; transform: none; }
.scene.anim .tc-rule { width: 80px; }
.scene.anim .tc-gold-rule { width: 64px; }
.scene.anim .tc-building { opacity: 1; }

/* ── BIG NUMBER ── */
.bn-wrap {
  display: flex; align-items: stretch; height: 100%;
}
.bn-left {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  padding-right: 80px;
  border-right: 1px solid color-mix(in srgb, var(--navy) 8%, transparent);
}
.bn-eyebrow {
  font-size: 13px; font-weight: 600; letter-spacing: 0.42em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 28px;
  opacity: 0; transition: opacity 0.5s ease;
}
.bn-value {
  font-family: var(--serif);
  font-size: 220px; font-weight: 700; line-height: 0.85;
  color: var(--navy);
  display: flex; align-items: flex-start; gap: 12px;
  opacity: 0; transform: scale(0.9);
  transition: all 0.85s cubic-bezier(0.16,1,0.3,1) 0.2s;
}
.bn-unit { font-size: 0.32em; color: var(--gold); margin-top: 16px; font-style: italic; }
.bn-ctx {
  font-size: 18px; font-weight: 400; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--muted);
  margin-top: 28px;
  opacity: 0; transition: opacity 0.5s ease 0.7s;
}
.bn-right {
  width: 580px; display: flex; flex-direction: column; justify-content: center;
  padding-left: 72px; gap: 24px;
}
.bn-formula {
  padding: 20px 28px;
  border: 1px solid color-mix(in srgb, var(--navy) 10%, transparent);
  background: color-mix(in srgb, var(--navy) 3%, transparent);
  font-size: 17px; line-height: 1.7; color: var(--navy);
  opacity: 0; transition: opacity 0.5s ease 0.5s;
}
.bn-formula span { color: var(--sky); font-weight: 600; }
/* Building graphic right panel */
.bn-arch-graphic {
  width: 100%; flex: 1;
  display: flex; align-items: flex-end;
  opacity: 0.08; overflow: hidden;
}

.scene.anim .bn-eyebrow,
.scene.anim .bn-ctx,
.scene.anim .bn-formula { opacity: 1; }
.scene.anim .bn-value { opacity: 1; transform: scale(1); }

/* ── BAR CHART ── */
.ch-wrap {
  display: flex; flex-direction: column;
  height: 100%; padding: 24px 0; gap: 20px;
}
.ch-head { opacity: 0; transition: opacity 0.5s ease; }
.ch-title {
  font-family: var(--serif);
  font-size: 52px; font-weight: 700;
  color: var(--navy); line-height: 1.05; margin-bottom: 6px;
}
.ch-source { font-size: 12px; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); }
.ch-bars { display: flex; align-items: flex-end; gap: 18px; flex: 1; }
.ch-bw { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
.ch-val { font-family: var(--serif); font-size: 32px; font-weight: 700; color: var(--navy); opacity: 0; transition: opacity 0.4s ease 0.9s; line-height: 1; }
.ch-bo { width: 100%; flex: 1; background: color-mix(in srgb, var(--navy) 5%, transparent); display: flex; align-items: flex-end; overflow: hidden; border-top: 1px solid color-mix(in srgb, var(--navy) 6%, transparent); }
.ch-bi { width: 100%; transform: scaleY(0); transform-origin: bottom; transition: transform 0.9s cubic-bezier(0.16,1,0.3,1); }
.ch-lbl { font-size: 12px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); text-align: center; }

.scene.anim .ch-head { opacity: 1; }
.scene.anim .ch-bi { transform: scaleY(1); }
.scene.anim .ch-val { opacity: 1; }

/* ── TEXT BULLETS ── */
.bl-wrap { display: flex; flex-direction: column; gap: 18px; height: 100%; justify-content: center; }
.bl-title { font-family: var(--serif); font-size: 60px; font-weight: 700; color: var(--navy); line-height: 1.05; margin-bottom: 12px; opacity: 0; transition: opacity 0.5s ease; }
.bl-item {
  display: flex; align-items: center; gap: 28px;
  padding: 18px 24px 18px 20px;
  border-left: 3px solid var(--gold);
  background: color-mix(in srgb, var(--navy) 2.5%, transparent);
  opacity: 0; transform: translateX(-14px);
  transition: all 0.5s ease;
}
.bl-num { font-family: var(--serif); font-size: 42px; font-weight: 700; color: var(--gold); opacity: 0.55; min-width: 52px; line-height: 1; }
.bl-text { font-size: 22px; font-weight: 400; color: color-mix(in srgb, var(--navy) 78%, transparent); line-height: 1.35; }

.scene.anim .bl-title { opacity: 1; }

/* ── PROCESS STEPS ── */
.ps-wrap { display: flex; flex-direction: column; gap: 16px; height: 100%; justify-content: center; }
.ps-title { font-family: var(--serif); font-size: 60px; font-weight: 700; color: var(--navy); line-height: 1.05; margin-bottom: 12px; opacity: 0; transition: opacity 0.5s ease; }
.ps-title em { font-style: italic; color: var(--gold); }
.ps-step {
  display: flex; align-items: center; gap: 28px;
  padding: 16px 22px;
  border-left: 3px solid color-mix(in srgb, var(--navy) 10%, transparent);
  opacity: 0; transform: translateX(-14px);
  transition: all 0.5s ease;
}
.ps-step.done { border-color: color-mix(in srgb, var(--sky) 35%, transparent); background: color-mix(in srgb, var(--sky) 4%, transparent); }
.ps-step.active { border-color: var(--gold); background: color-mix(in srgb, var(--gold) 6%, transparent); }
.ps-num { font-family: var(--serif); font-size: 44px; font-weight: 700; color: color-mix(in srgb, var(--navy) 18%, transparent); min-width: 56px; line-height: 1; }
.ps-step.done  .ps-num { color: color-mix(in srgb, var(--sky) 50%, transparent); }
.ps-step.active .ps-num { color: var(--gold); }
.ps-text { font-size: 22px; font-weight: 400; color: color-mix(in srgb, var(--navy) 38%, transparent); line-height: 1.3; }
.ps-step.done  .ps-text { color: color-mix(in srgb, var(--navy) 52%, transparent); }
.ps-step.active .ps-text { color: var(--navy); font-weight: 600; }

.scene.anim .ps-title { opacity: 1; }

/* ── QUOTE CARD ── */
.qt-wrap { display: flex; flex-direction: column; justify-content: center; height: 100%; max-width: 80%; }
.qt-mark { font-family: var(--serif); font-size: 140px; font-weight: 700; line-height: 0.7; color: var(--gold); opacity: 0.35; margin-bottom: -20px; opacity: 0; transition: opacity 0.5s ease; }
.qt-text { font-family: var(--serif); font-size: 52px; font-weight: 400; line-height: 1.35; color: var(--navy); font-style: italic; margin-bottom: 36px; opacity: 0; transform: translateY(14px); transition: all 0.7s ease 0.2s; }
.qt-rule { width: 0; height: 1px; background: var(--gold); margin-bottom: 24px; transition: width 0.5s ease 0.55s; }
.qt-author { font-size: 15px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; color: var(--navy); opacity: 0; transition: opacity 0.5s ease 0.7s; }
.qt-source { font-size: 14px; color: var(--muted); letter-spacing: 0.1em; margin-top: 6px; opacity: 0; transition: opacity 0.5s ease 0.85s; }

.scene.anim .qt-mark { opacity: 0.35; }
.scene.anim .qt-text { opacity: 1; transform: none; }
.scene.anim .qt-rule { width: 60px; }
.scene.anim .qt-author, .scene.anim .qt-source { opacity: 1; }

/* ── SPLIT SCREEN ── */
.sp-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; height: 100%; align-items: center; }
.sp-col { display: flex; flex-direction: column; gap: 14px; }
.sp-col-title { font-size: 13px; font-weight: 600; letter-spacing: 0.36em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.sp-col.right .sp-col-title { color: var(--gold); }
.sp-divider { width: 1px; background: color-mix(in srgb, var(--navy) 8%, transparent); align-self: stretch; }
.sp-item { display: flex; align-items: center; gap: 18px; padding: 14px 16px; border-left: 2px solid color-mix(in srgb, var(--navy) 10%, transparent); background: color-mix(in srgb, var(--navy) 2%, transparent); opacity: 0; transform: translateX(-12px); transition: all 0.45s ease; }
.sp-col.right .sp-item { border-color: var(--gold); background: color-mix(in srgb, var(--gold) 4%, transparent); }
.sp-n { font-family: var(--serif); font-size: 36px; font-weight: 700; color: color-mix(in srgb, var(--navy) 20%, transparent); min-width: 44px; line-height: 1; }
.sp-col.right .sp-n { color: color-mix(in srgb, var(--gold) 60%, transparent); }
.sp-t { font-size: 20px; font-weight: 400; color: color-mix(in srgb, var(--navy) 65%, transparent); line-height: 1.3; }

/* ── CTA ── */
.cta-wrap { display: flex; flex-direction: column; justify-content: center; height: 100%; }
.cta-eyebrow { font-size: 13px; font-weight: 600; letter-spacing: 0.42em; text-transform: uppercase; color: var(--sky); margin-bottom: 22px; opacity: 0; transition: opacity 0.5s ease; }
.cta-rule { width: 0; height: 2px; background: var(--navy); opacity: 0.15; margin-bottom: 30px; transition: width 0.7s ease 0.1s; }
.cta-headline { font-family: var(--serif); font-size: 96px; font-weight: 700; line-height: 0.93; color: var(--navy); margin-bottom: 36px; opacity: 0; transform: translateY(16px); transition: all 0.75s ease 0.2s; max-width: 70%; }
.cta-headline em { font-style: italic; color: var(--gold); }
.cta-gold-rule { width: 0; height: 1px; background: var(--gold); margin-bottom: 28px; transition: width 0.6s ease 0.5s; }
.cta-btn { display: inline-block; padding: 16px 52px; border: 1.5px solid color-mix(in srgb, var(--navy) 28%, transparent); font-size: 14px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; color: var(--navy); margin-bottom: 18px; opacity: 0; transition: opacity 0.5s ease 0.7s; }
.cta-url { font-size: 16px; letter-spacing: 0.18em; color: var(--muted); opacity: 0; transition: opacity 0.5s ease 0.9s; }

.scene.anim .cta-eyebrow { opacity: 1; }
.scene.anim .cta-headline { opacity: 1; transform: none; }
.scene.anim .cta-rule { width: 100%; }
.scene.anim .cta-gold-rule { width: 72px; }
.scene.anim .cta-btn, .scene.anim .cta-url { opacity: 1; }
</style>
</head>
<body>

<!-- Architectural chrome -->
<div class="grid-overlay"></div>
<div class="top-rule"></div>

<!-- Skyline SVG background -->
<svg class="skyline" viewBox="0 0 1920 220" preserveAspectRatio="xMidYMax meet" fill="var(--navy)" xmlns="http://www.w3.org/2000/svg">
  <!-- Left cluster -->
  <rect x="0"   y="140" width="60"  height="80"/>
  <rect x="60"  y="80"  width="80"  height="140"/>
  <rect x="80"  y="60"  width="20"  height="20"/> <!-- antenna -->
  <rect x="140" y="110" width="50"  height="110"/>

  <rect x="280" y="90"  width="60"  height="130"/>

  <rect x="195" y="70"  width="6" height="8" fill="var(--bg)" opacity="0.5"/>

  <rect x="825" y="130" width="40"  height="90"/>
  <!-- windows center tower -->
  <rect x="508" y="40"  width="7" height="9" fill="var(--bg)" opacity="0.4"/>

  <rect x="508" y="58"  width="7" height="9" fill="var(--bg)" opacity="0.4"/>
  <rect x="523" y="58"  width="7" height="9" fill="var(--bg)" opacity="0.4"/>
  <rect x="538" y="58"  width="7" height="9" fill="var(--bg)" opacity="0.4"/>

  <rect x="1100" y="60"  width="100" height="160"/>

  <rect x="1640" y="50"  width="90"  height="170"/>

  <!-- Ground line -->
  <rect x="0" y="218" width="1920" height="2"/>
</svg>

<!-- Corner brackets -->
<svg class="arc-corner-tl" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M8 8 L8 50" stroke="#08316F" stroke-width="1.5"/>
  <path d="M8 8 L50 8" stroke="#08316F" stroke-width="1.5"/>
  <path d="M8 8 L32 8 L32 32 L8 32" stroke="#08316F" stroke-width="0.5" fill="none" opacity="0.4"/>
  <circle cx="8" cy="8" r="2.5" fill="#C8A96E"/>
</svg>
<svg class="arc-corner-br" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M8 8 L8 50" stroke="#08316F" stroke-width="1.5"/>
  <path d="M8 8 L50 8" stroke="#08316F" stroke-width="1.5"/>
  <path d="M8 8 L32 8 L32 32 L8 32" stroke="#08316F" stroke-width="0.5" fill="none" opacity="0.4"/>

</svg>

<div class="measure-left"></div>

<div class="brand-bar">
  <div class="brand-name" id="brand-name-el">Rodschinson</div>
  <div class="brand-tag" id="brand-tag-el">Real Estate Intelligence</div>
</div>

<div class="scene-footer">
  <div class="ftr-brand" id="ftr-brand-el"></div>
  <div class="ftr-meta" id="ftr-meta-el"></div>
</div>

<div id="scene-container"></div>

<script>
const CHART_COLORS = ['#08316F','#C8A96E','#00B6FF','#1B4F8A','#A08050','#005580'];

const BUILDERS = {

  title_card: (d) => {
    const bname = (window.__brand && window.__brand.name) || '';
    return `<div class="scene" id="scene">
      <div class="inner">
        <div class="tc-eyebrow">${d.eyebrow || bname}</div>
        <div class="tc-rule"></div>
        <div class="tc-headline">${(d.titre_principal||'').replace(/\n/g,'<br>').replace(/\*([^*]+)\*/g,'<em>$1</em>')}</div>
        <div class="tc-gold-rule"></div>
        <div class="tc-sub">${d.sous_titre||''}</div>
      </div>
      <div class="tc-building">
        <svg viewBox="0 0 720 870" width="100%" height="100%" preserveAspectRatio="xMaxYMax meet" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity:.055">
          <rect x="0"   y="200" width="160" height="670" fill="#08316F"/>
          <rect x="30"  y="140" width="100" height="60"  fill="#08316F"/>
          <rect x="60"  y="80"  width="40"  height="60"  fill="#08316F"/>
          <rect x="72"  y="40"  width="16"  height="40"  fill="#C8A96E"/>
          <rect x="180" y="300" width="200" height="570" fill="#08316F"/>
          <rect x="220" y="240" width="120" height="60"  fill="#08316F"/>
          <rect x="400" y="100" width="320" height="770" fill="#08316F"/>
          <rect x="450" y="30"  width="20"  height="70"  fill="#C8A96E"/>
          <!-- window grid tall building -->
          ${Array.from({length:12},(_,r)=>Array.from({length:7},(_,c)=>`<rect x="${420+c*38}" y="${130+r*48}" width="22" height="28" fill="#F5F2ED" opacity="0.45"/>`).join('')).join('')}
          <!-- Ground -->
          <rect x="0" y="868" width="720" height="2" fill="#08316F" opacity="0.3"/>
        </svg>
      </div>
    </div>`;
  },

  big_number: (d) => `<div class="scene" id="scene">
    <div class="inner">
      <div class="bn-wrap">
        <div class="bn-left">
          <div class="bn-eyebrow">${d.eyebrow||''}</div>
          <div class="bn-value">
            <span id="bn-counter">${d.valeur||'0'}</span>
            <span class="bn-unit">${d.unite||'%'}</span>
          </div>
          <div class="bn-ctx">${d.contexte||''}</div>
        </div>
        <div class="bn-right">
          ${d.formule?`<div class="bn-formula">${d.formule}</div>`:''}
          <div class="bn-arch-graphic">
            <svg viewBox="0 0 520 400" width="100%" preserveAspectRatio="xMidYMax meet" fill="#08316F" xmlns="http://www.w3.org/2000/svg">
              <rect x="0"   y="100" width="80"  height="300"/>
              <rect x="90"  y="0"   width="120" height="400"/>
              <rect x="110" y="0"   width="12"  height="0" fill="#C8A96E"/>
              <rect x="220" y="60"  width="90"  height="340"/>
              <rect x="320" y="140" width="70"  height="260"/>
              <rect x="400" y="80"  width="120" height="320"/>
              <rect x="418" y="50"  width="14"  height="30" fill="#C8A96E"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>`,

  bar_chart: (d) => {
    const s = d.series||[]; const mx = Math.max(...s.map(x=>+x.valeur||0),1);
    return `<div class="scene" id="scene">
      <div class="inner padded">
        <div class="ch-wrap">
          <div class="ch-head">
            <div class="ch-title">${d.titre||''}</div>
            <div class="ch-source">${d.source||''}</div>
          </div>
          <div class="ch-bars">
            ${s.map((b,i)=>`
            <div class="ch-bw">
              <div class="ch-val">${(+b.valeur||0).toFixed(1)}${d.unite||'%'}</div>
              <div class="ch-bo">
                <div class="ch-bi" style="height:${((+b.valeur||0)/mx*100).toFixed(1)}%;background:linear-gradient(180deg,${CHART_COLORS[i%CHART_COLORS.length]},color-mix(in srgb,${CHART_COLORS[i%CHART_COLORS.length]} 30%,transparent))"></div>
              </div>
              <div class="ch-lbl">${b.label}</div>
            </div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
  },

  text_bullets: (d) => `<div class="scene" id="scene">
    <div class="inner">
      <div class="bl-wrap">
        <div class="bl-title">${d.titre||''}</div>
        ${(d.items||[]).map((t,i)=>`
        <div class="bl-item" data-index="${i}">
          <div class="bl-num">0${i+1}</div>
          <div class="bl-text">${t}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`,

  process_steps: (d) => {
    const e = d.etapes||[]; const a = d.active||0;
    return `<div class="scene" id="scene">
      <div class="inner">
        <div class="ps-wrap">
          <div class="ps-title">${(d.titre||'').replace(/\*([^*]+)\*/g,'<em>$1</em>')}</div>
          ${e.map((t,i)=>`
          <div class="ps-step ${i<a?'done':i===a?'active':''}" data-index="${i}">
            <div class="ps-num">0${i+1}</div>
            <div class="ps-text">${t}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  },

  quote_card: (d) => `<div class="scene" id="scene">
    <div class="inner">
      <div class="qt-wrap">
        <div class="qt-mark">"</div>
        <div class="qt-text">${d.citation||''}</div>
        <div class="qt-rule"></div>
        <div class="qt-author">${d.auteur||''}</div>
        <div class="qt-source">${d.source||''}</div>
      </div>
    </div>
  </div>`,

  split_screen: (d) => {
    const l = d.colonne_gauche||{}, r = d.colonne_droite||{};
    return `<div class="scene" id="scene">
      <div class="inner">
        <div style="font-family:var(--serif);font-size:52px;font-weight:700;color:var(--navy);margin-bottom:28px;opacity:0;transition:opacity .5s ease" class="sp-hd">${d.titre||''}</div>
        <div class="sp-wrap">
          <div class="sp-col left">
            <div class="sp-col-title">${l.titre||''}</div>
            ${(l.items||[]).map((t,i)=>`<div class="sp-item" data-index="${i}"><div class="sp-n">0${i+1}</div><div class="sp-t">${t}</div></div>`).join('')}
          </div>
          <div class="sp-divider"></div>
          <div class="sp-col right">
            <div class="sp-col-title">${r.titre||''}</div>
            ${(r.items||[]).map((t,i)=>`<div class="sp-item" data-index="${i}"><div class="sp-n">0${i+1}</div><div class="sp-t">${t}</div></div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
  },

  cta_screen: (d) => {
    const bname = (window.__brand && window.__brand.name) || '';
    return `<div class="scene" id="scene">
      <div class="inner">
        <div class="cta-wrap">
          <div class="cta-eyebrow">${d.eyebrow || bname}</div>
          <div class="cta-rule"></div>
          <div class="cta-headline">${(d.headline||d.cta_text||'').replace(/\n/g,'<br>').replace(/\*([^*]+)\*/g,'<em>$1</em>')}</div>
          <div class="cta-gold-rule"></div>
          <div class="cta-btn">${d.cta_text||''}</div>
          <div class="cta-url">${d.url||''}</div>
        </div>
      </div>
    </div>`;
  },
};

window.loadScene = function(sd) {
  const b = BUILDERS[sd.type_visuel];
  if (!b) { console.error('Unknown scene type:', sd.type_visuel); return false; }

  const bname = (window.__brand && window.__brand.name) || '';
  document.getElementById('brand-name-el').textContent = bname || 'Rodschinson';
  document.getElementById('brand-tag-el').textContent  = (window.__brand && window.__brand.tagline) || 'Real Estate Intelligence';
  document.getElementById('ftr-brand-el').textContent  = bname;
  document.getElementById('ftr-meta-el').textContent   = sd.source || '';

  document.getElementById('scene-container').innerHTML = b(sd);
  return true;
};

window.animateScene = function() {
  requestAnimationFrame(() => {
    const scene = document.getElementById('scene');
    if (!scene) return;
    scene.classList.add('active', 'anim');

    // Stagger list items
    scene.querySelectorAll('.bl-item, .ps-step, .sp-item').forEach((el, i) => {
      el.style.transitionDelay = `${0.2 + i * 0.12}s`;
      requestAnimationFrame(() => {
        el.style.opacity = '1';
        el.style.transform = 'none';
      });
    });
    // Split screen header
    const sph = scene.querySelector('.sp-hd');
    if (sph) { setTimeout(() => { sph.style.opacity = '1'; }, 100); }
  });
};
</script>
</body>
</html>
