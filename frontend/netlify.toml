[build]
  base    = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* → Railway backend (set VITE_API_BASE in Netlify UI)
[[redirects]]
  from   = "/api/*"
  to     = "https://content-studio-production-84de.up.railway.app/api/:splat"
  status = 200
  force  = true
  headers = { X-From = "Netlify" }

# SPA fallback — all non-file routes → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "production"
